<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A1628;--card:#11223B;--border:#1E3A5F;--text:#D4E1F0;--muted:#7A8FA6;--accent:#C41E3A;--accent2:#E8243C;--blue:#1E5BA8;--gold:#D4A843;--green:#22c55e}
html,body{overflow-x:hidden;max-width:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
/* === Header tipo enhanced.com === */
.corner-logo{position:fixed;top:16px;left:18px;z-index:100;height:46px;width:auto;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5));transition:opacity .2s}
.corner-logo:hover{opacity:.85}
.hamburger{position:fixed;top:18px;right:18px;z-index:101;width:46px;height:46px;background:rgba(10,22,40,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(212,168,67,.3);border-radius:10px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;cursor:pointer;transition:all .2s}
.hamburger:hover{border-color:var(--gold);background:rgba(212,168,67,.1)}
.hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:all .3s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.menu-overlay{position:fixed;inset:0;background:rgba(4,9,18,.6);backdrop-filter:blur(4px);z-index:99;opacity:0;pointer-events:none;transition:opacity .25s}
.menu-overlay.open{opacity:1;pointer-events:auto}
.side-menu{position:fixed;top:0;right:0;height:100vh;width:320px;max-width:85vw;background:rgba(8,16,30,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-left:1px solid rgba(212,168,67,.25);z-index:100;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);padding:80px 24px 24px;overflow-y:auto;box-shadow:-20px 0 60px rgba(0,0,0,.6)}
.side-menu.open{transform:translateX(0)}
.side-menu .mi{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:10px;cursor:pointer;font-family:Oswald,sans-serif;font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(220,230,245,.78);background:transparent;border:1px solid rgba(30,58,95,.4);margin-bottom:8px;transition:all .2s;position:relative;overflow:hidden}
.side-menu .mi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);transform:scaleY(0);transition:transform .2s;transform-origin:center}
.side-menu .mi:hover{background:rgba(196,30,58,.12);color:#fff;border-color:rgba(196,30,58,.4);transform:translateX(-3px)}
.side-menu .mi:hover::before{transform:scaleY(1)}
.side-menu .mi.active{background:rgba(196,30,58,.18);color:#fff;border-color:var(--accent)}
.side-menu .mi.active::before{transform:scaleY(1)}
.side-menu .mi .ic{font-size:18px;width:22px;text-align:center}
.side-menu .mi.special-g{border-color:rgba(34,197,94,.35);color:var(--green)}
.side-menu .mi.special-g:hover{background:rgba(34,197,94,.12);color:#fff;border-color:var(--green)}
.side-menu .mi.special-y{border-color:rgba(212,168,67,.35);color:var(--gold)}
.side-menu .mi.special-y:hover{background:rgba(212,168,67,.12);color:#fff;border-color:var(--gold)}
.side-menu .mi.special-b{border-color:rgba(59,130,246,.35);color:#60a5fa}
.side-menu .mi.special-b:hover{background:rgba(59,130,246,.12);color:#fff;border-color:#60a5fa}
@media(max-width:760px){.glc-grid{grid-template-columns:1fr !important}.glc-grid > div:first-child{order:2}.glc-grid > div:last-child{order:1}}
.menu-foot{margin-top:28px;font-size:10px;color:var(--muted);text-align:center;font-family:Oswald;letter-spacing:1.5px;border-top:1px solid rgba(30,58,95,.4);padding-top:14px}
.ctn{padding-top:90px !important}
@media(max-width:520px){.hamburger{top:10px;right:12px;width:42px;height:42px}.ctn{padding-top:80px !important}.side-menu{width:280px;padding:70px 20px 24px}.side-menu .mi{font-size:14px;padding:14px 16px}}
.ctn{max-width:940px;margin:0 auto;padding:16px 20px}
input,select,button{font-family:inherit}
a{color:var(--accent);text-decoration:none}
.hdr{text-align:center;padding:20px 0 16px}
.hdr h1{font-family:'Oswald',sans-serif;font-size:clamp(22px,5vw,30px);font-weight:700;letter-spacing:3px;text-transform:uppercase}
.hdr h1 .fe{color:var(--accent)}.hdr h1 .rs{font-weight:400}
.hdr p{color:var(--muted);font-size:13px;margin-top:4px}
.hl{width:60px;height:3px;background:linear-gradient(90deg,var(--accent),var(--gold));margin:10px auto 0;border-radius:2px}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-weight:600;font-size:12px;cursor:pointer;font-family:'Oswald',sans-serif;letter-spacing:1px;text-transform:uppercase;transition:all .2s}
.tab.a{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab:hover:not(.a){border-color:var(--muted)}
.st{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.sb{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;font-family:'Oswald',sans-serif;letter-spacing:.5px;text-transform:uppercase;transition:all .2s}
.sb.a{background:var(--blue);color:#fff;border-color:var(--blue)}
.fl{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.fl input{flex:1;min-width:200px;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;outline:none}
.fl input:focus{border-color:var(--accent)}
.fl select{padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;outline:none;cursor:pointer;max-width:220px}
.cnt{color:var(--muted);font-size:12px;margin-bottom:10px}
.ar{background:var(--card);border-radius:12px;padding:12px 16px;cursor:pointer;border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;transition:border-color .2s,transform .15s;margin-bottom:6px}
.ar:hover{border-color:var(--accent);transform:translateX(3px)}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.av.ac{background:linear-gradient(135deg,var(--accent),var(--gold))}.av.in{background:var(--border)}
.an{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.am{font-size:11px;color:var(--muted)}.am .cd{color:var(--accent);font-weight:600}
.cc{background:rgba(196,30,58,.15);color:var(--accent);padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600}
.bb{background:none;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;margin-bottom:20px;transition:border-color .2s}
.bb:hover{border-color:var(--accent);color:var(--text)}
.pc{background:linear-gradient(135deg,var(--card),var(--bg));border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:20px}
.pa{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff;font-family:'Oswald',sans-serif;flex-shrink:0}
.pn{font-size:clamp(18px,4vw,24px);font-weight:700;font-family:'Oswald',sans-serif;letter-spacing:.5px}
.pk{color:var(--accent);font-weight:600;font-size:14px;font-family:'Oswald',sans-serif;letter-spacing:1px}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fd{background:var(--bg);border-radius:10px;padding:10px 14px}.fd .lb{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}.fd .vl{font-size:14px;font-weight:600}
.cd2{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px}
.ct{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ct h2{font-size:16px;font-family:'Oswald',sans-serif;letter-spacing:1px;text-transform:uppercase}
.bg{border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700}
.bx{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.bi{background:var(--bg);border-radius:12px;padding:14px 10px;text-align:center;border:1px solid var(--border);position:relative;overflow:hidden}
.bi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--gold))}
.bv{font-size:clamp(18px,3.5vw,26px);font-weight:700;color:var(--gold);font-family:'Oswald',sans-serif}
.bu{font-size:11px;color:var(--muted)}.bl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.ce{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:10px;border-left:3px solid var(--border);transition:transform .15s}
.ce:hover{transform:translateX(3px)}
.tg{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-right:6px;margin-bottom:6px}
.cm{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:12px;margin-top:6px}
.cm .ll{color:var(--muted)}.cm .vv{font-weight:600}
.rb{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.rp{background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.2);border-radius:8px;padding:5px 8px;text-align:center;flex:1;min-width:55px}
.rp .rv{font-size:15px;font-weight:700;color:var(--gold);font-family:'Oswald',sans-serif}
.rp .rl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
.rk{background:linear-gradient(135deg,var(--accent),var(--gold));color:#fff;border-radius:8px;padding:5px 12px;font-weight:700;font-family:'Oswald',sans-serif;font-size:13px;display:inline-flex;align-items:center;gap:4px;margin-top:8px}
.sc{background:var(--card);border-radius:12px;padding:20px;text-align:center;border:1px solid var(--border)}
.sn{font-size:clamp(24px,5vw,34px);font-weight:700;font-family:'Oswald',sans-serif}
.sl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.rr{display:grid;grid-template-columns:40px 1fr 80px 60px 1fr 70px;gap:8px;padding:10px 12px;border-bottom:1px solid rgba(30,58,95,.4);font-size:13px;align-items:center}
.rr:hover{background:rgba(196,30,58,.04)}
.rh{font-weight:600;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border)}
.rpos{color:var(--gold);font-weight:700;font-family:'Oswald',sans-serif}
.rmk{color:var(--accent);font-weight:700;font-size:15px;font-family:'Oswald',sans-serif}
.emp{color:var(--muted);text-align:center;padding:40px 20px;font-size:14px}
.ftr{text-align:center;padding:32px 16px 24px;color:rgba(220,230,245,.55);font-size:11px;margin-top:60px;font-family:Oswald;letter-spacing:1.5px;line-height:1.7;border:0}
.ftr a{color:rgba(212,168,67,.85);text-decoration:none;border-bottom:1px dashed rgba(212,168,67,.3)}
.ftr a:hover{color:var(--gold)}
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.sp{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

function toggleMenu(){const m=document.getElementById('sideMenu');const o=document.getElementById('menuOverlay');const h=document.getElementById('hamburger');m.classList.toggle('open');o.classList.toggle('open');h.classList.toggle('open')}

function buildMenu(){
  const items=[
    {v:'home',l:'Inicio',ic:''},
    {v:'nominas',l:'Nóminas',ic:''},
    {v:'stats',l:'Estadísticas',ic:''},

  ).join('');

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMenu()});
// Cargar video de fondo desde Firebase Storage videos/break/
// Si existe videos/sections/bg_<seccion>.mp4 se usa ese, sino uno aleatorio.
window._BG_VIDEOS={};
(async()=>{
  try{
    const {initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const {getStorage,ref,listAll,getDownloadURL}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js');
    const FB_CFG2={apiKey:"AIzaSyC3xWxxxLpkkbz_h9HxOSeg7C25wfh9KQ8",authDomain:"fechipo-db-13148.firebaseapp.com",projectId:"fechipo-db-13148",storageBucket:"fechipo-db-13148.firebasestorage.app",messagingSenderId:"841056301810",appId:"1:841056301810:web:f6d62c0d4d22e88f7af2dd"};
    let app2;try{app2=initializeApp(FB_CFG2,'bgApp');}catch(e){app2=initializeApp(FB_CFG2,'bgApp_'+Date.now());}
    const storage=getStorage(app2);
    // Intentar cargar de videos/sections (uno por seccion: bg_nominas.mp4, bg_stats.mp4, etc)
    let sectionMap={};
    try{
      const sec=await listAll(ref(storage,'videos/sections'));
      for(const it of sec.items){
        const m=it.name.match(/^bg_([a-z]+)\./i);
        if(m)sectionMap[m[1].toLowerCase()]=await getDownloadURL(it);
      }
    }catch(e){}
    window._BG_VIDEOS=sectionMap;
    // Settings por sección (overlay/blur/encuadre/ubicación/on-off) desde Firestore
    try{
      const {getFirestore,collection,getDocs}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const db2=getFirestore(app2);
      const snap=await getDocs(collection(db2,'site_backgrounds'));
      const s={};snap.forEach(d=>{s[d.id]=d.data()||{}});
      window._BG_SETTINGS=s;
    }catch(e){window._BG_SETTINGS=window._BG_SETTINGS||{}}
    // Solo videos de sections (gestionados desde admin). Sin fallback automático a break/.
    setBgForSection(typeof ST!=='undefined'?ST.v:'nominas');
  }catch(e){console.warn('[bgVideo]',e.message);}
})();
function sponsorStrip(){
  const cfg=(window._BG_SETTINGS||{}).sponsors||{};
  const items=(cfg.items||[]).filter(s=>s&&s.activo!==false&&s.logoUrl);
  if(!items.length) return '';
  const hrefOf=s=>{
    const ig=String(s.ig||'').trim();
    if(ig) return /^https?:\/\//i.test(ig)?ig:('https://instagram.com/'+ig.replace(/^@/,''));
    return s.link||'#';
  };
  const cell=s=>`<a href="${hrefOf(s)}" target="_blank" rel="noopener" title="${String(s.nombre||'').replace(/"/g,'&quot;')}" style="display:inline-flex;align-items:center;justify-content:center;padding:0 clamp(18px,4vw,34px);flex-shrink:0"><img src="${s.logoUrl}" alt="${String(s.nombre||'')}" style="max-height:clamp(34px,7vw,50px);max-width:clamp(108px,26vw,160px);object-fit:contain;opacity:.92"></a>`;
  // Repetir los logos hasta superar el ancho de pantalla, si no queda vacío a la derecha.
  const reps=Math.max(2, Math.ceil(12/items.length));
  let group=''; for(let k=0;k<reps;k++) group+=items.map(cell).join('');
  const dur=Math.max(20, items.length*reps*5);
  return `<div style="margin:0 calc(-50vw + 50%) 26px;width:100vw;max-width:100vw;background:rgba(8,16,30,.55);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:14px 0;overflow:hidden">
    <div style="text-align:center;font-family:Oswald;font-size:10px;letter-spacing:4px;color:var(--muted);margin-bottom:10px">AUSPICIADORES</div>
    <div class="yl-marq" style="display:flex;width:max-content;animation:ylmarq ${dur}s linear infinite">${group}${group}</div>
  </div>
  <style>@keyframes ylmarq{from{transform:translateX(0)}to{transform:translateX(-50%)}}.yl-marq:hover{animation-play-state:paused}</style>`;
}
function setBgForSection(section){
  const wrap=document.getElementById('bgVideoWrap');
  const v=document.getElementById('bgVideo');
  const ov=document.getElementById('bgOverlay');
  if(!v||!wrap)return;
  const map=window._BG_VIDEOS||{};
  const cfg=(window._BG_SETTINGS||{})[section]||{};
  const url=map[section]||map['default'];
  const videoOn = !!url && cfg.enabled!==false;
  // Si el hero del Inicio tiene fondo opaco propio, taparlo cuando hay video
  // (así el video se ve también detrás del logo/botones, no solo abajo).
  const heroSolid=document.getElementById('heroSolidBg');
  const heroFade=document.getElementById('heroFadeBg');
  if(heroSolid)heroSolid.style.opacity=videoOn?'0':'1';
  if(heroFade)heroFade.style.opacity=videoOn?'0':'1';
  // Sin video o sección apagada → fondo normal
  if(!videoOn){
    v.style.display='none';v.style.opacity='0';
    if(ov)ov.style.background='transparent';
    wrap.style.bottom='0';wrap.style.height='';
    return;
  }
  // Settings con defaults
  const overlay=(typeof cfg.overlay==='number'?cfg.overlay:60)/100;
  const blur=(typeof cfg.blur==='number'?cfg.blur:0);
  const objPos=cfg.objPos||'center';
  const placement=cfg.placement||'full';
  // Encuadre + desenfoque
  v.style.objectPosition=objPos==='top'?'center top':objPos==='bottom'?'center bottom':'center center';
  v.style.filter=blur>0?('blur('+blur+'px)'):'none';
  v.style.transform=blur>0?'scale(1.08)':'none';
  // Ubicación: fondo completo vs solo portada (arriba)
  if(placement==='hero'){wrap.style.bottom='auto';wrap.style.height='74vh';}
  else{wrap.style.bottom='0';wrap.style.height='';}
  // Oscurecer (overlay) + fade inferior si es hero
  const base='rgba(6,16,31,'+overlay+')';
  if(ov)ov.style.background = placement==='hero'
    ? 'linear-gradient(180deg,'+base+' 0%,'+base+' 52%,rgba(10,22,40,.92) 90%,#0A1628 100%)'
    : base;
  // Cargar/reproducir el video
  if(v.src!==url){
    v.style.opacity='0';
    setTimeout(()=>{v.style.display='block';v.src=url;v.addEventListener('canplay',()=>{v.style.opacity='1'},{once:true});v.play().catch(()=>{});},250);
  }else{v.style.display='block';v.style.opacity='1';}
}
</script>

<script>
// Firebase config (same as inscripcion.html)
const FB_CFG={apiKey:"AIzaSyA21IHMus2bklPLJm7ExRrVJJL9bzLhyp4",authDomain:"fechipo-db-13148.firebaseapp.com",projectId:"fechipo-db-13148",storageBucket:"fechipo-db-13148.firebasestorage.app",messagingSenderId:"551573388751",appId:"1:551573388751:web:5fcc377a8d595378ab26ba"};

let NOM_EVENTS=[
  {id:"regional_centro_2026",name:"Campeonato Regional Centro FECHIPO 2026",date:"2026-05-09",closeDate:"2026-04-09",location:"Santiago, RM",org:"Athor Powerlifting",days:"09 y 10 de Mayo",extraCols:["modalidad"]},
  {id:"universitario_2026",name:"Primer Campeonato Nacional Universitario FECHIPO 2026",date:"2026-05-23",closeDate:"2026-04-23",location:"Talca",org:"Club Bushido Lifting",days:"23 de Mayo",extraCols:["universidad"]},
  {id:"Campeonato_de_debutantes",name:"Campeonato de Debutantes",date:"2026-XX-XX",closeDate:"2026-XX-XX",location:"Santiago, Ñuñoa",org:"All Power",days:"Por definir",extraCols:["modalidad"]},
];
let fbDB=null,fbReady=false;
async function initFB(){
  try{
    const{initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const fb=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const app=initializeApp(FB_CFG);fbDB=fb.getFirestore(app);
    window.FBQ={collection:fb.collection,getDocs:fb.getDocs,query:fb.query,orderBy:fb.orderBy,where:fb.where,doc:fb.doc,setDoc:fb.setDoc,getDoc:fb.getDoc,onSnapshot:fb.onSnapshot,updateDoc:fb.updateDoc,increment:fb.increment,serverTimestamp:fb.serverTimestamp};
    fbReady=true;
    // ── Analytics propio: registrar visita del día (no bloquea el render) ──
    try{ trackVisit(fb); }catch(e){}
    // Load eventos from Firestore and update NOM_EVENTS
    window.FBQ.onSnapshot(window.FBQ.collection(fbDB,'eventos'),(snap)=>{
      const allEvs=snap.docs.map(d=>({...d.data(),id:d.id}))
        .sort((a,b)=>(a.date||'').localeCompare(b.date||''));
      // Para transmisiones y galería: incluir TODOS los eventos (también archivados)
      window.ALL_EVENTS=allEvs;
      const evs=allEvs.filter(e=>e.status!=='archived');
      if(evs.length){
        NOM_EVENTS=evs;
        // Rebuild nóminas with updated event list
        loadFBNominas();
      }
      if(ST.v==='trans')render();
    });
    await loadEdits();
    startEditsListener();
    await loadFBNominas();
  }catch(e){console.warn('Firebase not available, using nominas.json',e)}
}

// ════════════════════════════════════════════════════════════════
// ANALYTICS PROPIO (Firestore) — visitas día/semana/mes, únicos, páginas
// Doc por día: analytics_daily/{YYYY-MM-DD}
//   { total, unique, ts, pages:{home,nominas,ranking,...}, refs:{...} }
// ════════════════════════════════════════════════════════════════
async function trackVisit(fb){
  if(!fbDB)return;
  const today=new Date();
  const ymd=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  const ref=fb.doc(fbDB,'analytics_daily',ymd);
  // ¿visitante único hoy? (localStorage marca 1 vez por día)
  let isUnique=false;
  try{
    const key='yl_visit_'+ymd;
    if(!localStorage.getItem(key)){ localStorage.setItem(key,'1'); isUnique=true; }
  }catch(e){ isUnique=true; }
  // Origen del tráfico (referrer host)
  let refHost='directo';
  try{
    if(document.referrer){
      const u=new URL(document.referrer);
      if(!/yourlift\.cl|fechipo-db/.test(u.hostname)) refHost=u.hostname.replace(/^www\./,'');
      else refHost='interno';
    }
  }catch(e){}
  refHost=refHost.replace(/[.#$/\[\]]/g,'_');
  window._YL_TRACK_FB=fb; // para registrar páginas en sv()
  const payload={
    total: fb.increment(1),
    ts: fb.serverTimestamp(),
    date: ymd,
    refs: { [refHost]: fb.increment(1) }
  };
  if(isUnique) payload.unique = fb.increment(1);
  try{
    await fb.setDoc(ref, payload, {merge:true});
    console.log('[analytics] visita registrada',ymd);
  }catch(e){ console.warn('[analytics] visit error:',e.code,e.message); }
}
// Registrar página vista (se llama desde sv)
async function trackPage(view){
  const fb=window._YL_TRACK_FB;
  if(!fb||!fbDB)return;
  const t=new Date();
  const ymd=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
  const ref=fb.doc(fbDB,'analytics_daily',ymd);
  const v=(view||'home').replace(/[.#$/\[\]]/g,'_');
  try{ await fb.setDoc(ref,{pages:{[v]: fb.increment(1)}},{merge:true}); }catch(e){}
}

const _rutNormE=s=>String(s||'').replace(/[^0-9kK]/gi,'').toUpperCase();
// Mapa global de edits indexado por RUT (también por código como fallback).
// Permite aplicar las ediciones del admin a CUALQUIER colección (nóminas,
// ranking, etc.), no solo a data.json.
window.EDITS_BY_RUT={};
window.EDITS_BY_COD={};
function _indexEdit(ed){
  if(ed.rut){const k=_rutNormE(ed.rut);if(k)window.EDITS_BY_RUT[k]=ed;}
  if(ed.codigo)window.EDITS_BY_COD[ed.codigo]=ed;
}
// Aplica el overlay de edits a un objeto cualquiera que tenga rut y/o codigo.
// Devuelve el objeto modificado (muta in-place). Campos: nombre, club, etc.
function applyEditOverlay(obj){
  if(!obj)return obj;
  let ed=null;
  if(obj.rut){ed=window.EDITS_BY_RUT[_rutNormE(obj.rut)];}
  if(!ed&&obj.codigo){ed=window.EDITS_BY_COD[obj.codigo];}
  if(!ed)return obj;
  if(ed.nombre)obj.nombre=ed.nombre;
  if(ed.club!==undefined&&ed.club!=='')obj.club=ed.club;
  if(ed.codigo)obj.codigo=ed.codigo;
  if(ed.sexo)obj.sexo=ed.sexo;
  if(ed.fechaNac)obj.fechaNac=ed.fechaNac;
  if(ed.zona)obj.zona=ed.zona;
  if(ed.comuna)obj.comuna=ed.comuna;
  return obj;
}
window.applyEditOverlay=applyEditOverlay;
function _findByEdit(ed){
  // RUT primero (estable), luego código (compat docs viejos)
  if(ed.rut){const a=D.find(x=>_rutNormE(x.rut)===_rutNormE(ed.rut));if(a)return a;}
  if(ed.codigo)return D.find(x=>x.codigo===ed.codigo);
  return null;
}
function _applyEditFields(a,ed){
  let ch=false;
  if(ed.nombre&&a.nombre!==ed.nombre){a.nombre=ed.nombre;ch=true}
  if(ed.club!==undefined&&a.club!==ed.club){a.club=ed.club;ch=true}
  if(ed.debut!==undefined&&a.debut!==ed.debut){a.debut=ed.debut;ch=true}
  if(ed.codigo&&a.codigo!==ed.codigo){a.codigo=ed.codigo;ch=true}
  if(ed.rut&&a.rut!==ed.rut){a.rut=ed.rut;ch=true}
  if(ed.sexo&&a.sexo!==ed.sexo){a.sexo=ed.sexo;ch=true}
  if(ed.fechaNac&&a.fechaNac!==ed.fechaNac){a.fechaNac=ed.fechaNac;ch=true}
  if(ed.zona&&a.zona!==ed.zona){a.zona=ed.zona;ch=true}
  if(ed.comuna&&a.comuna!==ed.comuna){a.comuna=ed.comuna;ch=true}
  return ch;
}
async function loadEdits(){
  if(!fbReady)return;
  try{

// ═══════════════════════════════════════════════════════════════
// CALCULADORA GL POINTS (IPF Good Lift Points 2020)
// Fórmula oficial: GL = 100 × Total / (a - b × e^(-c × BW))
// ═══════════════════════════════════════════════════════════════
const GL_COEFS = {
  // Powerlifting Classic
  pl_m:  {a:1199.72839, b:1025.18162, c:0.00921},
  pl_f:  {a:610.32796,  b:1045.59282, c:0.03048},
  // Powerlifting Equipped
  ple_m: {a:1236.25115, b:1449.21864, c:0.01644},
  ple_f: {a:758.63878,  b:949.31382,  c:0.02435},
  // Bench Only Classic
  bo_m:  {a:320.98041,  b:281.40258,  c:0.01008},
  bo_f:  {a:142.40398,  b:442.52671,  c:0.04724},
  // Bench Only Equipped
  boe_m: {a:381.22073,  b:733.79378,  c:0.02398},
  boe_f: {a:221.82209,  b:357.00377,  c:0.02937},
};

function calcGL(bw, total, coefKey){
  if(!bw||!total||bw<=0||total<=0)return null;
  const c=GL_COEFS[coefKey];if(!c)return null;
  // Procedimiento oficial IPF GL: coef redondeado a 6 decimales, luego × total, redondeo a 6 dec.
  const denomRaw=c.a - c.b * Math.exp(-c.c * bw);
  if(denomRaw<=0)return null;
  const coef=Math.round(100/denomRaw*1e6)/1e6;
  return Math.round(coef*total*1e6)/1e6;
}

// Categoría de peso IPF según peso corporal y sexo.
// Incluye -53(M)/-43(F) que solo existen en Sub-Junior/Junior.
function glcWeightCat(bw, sex){
  if(!bw||bw<=0)return null;
  if(sex==='f'){
    if(bw<=43)return'-43 kg';
    if(bw<=47)return'-47 kg';
    if(bw<=52)return'-52 kg';
    if(bw<=57)return'-57 kg';
    if(bw<=63)return'-63 kg';
    if(bw<=69)return'-69 kg';
    if(bw<=76)return'-76 kg';
    if(bw<=84)return'-84 kg';
    return'+84 kg';
  }
  // masculino
  if(bw<=53)return'-53 kg';
  if(bw<=59)return'-59 kg';
  if(bw<=66)return'-66 kg';
  if(bw<=74)return'-74 kg';
  if(bw<=83)return'-83 kg';
  if(bw<=93)return'-93 kg';
  if(bw<=105)return'-105 kg';
  if(bw<=120)return'-120 kg';
  return'+120 kg';
}

// Categorías de peso IPF
const IPF_CATS={
  m:[{max:53,label:'-53 kg'},{max:59,label:'-59 kg'},{max:66,label:'-66 kg'},{max:74,label:'-74 kg'},
     {max:83,label:'-83 kg'},{max:93,label:'-93 kg'},{max:105,label:'-105 kg'},{max:120,label:'-120 kg'},
     {max:Infinity,label:'+120 kg'}],
  f:[{max:44,label:'-44 kg'},{max:48,label:'-48 kg'},{max:52,label:'-52 kg'},{max:57,label:'-57 kg'},
     {max:63,label:'-63 kg'},{max:69,label:'-69 kg'},{max:76,label:'-76 kg'},{max:84,label:'-84 kg'},
     {max:Infinity,label:'+84 kg'}]
};
function getIPFCat(bw, sex){
  if(!bw||bw<=0)return null;
  const cats=IPF_CATS[sex]||IPF_CATS.m;
  return cats.find(c=>bw<=c.max)||cats[cats.length-1];
}

      <div>
        <!-- MODO -->
        <div style="display:flex;gap:10px;margin-bottom:18px">
          <button id="glc_btn_lifts" onclick="glcSetMode('lifts')" style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--accent);background:var(--accent);color:#fff;font-family:Oswald;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer">SQ + BP + DL</button>
          <button id="glc_btn_total" onclick="glcSetMode('total')" style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:rgba(10,22,40,.5);color:#fff;font-family:Oswald;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer">TOTAL DIRECTO</button>
        </div>

        <!-- SQ BP DL -->
        <div id="glc_lifts_row" style="display:grid;grid-template-columns:${isBO?'1fr':'1fr 1fr 1fr'};gap:10px;margin-bottom:14px">
          ${!isBO?`<div>${lbl('SQUAT (kg)')}<input id="glc_sq" type="number" min="0" step="0.5" placeholder="0" oninput="glcUpdate()" style="${inpStyle}" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"></div>`:''}
          <div>${lbl('BENCH (kg)')}<input id="glc_bp" type="number" min="0" step="0.5" placeholder="0" oninput="glcUpdate()" style="${inpStyle}" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"></div>
          ${!isBO?`<div>${lbl('DEADLIFT (kg)')}<input id="glc_dl" type="number" min="0" step="0.5" placeholder="0" oninput="glcUpdate()" style="${inpStyle}" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"></div>`:''}
        </div>
        <div id="glc_sum_row" style="text-align:center;margin-bottom:14px;font-family:Oswald;font-size:13px;letter-spacing:2px;color:var(--muted)">TOTAL: <span id="glc_sum" style="color:var(--gold)"></span></div>

        <!-- TOTAL DIRECTO -->
        <div id="glc_total_row" style="display:none;margin-bottom:14px">
          ${lbl('TOTAL (kg)')}
          <input id="glc_tot_inp" type="number" min="0" step="0.5" placeholder="0" oninput="glcUpdate()" style="${inpStyle}" onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--border)'">
        </div>

        <!-- BW -->
        <div style="margin-bottom:14px">
          ${lbl('PESO CORPORAL (kg)')}
          <input id="glc_bw" type="number" min="0" step="0.1" placeholder="0.0" oninput="glcUpdate()" style="${inpStyle}" onfocus="this.style.borderColor='var(--green)'" onblur="this.style.borderColor='var(--border)'">
        </div>

        <!-- MODALIDAD + SEXO -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div>
            ${lbl('MODALIDAD')}
            <select id="glc_eq" onchange="window.GLC.eq=this.value;render()" style="${selStyle}">
              <option value="pl"  ${g.eq==='pl' ?'selected':''}>Classic PL</option>
              <option value="ple" ${g.eq==='ple'?'selected':''}>Equipado PL</option>
              <option value="bo"  ${g.eq==='bo' ?'selected':''}>Classic Bench</option>
              <option value="boe" ${g.eq==='boe'?'selected':''}>Equip. Bench</option>
            </select>
          </div>
          <div>
            ${lbl('SEXO')}
            <select id="glc_sex" onchange="glcUpdate()" style="${selStyle}">
              <option value="m" ${g.sex==='m'?'selected':''}>♂ Hombre</option>
              <option value="f" ${g.sex==='f'?'selected':''}>♀ Mujer</option>
            </select>
          </div>
        </div>
      </div>

    </div>
  </div>`;
}
  h+=`<div class="ftr">FECHIPO — Federación Chilena de Powerlifting · Afiliada a IPF & WADA<br>Resultados vía <a href="https://www.openpowerlifting.org" target="_blank">OpenPowerlifting.org</a> (Public Domain)</div>`;
  app.innerHTML=h;if(!ST.sel&&ST.v==="list"){const i=app.querySelector('.fl input');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length)}}
  // En home: ocultar el logo YourLift de esquina (ya está grande en el hero) pero MANTENER FECHIPO
  const isHome=(ST.v==='home'&&!ST.sel);
  const cs=document.querySelector('.corner-stack');
  if(cs)cs.style.display='flex';
  const clogo=document.querySelector('.corner-stack .corner-logo');
  if(clogo)clogo.style.display=isHome?'none':'block';
  // Reaplicar el video de fondo + ocultar el fondo opaco del hero (el render
  // reconstruye el DOM, así que hay que volver a aplicarlo en cada render).
  if(typeof setBgForSection==='function')setBgForSection(ST.v);
}

function sv(v){ST.v=v;ST.sel=null;ST.p=0;render();scrollTo(0,0);if(typeof setBgForSection==='function')setBgForSection(v);if(typeof trackPage==='function')trackPage(v)}
let _ssTimer=null;
function ss(v){ST.s=v;ST.p=0;if(_ssTimer)clearTimeout(_ssTimer);_ssTimer=setTimeout(()=>{render();setTimeout(()=>{const i=document.querySelector('.fl input');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length)}},10)},300)}
function sfc(v){ST.fc=v;ST.p=0;render()}
function sfk(v){ST.fk=v;ST.p=0;render()}
function sl(c){ST.sel=D.find(a=>a.codigo===c);render();scrollTo(0,0)}
function bk(){ST.sel=null;render()}
function mp(){ST.p++;render()}
function sr(t,l){if(t)ST.rt=t;if(l)ST.rl=l;render()}

Promise.all([fetch("data.json").then(r=>r.json()),fetch("records.json").then(r=>r.json()).catch(()=>({})),fetch("nominas.json").then(r=>r.json()).catch(()=>({events:[]}))]).then(([d,r,n])=>{D=d;R=r;NM=n;NM._static=[...(n.events||[])];render();initFB();setInterval(()=>{if(ST.v==="nominas"){loadFBNominas()}},30000)}).catch(e=>{document.getElementById("app").innerHTML=`<div class="ld"><p style="color:var(--accent);font-weight:600">Error cargando datos</p><p style="color:var(--muted);font-size:13px">${e.message}</p></div>`});
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js')
      .then(r=>console.log('[PWA] SW registered:',r.scope))
      .catch(e=>console.warn('[PWA] SW failed:',e));
  });
}
</script>
</body>
</html>
