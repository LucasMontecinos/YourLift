<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A1628;--card:#11223B;--border:#1E3A5F;--text:#D4E1F0;--muted:#7A8FA6;--accent:#C41E3A;--accent2:#E8243C;--blue:#1E5BA8;--gold:#D4A843;--green:#22c55e}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
/* === Header tipo enhanced.com === */
.corner-logo{position:fixed;top:16px;left:18px;z-index:100;height:46px;width:auto;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5));transition:opacity .2s}
.corner-logo:hover{opacity:.85}
.hamburger{position:fixed;top:18px;right:18px;z-index:101;width:46px;height:46px;background:rgba(10,22,40,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(212,168,67,.3);border-radius:10px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;cursor:pointer;transition:all .2s}
.hamburger:hover{border-color:var(--gold);background:rgba(212,168,67,.1)}
.hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:all .3s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.menu-overlay{position:fixed;inset:0;background:rgba(4,9,18,.6);backdrop-filter:blur(4px);z-index:99;opacity:0;pointer-events:none;transition:opacity .25s}
.menu-overlay.open{opacity:1;pointer-events:auto}
.side-menu{position:fixed;top:0;right:0;height:100vh;width:320px;max-width:85vw;background:rgba(8,16,30,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-left:1px solid rgba(212,168,67,.25);z-index:100;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);padding:80px 24px 24px;overflow-y:auto;box-shadow:-20px 0 60px rgba(0,0,0,.6)}
.side-menu.open{transform:translateX(0)}
.side-menu .mi{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:10px;cursor:pointer;font-family:Oswald,sans-serif;font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(220,230,245,.78);background:transparent;border:1px solid rgba(30,58,95,.4);margin-bottom:8px;transition:all .2s;position:relative;overflow:hidden}
.side-menu .mi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);transform:scaleY(0);transition:transform .2s;transform-origin:center}
.side-menu .mi:hover{background:rgba(196,30,58,.12);color:#fff;border-color:rgba(196,30,58,.4);transform:translateX(-3px)}
.side-menu .mi:hover::before{transform:scaleY(1)}
.side-menu .mi.active{background:rgba(196,30,58,.18);color:#fff;border-color:var(--accent)}
.side-menu .mi.active::before{transform:scaleY(1)}
.side-menu .mi .ic{font-size:18px;width:22px;text-align:center}
.side-menu .mi.special-g{border-color:rgba(34,197,94,.35);color:var(--green)}
.side-menu .mi.special-g:hover{background:rgba(34,197,94,.12);color:#fff;border-color:var(--green)}
.side-menu .mi.special-y{border-color:rgba(212,168,67,.35);color:var(--gold)}
.side-menu .mi.special-y:hover{background:rgba(212,168,67,.12);color:#fff;border-color:var(--gold)}
.menu-foot{position:absolute;bottom:20px;left:24px;right:24px;font-size:10px;color:var(--muted);text-align:center;font-family:Oswald;letter-spacing:1.5px;border-top:1px solid rgba(30,58,95,.4);padding-top:14px}
.ctn{padding-top:78px !important}
@media(max-width:520px){.corner-logo{height:38px;top:14px;left:14px}.hamburger{top:14px;right:14px}}
.ctn{max-width:940px;margin:0 auto;padding:16px 20px}
input,select,button{font-family:inherit}
a{color:var(--accent);text-decoration:none}
.hdr{text-align:center;padding:20px 0 16px}
.hdr h1{font-family:'Oswald',sans-serif;font-size:clamp(22px,5vw,30px);font-weight:700;letter-spacing:3px;text-transform:uppercase}
.hdr h1 .fe{color:var(--accent)}.hdr h1 .rs{font-weight:400}
.hdr p{color:var(--muted);font-size:13px;margin-top:4px}
.hl{width:60px;height:3px;background:linear-gradient(90deg,var(--accent),var(--gold));margin:10px auto 0;border-radius:2px}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-weight:600;font-size:12px;cursor:pointer;font-family:'Oswald',sans-serif;letter-spacing:1px;text-transform:uppercase;transition:all .2s}
.tab.a{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab:hover:not(.a){border-color:var(--muted)}
.st{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.sb{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;font-family:'Oswald',sans-serif;letter-spacing:.5px;text-transform:uppercase;transition:all .2s}
.sb.a{background:var(--blue);color:#fff;border-color:var(--blue)}
.fl{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.fl input{flex:1;min-width:200px;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;outline:none}
.fl input:focus{border-color:var(--accent)}
.fl select{padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;outline:none;cursor:pointer;max-width:220px}
.cnt{color:var(--muted);font-size:12px;margin-bottom:10px}
.ar{background:var(--card);border-radius:12px;padding:12px 16px;cursor:pointer;border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;transition:border-color .2s,transform .15s;margin-bottom:6px}
.ar:hover{border-color:var(--accent);transform:translateX(3px)}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.av.ac{background:linear-gradient(135deg,var(--accent),var(--gold))}.av.in{background:var(--border)}
.an{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.am{font-size:11px;color:var(--muted)}.am .cd{color:var(--accent);font-weight:600}
.cc{background:rgba(196,30,58,.15);color:var(--accent);padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600}
.bb{background:none;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;margin-bottom:20px;transition:border-color .2s}
.bb:hover{border-color:var(--accent);color:var(--text)}
.pc{background:linear-gradient(135deg,var(--card),var(--bg));border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:20px}
.pa{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff;font-family:'Oswald',sans-serif;flex-shrink:0}
.pn{font-size:clamp(18px,4vw,24px);font-weight:700;font-family:'Oswald',sans-serif;letter-spacing:.5px}
.pk{color:var(--accent);font-weight:600;font-size:14px;font-family:'Oswald',sans-serif;letter-spacing:1px}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fd{background:var(--bg);border-radius:10px;padding:10px 14px}.fd .lb{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}.fd .vl{font-size:14px;font-weight:600}
.cd2{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px}
.ct{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ct h2{font-size:16px;font-family:'Oswald',sans-serif;letter-spacing:1px;text-transform:uppercase}
.bg{border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700}
.bx{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.bi{background:var(--bg);border-radius:12px;padding:14px 10px;text-align:center;border:1px solid var(--border);position:relative;overflow:hidden}
.bi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--gold))}
.bv{font-size:clamp(18px,3.5vw,26px);font-weight:700;color:var(--gold);font-family:'Oswald',sans-serif}
.bu{font-size:11px;color:var(--muted)}.bl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.ce{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:10px;border-left:3px solid var(--border);transition:transform .15s}
.ce:hover{transform:translateX(3px)}
.tg{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-right:6px;margin-bottom:6px}
.cm{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:12px;margin-top:6px}
.cm .ll{color:var(--muted)}.cm .vv{font-weight:600}
.rb{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.rp{background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.2);border-radius:8px;padding:5px 8px;text-align:center;flex:1;min-width:55px}
.rp .rv{font-size:15px;font-weight:700;color:var(--gold);font-family:'Oswald',sans-serif}
.rp .rl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
.rk{background:linear-gradient(135deg,var(--accent),var(--gold));color:#fff;border-radius:8px;padding:5px 12px;font-weight:700;font-family:'Oswald',sans-serif;font-size:13px;display:inline-flex;align-items:center;gap:4px;margin-top:8px}
.sc{background:var(--card);border-radius:12px;padding:20px;text-align:center;border:1px solid var(--border)}
.sn{font-size:clamp(24px,5vw,34px);font-weight:700;font-family:'Oswald',sans-serif}
.sl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.rr{display:grid;grid-template-columns:40px 1fr 80px 60px 1fr 70px;gap:8px;padding:10px 12px;border-bottom:1px solid rgba(30,58,95,.4);font-size:13px;align-items:center}
.rr:hover{background:rgba(196,30,58,.04)}
.rh{font-weight:600;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border)}
.rpos{color:var(--gold);font-weight:700;font-family:'Oswald',sans-serif}
.rmk{color:var(--accent);font-weight:700;font-size:15px;font-family:'Oswald',sans-serif}
.emp{color:var(--muted);text-align:center;padding:40px 20px;font-size:14px}
.ftr{text-align:center;padding:30px 0;color:var(--muted);font-size:11px;border-top:1px solid var(--border);margin-top:40px}
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.sp{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes balloonUp{0%{transform:translateY(0) rotate(0deg);opacity:0.85}50%{opacity:0.9}100%{transform:translateY(-120vh) rotate(20deg);opacity:0}}
@media(max-width:640px){.fl{flex-direction:column}.fl select{max-width:none}.pg{grid-template-columns:1fr}.cm{grid-template-columns:1fr}.bx{grid-template-columns:repeat(3,1fr)}.rr{grid-template-columns:30px 1fr 60px 50px 1fr 55px;font-size:11px;gap:4px}.rp{min-width:48px;padding:4px 5px}.rp .rv{font-size:13px}table th,table td{padding:5px 3px!important;font-size:10px!important}}
</style>
</head>

function _applyNominas(all){
  const visible=all.filter(i=>i.status==='approved'||i.status==='pending');

  // Build events from NOM_EVENTS (loaded from Firestore eventos collection)
  // Show ALL non-archived events, even if they have 0 inscriptions
  const fbEvents=NOM_EVENTS
    .filter(ev=>ev.status!=='archived'&&ev.status!=='draft')
    .map(ev=>{
      const fbAths=(byEvent[ev.id]||byEvent[ev.name]||[])
        .sort((a,b)=>(a.timestamp?.seconds||0)-(b.timestamp?.seconds||0))
        .map((i,idx)=>({
          id:i.id,nombre:i.nombre,rut:i.rut||'',sexo:i.sexo||'',
          dob:i.fechaNac||'',division:i.division||'',categoria:i.categoria||'',

          universidad:i.universidad||'',status:i.status,
          sortOrder:idx+1,flight:i.flight||''
        }));
      const athletes=fbAths;
      const approved=fbAths.filter(a=>a.status==='approved').length;
      const pending=fbAths.filter(a=>a.status==='pending').length;
      return{...ev,athletes,fromFirebase:true,liveCount:{total:athletes.length,approved,pending}};
    });
  NM.events=fbEvents;
  render();
}

        const all=[];snap.forEach(d=>all.push({id:d.id,...d.data()}));

}
