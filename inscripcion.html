    const app = initializeApp(FIREBASE_CONFIG);

    return true;
  } catch(e) {
    console.error("Firebase init error:", e);

}

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Sanitiza un string para guardar en DB: elimina caracteres HTML peligrosos
// y colapsa espacios. No reemplaza a esc() al renderizar; es defensa en capas.
function sanitizeInput(s) {
  if (s == null) return '';
  return String(s).replace(/[<>"'`]/g,'').replace(/\s+/g,' ').trim();

// ══════════════════════════════════════════════
// FORMATTING HELPERS
// ══════════════════════════════════════════════
function formatName(val) {
  if (!val) return '';
  return val.trim().split(/\s+/).map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
}
function formatRut(val) {
  if (!val) return '';
  let r = val.replace(/[^0-9kK]/g, '').toUpperCase();
  if (r.length > 1 && !r.includes('-')) {
    r = r.slice(0, -1) + '-' + r.slice(-1);
  }
  return r;
}
// ── Validador RUT chileno (módulo 11) ──────────────────────────
// Devuelve {valid, dv, expected, msg}. Si valid=false, msg dice por qué.
function validateRut(val){
  if(!val) return {valid:false, msg:'RUT vacío'};
  const clean = val.replace(/[^0-9kK]/g,'').toUpperCase();
  if(clean.length < 2) return {valid:false, msg:'RUT muy corto'};
  if(clean.length > 9) return {valid:false, msg:'RUT muy largo'};
  const body = clean.slice(0,-1);
  const dv = clean.slice(-1);
  if(!/^\d+$/.test(body)) return {valid:false, msg:'Solo dígitos antes del DV'};
  // Cálculo módulo 11
  let sum = 0, mul = 2;
  for(let i = body.length - 1; i >= 0; i--){
    sum += parseInt(body[i],10) * mul;
    mul = mul === 7 ? 2 : mul + 1;
  }
  const r = 11 - (sum % 11);
  const expected = r === 11 ? '0' : (r === 10 ? 'K' : String(r));
  if(dv !== expected) return {valid:false, dv, expected, msg:'Dígito verificador incorrecto (esperado: '+expected+')'};
  return {valid:true, dv, expected};
}

// ══════════════════════════════════════════════
// ATHLETE DB & AUTO-CODE
// ══════════════════════════════════════════════
let athleteDB = [];
fetch('data.json?v='+Date.now()).then(r => r.json()).then(d => { athleteDB = d; }).catch(() => {});

function findAthleteByRut(rut) {
  if (!rut) return null;
  const clean = rut.replace(/[^0-9kK]/g, '').toUpperCase();
  if (clean.length < 5) return null;
  return athleteDB.find(a => {
    const dbRut = (a.rut || '').replace(/[^0-9kK]/g, '').toUpperCase();
    return dbRut && dbRut === clean;
  }) || null;
}

function generateCode(rut, nombre) {
  if (!rut || !nombre) return '';
  const rutDigits = rut.replace(/[^0-9]/g, '');
  if (rutDigits.length < 4) return '';
  const prefix = rutDigits.slice(0, 4);
  const parts = nombre.trim().split(/\s+/).filter(w => w.length > 0);
  // First name + apellidos (skip second name if 4+ words)
  let initials = '';
  if (parts.length >= 3) {
    initials = parts[0].charAt(0) + parts[parts.length - 2].charAt(0) + parts[parts.length - 1].charAt(0);
  } else if (parts.length === 2) {
    initials = parts[0].charAt(0) + parts[1].charAt(0);
  } else {
    initials = parts[0].charAt(0);
  }
  initials = initials.toUpperCase();
  const year = new Date().getFullYear();
  return prefix + initials + '-' + year;
}

function autoFillCode() {
  const f = state.form;
  const rut = formatRut(f.rut);
  if (!rut) return;

  // Buscar por RUT en base de datos
  const found = findAthleteByRut(rut);
  if (found && found.codigo) {
    // ATLETA EXISTENTE → autocompletar nombre completo, sexo, fecha de nacimiento
    const nameChanged = (found.nombre || '').trim() && (found.nombre || '').trim() !== (f.nombre || '').trim();
    f.codigo = found.codigo;
    f._codigoSource = 'db';
    // Nombre completo de la base (sobreescribe el que el atleta haya tipeado mal)
    if (found.nombre && found.nombre.trim()) {
      f.nombre = found.nombre.trim();
    }
    // Avisar al atleta que se autocompletó
    if (nameChanged) {
      state.success = '✓ Atleta encontrado — autocompletamos tu nombre completo, fecha y sexo';
      setTimeout(() => { if (state.success.includes('autocompletamos')) { state.success = ''; render(); } }, 4000);
    }
    // Fecha de nacimiento (formato: yyyy-mm-dd para input[type=date])
    if (found.fechaNac && !f.fechaNac) {
      // Convertir dd/mm/yyyy → yyyy-mm-dd si hace falta
      let fn = found.fechaNac.trim();
      const m = fn.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      if (m) fn = `${m[3]}-${m[2]}-${m[1]}`;
      f.fechaNac = fn;
    }
    // Club
    if (!f.club && found.club) f.club = found.club;
    // Sexo y ciudad: el atleta los completa manualmente
    // Re-renderizar para reflejar los datos autocompletados
    render();
    return;
  }

  // ATLETA NUEVO → necesita el nombre tipeado para generar código
  const nombre = formatName(f.nombre);
  if (!nombre) return;
  const code = generateCode(rut, nombre);
  if (code) {
    f.codigo = code;
    f._codigoSource = 'new';
  }
  // Update DOM directly (no rerender, evita perder foco del input)
  const el = document.getElementById('codigoInput');
  const lb = document.getElementById('codigoLabel');
  if (el) {
    el.value = f.codigo;
    el.style.borderColor = f.codigo ? 'var(--gold)' : 'var(--border)';
  }
  if (lb) {
    lb.textContent = f._codigoSource === 'new' ? 'Nuevo atleta — código generado automáticamente' : '';
    lb.style.color = 'var(--orange, #f59e0b)';
  }
}

// Autorellena ciudad/región (comuna, zona) desde la última inscripción del atleta.
// El correo NO se autorrellena (es privado). No sobreescribe lo que el atleta ya escribió.
async function autoFillContact() {
  const f = state.form;
  const rut = formatRut(f.rut);
  if (!rut || !firebaseReady) return;
  if (f.comuna && f.zona) return; // ya tiene ambos, no consultar
  try {
    const q = window.FB.query(window.FB.collection(db, 'inscripciones'), window.FB.where('rut', '==', rut));
    const snap = await window.FB.getDocs(q);
    let cands = [];
    snap.forEach(d => cands.push(d.data()));
    cands = cands.filter(c => c.status !== 'rejected' && (c.comuna || c.zona));
    if (!cands.length) return;
    cands.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
    const last = cands[0];
    let changed = false;
    if (!f.comuna && last.comuna) { f.comuna = last.comuna; changed = true; }
    if (!f.zona && last.zona) { f.zona = last.zona; changed = true; }
    if (changed) render();
  } catch (e) { /* silencioso: si falla, el atleta llena a mano */ }
}

// ── Firestore eventos ────────────────────────────────────────
async function loadEventos() {
  if (!firebaseReady) {
    // Without Firebase, show nothing — events only come from admin
    EVENTS = [];
    render();
    return;
  }
  try {
    if (!window._eventosListener) {
      window._eventosListener = window.FB.onSnapshot(
        window.FB.collection(db, 'eventos'),
        (snap) => {
          EVENTS = snap.docs.map(d => ({...d.data(), id: d.id}))
            .sort((a,b) => (a.date||'').localeCompare(b.date||''));
          render();
        }
      );
    }
    // Cargar fotos ya aprobadas (atleta_fotos) — si el atleta ya tiene foto
    // no le pediremos otra al inscribirse.
    if (!window._fotosListener) {
      window.FOTOS_BY_RUT = window.FOTOS_BY_RUT || {};
      window._fotosListener = window.FB.onSnapshot(
        window.FB.collection(db, 'atleta_fotos'),
        (snap) => {
          window.FOTOS_BY_RUT = {};
          snap.docs.forEach(d => {
            const data = d.data();
            if (data.foto_url && data.status !== 'rejected' && data.rut) {
              const key = String(data.rut).replace(/[^0-9kK]/g,'').toLowerCase();
              if (key) window.FOTOS_BY_RUT[key] = data.foto_url;
            }
          });
        }
      );
    }
  } catch(e) {
    console.warn('Eventos load error', e);
    EVENTS = [];
    render();
  }
}

// Helper: ¿el atleta del RUT ya tiene una foto aprobada?
window.atletaTieneFoto = function(rut){
  if(!rut) return false;
  const key = String(rut).replace(/[^0-9kK]/g,'').toLowerCase();
  return !!(window.FOTOS_BY_RUT && window.FOTOS_BY_RUT[key]);
};

function openEventsFromFirebase() {
  // Solo eventos abiertos Y cuya pre-nómina aún no haya cerrado.
  const now = new Date();
  return EVENTS.filter(e => {
    if (e.status !== 'open') return false;
    // Si tiene preNominaCloseAt (datetime-local: 'YYYY-MM-DDTHH:MM'), validar que aún no pasó.
    if (e.preNominaCloseAt) {
      const close = new Date(e.preNominaCloseAt);
      if (!isNaN(close) && now > close) return false;
    }
    return true;
  });
}

// Helper para mostrar el tiempo restante hasta el cierre de pre-nómina
function timeUntilPreClose(ev) {
  if (!ev?.preNominaCloseAt) return null;
  const close = new Date(ev.preNominaCloseAt);
  if (isNaN(close)) return null;
  const diff = close - new Date();
  if (diff <= 0) return 'CERRADO';
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  if (days > 0) return `${days}d ${hours}h restantes`;
  if (hours > 0) return `${hours}h ${mins}min restantes`;
  return `${mins}min restantes`;
}

  if (state.view === 'admin') { app.innerHTML = renderAdmin(); return; }
  if (state.view === 'confirm') { app.innerHTML = renderConfirm(); return; }
  if (state.view === 'edit_lookup') { app.innerHTML = renderEditLookup(); return; }
  if (state.view === 'edit') { app.innerHTML = renderEdit(); return; }
  app.innerHTML = renderForm();
}

        <input type="file" accept="image/*,.pdf" onchange="handleFile(this,'carnet')">
        ${state.carnetName ? `<div class="icon">✅</div><div class="fname">${state.carnetName}</div><div class="txt">Click para cambiar</div>` : `<div class="icon">📷</div><div class="txt">${isIPFWorld?'Foto/escaneo del pasaporte vigente':'Arrastra o haz click para subir imagen del carnet'}</div><div style="font-size:10px;color:var(--muted);margin-top:4px">JPG, PNG o PDF · Máx 10MB</div>`}
      </div>
    </div>
    <div class="field">
      <label>${isIPFWorld?'Certificación WADA Internacional <span style="color:#ef4444;font-weight:700">*</span>':'Certificado ADEL/WADA <span style="color:#ef4444;font-weight:700">*</span> <span style="font-size:10px;color:var(--muted);text-transform:none;letter-spacing:0;font-weight:400">(atletas internacionales) / Carnet SENADIS (atletas OE)</span>'}</label>
      <div class="upload-zone ${state.wadeName?'done':''}" id="wadeZone">
        <input type="file" accept="image/*,.pdf" onchange="handleFile(this,'wade')">
        ${state.wadeName ? `<div class="icon">✅</div><div class="fname">${state.wadeName}</div><div class="txt">Click para cambiar</div>` : `<div class="icon">📄</div><div class="txt">${isIPFWorld?'Certificación WADA internacional vigente':'Certificado ADEL/WADA (internacional) · Carnet SENADIS (OE)'}</div><div style="font-size:10px;color:var(--muted);margin-top:4px">JPG, PNG o PDF · Máx 10MB</div>`}
      </div>
    </div>
    ${isIPFWorld?`
    <div class="field">
      <label>Foto oficial — fondo blanco, sin accesorios <span class="req">*</span></label>
      <div class="upload-zone ${state.carnetPhotoName?'done':''}" id="carnetPhotoZone">
        <input type="file" accept="image/*" onchange="handleFile(this,'carnetPhoto')">
        ${state.carnetPhotoName ? `<div class="icon">✅</div><div class="fname">${state.carnetPhotoName}</div><div class="txt">Click para cambiar</div>` : `<div class="icon">📸</div><div class="txt">Foto de rostro con fondo blanco, sin accesorios (gorra, lentes, joyas)</div><div style="font-size:10px;color:var(--muted);margin-top:4px">JPG, PNG · Máx 10MB</div>`}
      </div>
    </div>
    <div class="field">
      <div style="background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.4);border-radius:10px;padding:14px 16px;margin-bottom:12px">
        <div style="font-size:13px;font-weight:600;color:#60a5fa;margin-bottom:4px">📋 Consentimiento IPF</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.5">Descargá el formulario IPF, completalo y firmalo. Luego subí el documento firmado.</div>
        <a href="IPF%20Consentimiento.pdf" download="IPF Consentimiento.pdf" style="display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:8px 14px;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.5);border-radius:6px;color:#60a5fa;font-size:12px;font-weight:600;text-decoration:none;font-family:Oswald,sans-serif;letter-spacing:1px">
          ⬇ DESCARGAR IPF CONSENTIMIENTO
        </a>
      </div>
      <label>IPF Consentimiento firmado <span class="req">*</span></label>
      <div class="upload-zone ${state.ipfConsentName?'done':''}" id="ipfConsentZone">
        <input type="file" accept="image/*,.pdf" onchange="handleFile(this,'ipfConsent')">
        ${state.ipfConsentName
          ? `<div class="icon">✅</div><div class="fname">${state.ipfConsentName}</div><div class="txt">Click para cambiar</div>`
          : `<div class="icon">📋</div><div class="txt">Sube el formulario IPF completado y firmado</div><div style="font-size:10px;color:var(--muted);margin-top:4px">PDF o imagen · Máx 10MB</div>`}
      </div>
    </div>
    <div class="field">
      <label>Concentración de notas <span class="req">*</span></label>
      <div class="upload-zone ${state.notasName?'done':''}" id="notasZone">
        <input type="file" accept="image/*,.pdf" onchange="handleFile(this,'notas')">
        ${state.notasName
          ? `<div class="icon">✅</div><div class="fname">${state.notasName}</div><div class="txt">Click para cambiar</div>`
          : `<div class="icon">📚</div><div class="txt">Documento oficial de notas / certificado académico</div><div style="font-size:10px;color:var(--muted);margin-top:4px">PDF o imagen · Máx 10MB</div>`}
      </div>
    </div>
    ` : ''}
    ${!isIPFWorld && isMinor(f.fechaNac) ? `
    <div class="field">
      <div style="background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.35);border-radius:10px;padding:14px 16px;margin-bottom:12px">
        <div style="font-size:13px;font-weight:600;color:var(--gold);margin-bottom:4px">⚠️ Atleta menor de edad</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.5">El padre, madre o tutor legal debe completar y firmar el formulario de consentimiento de responsabilidad.</div>
        <a href="consentimiento_menores.pdf" download style="display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:8px 14px;background:rgba(212,168,67,.15);border:1px solid rgba(212,168,67,.5);border-radius:6px;color:var(--gold);font-size:12px;font-weight:600;text-decoration:none;font-family:Oswald,sans-serif;letter-spacing:1px">
          ⬇ DESCARGAR FORMULARIO PDF
        </a>
      </div>
      <label>Consentimiento de Responsabilidad (firmado) <span class="req">*</span></label>
      <div class="upload-zone ${state.consentimientoName?'done':''}" id="consentimientoZone">
        <input type="file" accept="image/*,.pdf" onchange="handleFile(this,'consentimiento')">
        ${state.consentimientoName
          ? `<div class="icon">✅</div><div class="fname">${state.consentimientoName}</div><div class="txt">Click para cambiar</div>`
          : `<div class="icon">📋</div><div class="txt">Sube el formulario completado y firmado</div><div style="font-size:10px;color:var(--muted);margin-top:4px">Foto o PDF del documento firmado · Máx 10MB</div>`}
      </div>
    </div>` : ''}
    ${(()=>{
      // En IPF Worlds la foto blanca ya se pidió arriba, no duplicar
      if(isIPFWorld) return '';
      const ev = EVENTS.find(e=>e.id===f.evento);
      const requiere = ev?.requiereFoto;
      const yaTiene = window.atletaTieneFoto && window.atletaTieneFoto(f.rut);
      if(!requiere) return '';
      if(yaTiene){
        // Ya tiene foto aprobada → mostramos confirmación, no se pide otra
        return `
        <div class="field">
          <label>Foto tipo Carnet</label>
          <div style="display:flex;align-items:center;gap:10px;padding:14px;background:rgba(34,197,94,.08);border:1px solid var(--green);border-radius:8px">
            <span style="font-size:22px">✅</span>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:600;color:var(--green)">Foto ya cargada</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px">El sistema usará la foto que tenés en tu perfil. No necesitás subir otra. Si querés cambiarla, contactá al admin.</div>
            </div>
          </div>
        </div>`;
      }
      // No tiene foto → pedir la foto normalmente
      return `
      <div class="field">
        <label>Foto tipo Carnet (fondo blanco) <span class="req">*</span></label>
        <div class="upload-zone ${state.carnetPhotoName?'done':''}" id="carnetPhotoZone">
          <input type="file" accept="image/*" onchange="handleFile(this,'carnetPhoto')">
          ${state.carnetPhotoName ? `<div class="icon">✅</div><div class="fname">${state.carnetPhotoName}</div><div class="txt">Click para cambiar</div>` : `<div class="icon">📸</div><div class="txt">Foto de rostro con fondo blanco (tipo carnet)</div><div style="font-size:10px;color:var(--muted);margin-top:4px">JPG, PNG · Máx 10MB</div>`}
        </div>
      </div>`;
    })()}
    
    <!-- Summary -->
    <div style="background:var(--bg);border-radius:10px;padding:16px;margin-top:16px;border:1px solid var(--border)">
      <h4 class="os" style="font-size:13px;letter-spacing:1px;color:var(--gold);margin-bottom:10px">RESUMEN DE INSCRIPCIÓN</h4>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px">
        <div><span style="color:var(--muted)">Evento:</span> <strong>${EVENTS.find(e=>e.id===f.evento)?.name||''}</strong></div>
        <div><span style="color:var(--muted)">Atleta:</span> <strong>${f.nombre}</strong></div>
        <div><span style="color:var(--muted)">RUT:</span> ${f.rut}</div>
        <div><span style="color:var(--muted)">Club:</span> ${f.club==='Otro'?f.clubOtro:f.club}</div>
        <div><span style="color:var(--muted)">División:</span> ${f.division}</div>
        <div><span style="color:var(--muted)">Categoría:</span> ${f.categoria}</div>
        <div><span style="color:var(--muted)">Modalidad:</span> ${f.modalidad}</div>
        <div><span style="color:var(--muted)">${isIPFWorld?'Pasaporte':'Carnet'}:</span> ${state.carnetName?'✅':'❌ Falta'}</div>
        <div><span style="color:var(--muted)">${isIPFWorld?'WADA Internacional':'WADA/ADEL'}:</span> ${state.wadeName?'✅':'❌ Falta'}</div>
        ${isIPFWorld?`
          <div><span style="color:var(--muted)">Foto fondo blanco:</span> ${state.carnetPhotoName?'✅':'❌ Falta'}</div>
          <div><span style="color:var(--muted)">IPF Consentimiento:</span> ${state.ipfConsentName?'✅':'❌ Falta'}</div>
          <div><span style="color:var(--muted)">Concentración de notas:</span> ${state.notasName?'✅':'❌ Falta'}</div>
        `:''}
        ${!isIPFWorld && isMinor(f.fechaNac)?`<div><span style="color:var(--muted)">Consentimiento:</span> ${state.consentimientoName?'✅':'❌ Falta'}</div>`:''}

        ${(()=>{
          if(isIPFWorld) return ''; // ya cubierto arriba
          const requiere = EVENTS.find(e=>e.id===f.evento)?.requiereFoto;
          if(!requiere) return '';
          const yaTiene = window.atletaTieneFoto && window.atletaTieneFoto(f.rut);
          if(yaTiene) return '<div><span style="color:var(--muted)">Foto carnet:</span> ✅ (perfil)</div>';
          return `<div><span style="color:var(--muted)">Foto carnet:</span> ${state.carnetPhotoName?'✅':'❌ Falta'}</div>`;
        })()}
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;margin-top:20px">
      <button class="btn btn-outline" onclick="prevStep()">← Atrás</button>
      <button class="btn btn-green" onclick="submitForm()" ${(()=>{
        if(!state.carnetName) return 'disabled';
        if(!state.wadeName) return 'disabled';
        if(state.submitting) return 'disabled';
        if(isIPFWorld){
          if(!state.carnetPhotoName) return 'disabled';
          if(!state.ipfConsentName) return 'disabled';
          if(!state.notasName) return 'disabled';
        } else {
          if(isMinor(f.fechaNac) && !state.consentimientoName) return 'disabled';
          const requiere = EVENTS.find(e=>e.id===f.evento)?.requiereFoto;
          if(requiere){
            const yaTiene = window.atletaTieneFoto && window.atletaTieneFoto(f.rut);
            if(!yaTiene && !state.carnetPhotoName) return 'disabled';
          }
        }
        return '';
      })()}>${state.submitting?'<span class="sp"></span> Enviando...':'✓ Enviar Inscripción'}</button>
    </div></div>`;
    } // cierre else (legacy docs)
  }

  h += `</div>`;
  return h;
}

function renderAdmin() {
  if (!state.adminAuth) {
    return `<div class="fade" style="max-width:400px;margin:80px auto;text-align:center">
      <h2 class="os" style="font-size:22px;letter-spacing:2px;margin-bottom:20px">🔒 PANEL ADMIN</h2>
      <div class="field"><label>Email</label>
        <input class="input" type="email" id="adminEmail" placeholder="admin@yourlift.cl" autocomplete="email">
      </div>
      <div class="field"><label>Contraseña</label>
        <input class="input" type="password" id="adminPass" autocomplete="current-password" onkeydown="if(event.key==='Enter')authAdmin()">
      </div>
      ${state.error ? `<div class="alert alert-error" style="margin:8px 0">${state.error}</div>` : ''}
      <button class="btn btn-accent" onclick="authAdmin()">Acceder</button>
      <div style="margin-top:12px"><button class="btn btn-outline" onclick="state.view='form';state.error='';render()" style="font-size:11px">← Volver al formulario</button></div>
    </div>`;
  }

  const ins = state.inscripciones;
  const filtered = ins.filter(i => {
    if (state.adminFilter !== 'all' && i.status !== state.adminFilter) return false;
    if (state.adminEvent && i.evento !== state.adminEvent) return false;
    return true;
  });
  const pending = ins.filter(i=>i.status==='pending').length;
  const approved = ins.filter(i=>i.status==='approved').length;

  let h = `<div class="fade" style="margin-top:20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div>
        <h2 class="os" style="font-size:22px;letter-spacing:1px">PANEL DE INSCRIPCIONES</h2>
        <p style="font-size:12px;color:var(--muted)">${ins.length} total · ${pending} pendientes · ${approved} aprobados</p>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-green" onclick="exportNominas()" style="padding:8px 14px;font-size:11px">📥 Exportar Nóminas</button>
        <span id="adminLiveStatus" style="font-size:10px;padding:4px 10px;border-radius:6px;border:1px solid rgba(34,197,94,.3);background:rgba(34,197,94,.08);color:var(--green);">🔴 EN VIVO</span><button class="btn btn-green" onclick="approveAllPending()" style="padding:8px 14px;font-size:11px">✓ Aprobar pendientes</button>
      </div>
    </div>`;

  // Stats cards
  h += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">
    ${[['Pendientes',pending,'var(--gold)'],['Aprobados',approved,'var(--green)'],['Total',ins.length,'var(--blue)']].map(([l,v,c]) => 
      `<div class="card" style="text-align:center;padding:14px"><div class="os" style="font-size:24px;color:${c};font-weight:700">${v}</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px">${l}</div></div>`
    ).join('')}
  </div>`;

  // Filters
  h += `<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
    ${[['all','Todos'],['pending','Pendientes'],['approved','Aprobados'],['rejected','Rechazados']].map(([k,l]) => 
      `<button class="btn ${state.adminFilter===k?'btn-accent':'btn-outline'}" onclick="state.adminFilter='${k}';render()" style="padding:6px 12px;font-size:11px">${l}</button>`
    ).join('')}
    <select class="input" style="width:auto;padding:6px 10px;font-size:11px" onchange="state.adminEvent=this.value;render()">
      <option value="">Todos los eventos</option>
      ${EVENTS.map(e => `<option value="${e.id}" ${state.adminEvent===e.id?'selected':''}>${e.name}</option>`).join('')}
    </select>
  </div>`;

  // Table
  if (filtered.length === 0) {
    h += `<div class="card" style="text-align:center;padding:40px;color:var(--muted)">No hay inscripciones ${state.adminFilter!=='all'?state.adminFilter:''}</div>`;
  } else {
    h += `<div class="card" style="padding:0;overflow-x:auto"><table class="tbl">
      <thead><tr><th>#</th><th>Atleta</th><th>RUT</th><th>Evento</th><th>Cat.</th><th>Club</th><th>Docs</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody>`;
    filtered.forEach((i, idx) => {
      const evName = EVENTS.find(e=>e.id===i.evento)?.name || i.evento;
      const safeId = encodeURIComponent(i.id);
      h += `<tr>
        <td style="color:var(--muted)">${idx+1}</td>
        <td style="font-weight:600;white-space:nowrap">${esc(i.nombre)}</td>
        <td style="font-size:11px">${esc(i.rut)}</td>
        <td style="font-size:10px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(evName)}</td>
        <td><span class="tag" style="background:rgba(212,168,67,.12);color:var(--gold)">${esc(i.categoria)}</span></td>
        <td style="font-size:11px">${esc(i.club==='Otro'?i.clubOtro:i.club)}</td>
        <td>${i.carnetName?'📷':'❌'} ${i.wadeName?'📄':''}</td>
        <td><span class="status-${esc(i.status)}" style="font-weight:700;font-size:11px;text-transform:uppercase">${i.status==='pending'?'⏳ Pendiente':i.status==='approved'?'✅ Aprobado':'❌ Rechazado'}</span></td>
        <td style="white-space:nowrap">
          ${i.status!=='approved'?`<button class="btn btn-green" style="padding:4px 8px;font-size:10px" onclick="updateStatus('${safeId}','approved')">✓</button>`:''}
          ${i.status!=='rejected'?`<button class="btn" style="padding:4px 8px;font-size:10px;background:var(--red);color:#fff" onclick="updateStatus('${safeId}','rejected')">✗</button>`:''}
          ${i.status!=='pending'?`<button class="btn btn-outline" style="padding:4px 8px;font-size:10px" onclick="updateStatus('${safeId}','pending')">↺</button>`:''}
        </td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
  }
  
  h += `</div>`;
  return h;
}

function renderEdit() {
  const f = state.form;
  const cats = f.sexo === 'Femenino' ? CATEGORIES_F : CATEGORIES_M;
  const ev = EVENTS.find(e => e.id === f.evento);
  const isUni = (ev?.extraCols||[]).includes('universidad');
  
  let h = `<div class="fade" style="max-width:600px;margin:30px auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">

    ${state.error?`<div class="alert alert-error">⚠️ ${state.error}</div>`:''}
    ${state.success?`<div class="alert alert-success">✅ ${state.success}</div>`:''}
    <div class="card" style="margin-bottom:12px;padding:12px 16px;border-left:3px solid var(--gold)">
      <span style="font-size:12px;color:var(--gold);font-family:Oswald;letter-spacing:1px">${ev?ev.name:'Evento'}</span>

    <div class="card">
      <div class="field">
        <label>Nombre Completo</label>
        <input class="input" type="text" value="${f.nombre}" oninput="upd('nombre',this.value)" onblur="upd('nombre',formatName(this.value));this.value=state.form.nombre">

      <div class="row">
        <div class="field">

          <input class="input" type="text" value="${f.rut}" disabled style="opacity:.6">
        </div>
        <div class="field">
          <label>Código FECHIPO</label>
          <input class="input" type="text" value="${f.codigo}" readonly style="background:rgba(212,168,67,.06);cursor:default;${f.codigo?'border-color:var(--gold)':''}">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Sexo</label>
          <select class="input" onchange="updR('sexo',this.value)">
            <option value="">Seleccionar...</option>
            <option ${f.sexo==='Masculino'?'selected':''}>Masculino</option>
            <option ${f.sexo==='Femenino'?'selected':''}>Femenino</option>
          </select>
        </div>
        <div class="field">
          <label>Fecha de Nacimiento</label>
          <input class="input" type="date" value="${f.fechaNac}" oninput="upd('fechaNac',this.value)" onblur="render()">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>División</label>
          <select class="input" onchange="updR('division',this.value)">
            <option value="">Seleccionar...</option>
            ${DIVISIONS.map(d => `<option ${f.division===d?'selected':''}>${d}</option>`).join('')}
            ${isUni?`<option ${f.division==='Universitario'?'selected':''}>Universitario</option>`:''}
          </select>
        </div>
        <div class="field">
          <label>Categoría de Peso</label>
          <select class="input" onchange="updR('categoria',this.value)">
            <option value="">Seleccionar...</option>
            ${cats.map(c => `<option ${f.categoria===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Modalidad</label>
          <select class="input" onchange="updR('modalidad',this.value)">
            <option value="">Seleccionar...</option>
            ${MODALITIES.map(m => `<option ${f.modalidad===m?'selected':''}>${m}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Club</label>
          <select class="input" onchange="updR('club',this.value)">
            <option value="">Seleccionar club...</option>
            ${CLUBS.map(c => `<option ${f.club===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
      </div>
      ${isUni?`<div class="field">
        <label>Universidad</label>
        <input class="input" type="text" value="${f.universidad||''}" oninput="upd('universidad',this.value)">
      </div>`:''}
      <div class="field">
        <label>Ciudad y Región <span class="req">*</span></label>
        <input class="input ${f.comuna?'ok':''}" type="text" placeholder="ej: Talca, Región del Maule" value="${f.comuna}" oninput="upd('comuna',this.value)">
      </div>
    </div>
    <div style="text-align:right;margin-top:12px">
      <button class="btn btn-g" onclick="saveEdit()" ${state.submitting||state.success?'disabled':''}>
        ${state.submitting?'Enviando solicitud...':(state.success?'✓ Solicitud enviada':'📨 Enviar solicitud de edición')}
      </button>
    </div>
  </div>`;
  return h;
}

// ══════════════════════════════════════════════
// EDIT HANDLERS
// ══════════════════════════════════════════════
// La edición ya no es directa — el atleta envía una solicitud a
// `edit_requests` y el admin la revisa (valida el PIN contra
// `inscripciones_private`). Esto evita exponer el PIN en la colección
// pública de inscripciones.
async function lookupEdit() {
  const rut = formatRut(document.getElementById('editRut')?.value || '');
  const pin = document.getElementById('editPin')?.value || '';
  if (!rut || !pin) { state.error = 'Ingresa RUT y PIN'; render(); return; }
  const rutCheck = validateRut(rut);
  if (!rutCheck.valid) { state.error = 'RUT inválido: ' + rutCheck.msg; render(); return; }
  if (!/^\d{4}$/.test(pin)) { state.error = 'El PIN debe ser de 4 dígitos'; render(); return; }

  state.error = '';
  try {
    // Busca por RUT en la colección pública. El PIN ya no vive acá, así
    // que no validamos aquí — el admin lo verifica al aprobar.
    let candidates = [];
    if (firebaseReady) {
      const q = window.FB.query(window.FB.collection(db, 'inscripciones'), window.FB.where('rut', '==', rut));
      const snap = await window.FB.getDocs(q);
      snap.forEach(d => candidates.push({id: d.id, ...d.data()}));
    } else {
      candidates = demoGetAll().filter(i => formatRut(i.rut) === rut);
    }
    // Solo inscripciones activas (no rechazadas).
    candidates = candidates.filter(c => c.status !== 'rejected');
    if (!candidates.length) { state.error = 'No se encontró inscripción activa con ese RUT'; render(); return; }
    // Si hay varias, elegimos la más reciente por timestamp.
    candidates.sort((a,b) => (b.timestamp?.seconds||0) - (a.timestamp?.seconds||0));
    const found = candidates[0];

    // VERIFICAR cierre de pre-nómina: si ya pasó, NO se puede editar
    // (solo el admin puede modificar inscripciones post-cierre)
    const ev = EVENTS.find(e => e.id === found.evento);
    if (ev?.preNominaCloseAt) {
      const close = new Date(ev.preNominaCloseAt);
      if (!isNaN(close) && new Date() > close) {
        const fechaCierre = close.toLocaleString('es-CL', {dateStyle:'short', timeStyle:'short'});
        state.error = '🔒 La pre-nómina cerró el ' + fechaCierre + '. Ya no podés editar tu inscripción.\n\nPara cambios de categoría o bajas, contactá al admin del evento.';
        render();
        return;
      }
    }

    state.editId = found.id;
    state.editDoc = found;
    state.form = {
      evento: found.evento || '',
      nombre: found.nombre || '',
      rut: found.rut || '',
      codigo: found.codigo || '',
      sexo: found.sexo || '',
      fechaNac: found.fechaNac || '',
      division: found.division || '',
      categoria: found.categoria || '',
      modalidad: found.modalidad || '',
      club: found.club || '',
      clubOtro: found.clubOtro || '',
      zona: found.zona || '',
      comuna: found.comuna || '',
      pin: pin, // del input, se usará al enviar la solicitud
      universidad: found.universidad || '',
    };
    state.view = 'edit';
    state.error = '';
    state.success = '';
    render();
  } catch(e) {
    state.error = 'Error buscando: ' + e.message;
    render();
  }
}

async function saveEdit() {
  state.submitting = true;
  state.error = '';
  state.success = '';
  render();

  try {
    const f = state.form;
    // Re-validar el cierre de pre-nómina al momento de enviar
    // (el atleta pudo abrir el form ANTES del cierre y enviar DESPUÉS)
    const ev = EVENTS.find(e => e.id === f.evento);
    if (ev?.preNominaCloseAt) {
      const close = new Date(ev.preNominaCloseAt);
      if (!isNaN(close) && new Date() > close) {
        state.submitting = false;
        state.error = '🔒 La pre-nómina cerró mientras editabas. Tu solicitud no se envió. Contactá al admin del evento.';
        render();
        return;
      }
    }
    // Solo campos editables por el atleta. NO evento, status, flight,
    // sortOrder, rut, carnetURL, wadeURL, pin.
    const changes = {
      nombre: sanitizeInput(f.nombre.trim()),
      codigo: sanitizeInput(f.codigo.trim()),
      sexo: f.sexo,
      fechaNac: f.fechaNac,
      division: f.division,
      categoria: f.categoria,
      modalidad: f.modalidad,
      club: sanitizeInput(f.club),
      clubOtro: sanitizeInput(f.clubOtro),
      zona: f.zona,
      comuna: sanitizeInput(f.comuna),
      universidad: sanitizeInput(f.universidad || ''),
    };

    if (firebaseReady) {
      // Crea una solicitud de edición. El admin la revisa y aplica.
      await window.FB.addDoc(window.FB.collection(db, 'edit_requests'), {
        inscripcionId: state.editId,
        rut: f.rut,
        pin: f.pin,
        changes: changes,
        status: 'pending',
        ts: window.FB.serverTimestamp(),
      });
    } else {
      demoUpdate(state.editId, changes);
    }

    state.submitting = false;
    state.success = 'Tu solicitud de edición fue enviada. El organizador la revisará y se aplicarán los cambios si el PIN es correcto.';
    render();
  } catch(e) {
    state.error = 'Error al enviar solicitud: ' + e.message;
    state.submitting = false;
    render();
  }
}

// HANDLERS
// ══════════════════════════════════════════════
function upd(key, val) {
  state.form[key] = val;
  // Actualiza el botón Siguiente sin re-renderizar (evita perder foco)
  _refreshStep1Btn();
}
function _refreshStep1Btn() {
  if (state.step !== 1) return;
  const btn = document.getElementById('step1NextBtn');
  if (!btn) return;
  const f = state.form;
  btn.disabled = !(f.nombre && f.rut && f.sexo && f.fechaNac && f.club && f.comuna && f.pin && f.pin.length === 4);
}
function updR(key, val) { state.form[key] = val; render(); _refreshStep1Btn(); }

function selectEvent(id) { state.form.evento = id; render(); }

function nextStep() {
  state.error = '';
  // Validate current step
  const f = state.form;
  if (state.step === 0 && !f.evento) { state.error = 'Selecciona un evento'; render(); return; }
  if (state.step === 1) {
    if (!f.nombre || !f.rut || !f.sexo || !f.fechaNac || !f.club || !f.comuna || !f.pin || f.pin.length !== 4) { state.error = 'Completa todos los campos obligatorios (incluye ciudad/región y PIN de 4 dígitos)'; render(); return; }
    if (!validateRut(f.rut).valid) { state.error = 'RUT inválido: ' + validateRut(f.rut).msg; render(); return; }
  }
  if (state.step === 2) {
    if (!f.division || !f.categoria || !f.modalidad) { state.error = 'Completa todos los campos obligatorios'; render(); return; }
  }
  state.step = Math.min(state.step + 1, 3);
  render();
  window.scrollTo(0, 0);
}

function prevStep() { state.step = Math.max(state.step - 1, 0); render(); window.scrollTo(0, 0); }

function isMinor(fechaNac) {
  if (!fechaNac) return false;
  const dob = new Date(fechaNac + 'T00:00:00');
  const hoy = new Date();
  let age = hoy.getFullYear() - dob.getFullYear();
  const m = hoy.getMonth() - dob.getMonth();
  if (m < 0 || (m === 0 && hoy.getDate() < dob.getDate())) age--;
  return age < 18;
}

function handleFile(input, type) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { state.error = 'Archivo demasiado grande (máx 10MB)'; render(); return; }
  state.error = '';
  // Genérico: ubica el documento por su storagePath en el catálogo (sirve para
  // wada, carnetBack y cualquier doc nuevo, sin tener que agregar un caso a mano).
  const meta = Object.values(DOC_TYPES).find(m => m.storagePath === type);
  if (meta) { state[meta.stateKey] = file; state[meta.nameKey] = file.name; }
  // Compatibilidad con llamadas legacy (nombres viejos del sistema anterior).
  else if (type === 'carnet') { state.carnetFile = file; state.carnetName = file.name; }
  else if (type === 'wade' || type === 'wada') { state.wadeFile = file; state.wadeName = file.name; }
  else if (type === 'carnetPhoto') { state.carnetPhotoFile = file; state.carnetPhotoName = file.name; }
  else if (type === 'consentimiento') { state.consentimientoFile = file; state.consentimientoName = file.name; }
  else if (type === 'ipfConsent') { state.ipfConsentFile = file; state.ipfConsentName = file.name; }
  else if (type === 'passport') { state.passportFile = file; state.passportName = file.name; }
  else if (type === 'notas') { state.notasFile = file; state.notasName = file.name; }
  render();
}

async function submitForm() {
  state.submitting = true;
  state.error = '';
  render();

  try {
    const f = state.form;

    // ── Validación RUT (módulo 11) ──────────────────────
    const rutCheck = validateRut(f.rut);
    if(!rutCheck.valid){
      state.error = 'RUT inválido: ' + rutCheck.msg + '. Revisá el dígito verificador antes de enviar.';
      state.submitting = false; render(); return;
    }

    // ── Carnet obligatorio (File object debe estar presente) ─────
    if (!state.carnetFile) {
      state.error = 'Debes adjuntar el Carnet de identidad (frontal). Si lo subiste antes y no aparece, volvé a seleccionarlo.';
      state.submitting = false; render();
      document.getElementById('carnetZone')?.scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
    // ── Certificado ADEL/WADA obligatorio ───────────────
    if (!state.wadeFile) {
      state.error = 'Debes adjuntar el Certificado ADEL/WADA o Carnet SENADIS. Si lo subiste antes y no aparece, volvé a seleccionarlo.';
      state.submitting = false; render();
      document.getElementById('wadeZone')?.scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }

    // ── Duplicate check ─────────────────────────────────
    if (firebaseReady) {
      const rutCleanCheck = f.rut.replace(/[^0-9kK]/gi,'').toUpperCase();
      const nameNorm = f.nombre.trim().toLowerCase().replace(/\s+/g,' ');
      const existing = state.inscripciones.filter(i => 
        i.evento === f.evento && i.status !== 'rejected'
      );
      const dupRut = existing.find(i => 
        i.rut && i.rut.replace(/[^0-9kK]/gi,'').toUpperCase() === rutCleanCheck
      );
      const dupName = existing.find(i => 
        i.nombre && i.nombre.trim().toLowerCase().replace(/\s+/g,' ') === nameNorm
      );
      if (dupRut) {
        state.error = `Ya existe una inscripción con ese RUT (${f.rut}) para este campeonato. Si necesitas modificarla, usa la opción "Editar mi inscripción".`;
        state.submitting = false; render(); return;
      }
      if (dupName) {
        state.error = `Ya existe una inscripción con ese nombre para este campeonato. Si es un error, contacta al organizador.`;
        state.submitting = false; render(); return;
      }
    }
    // ────────────────────────────────────────────────────
    
    // Datos PÚBLICOS (inscripciones): legibles por cualquiera en la nómina live.
    const publicEntry = {
      evento: f.evento,
      nombre: sanitizeInput(f.nombre),
      rut: sanitizeInput(f.rut),
      codigo: sanitizeInput(f.codigo),
      sexo: f.sexo,
      fechaNac: f.fechaNac,
      division: f.division,
      categoria: f.categoria,
      modalidad: f.modalidad,
      club: sanitizeInput(f.club),
      clubOtro: sanitizeInput(f.clubOtro),
      zona: f.zona,
      comuna: sanitizeInput(f.comuna),
      universidad: sanitizeInput(f.universidad || ''),
      posNacMod: sanitizeInput(f.posNacMod || ''),
      posNacLugar: sanitizeInput(f.posNacLugar || ''),
      carnetName: state.carnetName,
      wadeName: state.wadeName,
      status: 'pending',
    };

    // Datos PRIVADOS (inscripciones_private): solo admin.
    const privateEntry = {
      pin: f.pin,
      rut: sanitizeInput(f.rut),
      correo: sanitizeInput(f.correo || ''),
    };

    // storageWarning se declara aquí (fuera del bloque if) para que sea accesible
    // en el bloque de renderizado del confirm al final de la función.
    let storageWarning = false;

    if (firebaseReady) {
      // Upload files to Firebase Storage
      const ts = Date.now();
      const rutClean = f.rut.replace(/[^0-9kK]/g, '').toUpperCase();

      // Comprime imagen si es muy grande (> 800KB) para mejorar tasa de éxito
      const compressImage = (file) => new Promise(resolve => {
        if (!file.type.startsWith('image/') || file.size < 800 * 1024) { resolve(file); return; }
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          const canvas = document.createElement('canvas');
          const MAX = 1400;
          let w = img.width, h = img.height;
          if (w > MAX || h > MAX) { const r = Math.min(MAX/w, MAX/h); w = Math.round(w*r); h = Math.round(h*r); }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          canvas.toBlob(blob => resolve(blob || file), 'image/jpeg', 0.82);
        };
        img.onerror = () => { URL.revokeObjectURL(url); resolve(file); };
        img.src = url;
      });

      // Subir archivos — usa el snapshot.ref para getDownloadURL (más confiable)
      async function uploadOne(file, name) {
        const r = window.FB.ref(storage, `athlete_files/${rutClean}/${name}_${ts}`);
        console.log('[upload]', name, 'starting...', file.size, 'bytes', file.type);
        const snap = await window.FB.uploadBytes(r, file);
        console.log('[upload]', name, 'uploaded OK, getting URL...');
        const url = await window.FB.getDownloadURL(snap.ref);
        console.log('[upload]', name, 'URL:', url.substring(0,80)+'...');
        return url;
      }
      if (state.carnetFile) {
        privateEntry.carnetURL = await uploadOne(state.carnetFile, 'carnet');
      }
      if (state.carnetBackFile) {
        privateEntry.carnetBackURL = await uploadOne(state.carnetBackFile, 'carnetBack');
      }
      if (state.wadeFile) {
        privateEntry.wadeURL = await uploadOne(state.wadeFile, 'wada');
      }
      if (state.carnetPhotoFile) {
        privateEntry.carnetPhotoURL = await uploadOne(state.carnetPhotoFile, 'carnetPhoto');
      }
      if (state.consentimientoFile) {
        privateEntry.consentimientoURL = await uploadOne(state.consentimientoFile, 'consentimiento');
      }
      if (state.ipfConsentFile) {
        privateEntry.ipfConsentURL = await uploadOne(state.ipfConsentFile, 'ipfConsent');
      }
      if (state.passportFile) {
        privateEntry.passportURL = await uploadOne(state.passportFile, 'passport');
      }
      if (state.notasFile) {
        privateEntry.notasURL = await uploadOne(state.notasFile, 'notas');
      }
      // Construir el mapa `docs` estandarizado (nuevo sistema): para cada docKey
      // del catálogo cuyo stateKey tenga archivo, guarda la URL bajo docKey.
      const _docsMap = {};
      const _evObj2 = EVENTS.find(e=>e.id===f.evento);
      const _useNewSys = Array.isArray(_evObj2?.requiredDocs) && _evObj2.requiredDocs.length>0;
      if (_useNewSys && window.DOC_TYPES) {
        Object.entries(window.DOC_TYPES).forEach(([dk, meta])=>{
          const url = privateEntry[meta.urlKey];
          if (url) _docsMap[dk] = url;
        });
        if (Object.keys(_docsMap).length) privateEntry.docs = _docsMap;
      }
      // Validar URLs presentes ANTES de guardar inscripción
      if (_useNewSys) {
        // Nuevo sistema: validar que todos los docs requeridos del evento están subidos
        const missing = _evObj2.requiredDocs.filter(dk => !_docsMap[dk]);
        if (missing.length) {
          console.error('[upload] docs faltantes:', missing);
          throw new Error('No se pudieron guardar los documentos: ' + missing.join(', ') + '. Revisa tu conexión y vuelve a intentar.');
        }
      } else {
        // Sistema viejo: carnet + wade obligatorios
        if (!privateEntry.carnetURL || !privateEntry.wadeURL) {
          console.error('[upload] URLs faltantes:', privateEntry);
          throw new Error('No se pudieron guardar los documentos. Revisa tu conexión y vuelve a intentar.');
        }
      }
      console.log('[upload] ✅ Todas las URLs OK, guardando inscripción...');

      publicEntry.timestamp = window.FB.serverTimestamp();
      privateEntry.ts = window.FB.serverTimestamp();

      // Transacción atómica: escribe ambos docs o ninguno. ID determinístico
      // `${evento}_${rutClean}` para pairear public/private y evitar duplicados.
      const docId = `${f.evento}_${rutClean}`;
      const inscRef = window.FB.doc(db, 'inscripciones', docId);
      const privRef = window.FB.doc(db, 'inscripciones_private', docId);
      try {
        await window.FB.runTransaction(db, async (tx) => {
          const existing = await tx.get(inscRef);
          if (existing.exists() && existing.data().status !== 'rejected') {
            throw new Error('DUPLICATE_RUT');
          }
          tx.set(inscRef, publicEntry);
          tx.set(privRef, privateEntry);
        });
      } catch(txErr) {
        if (txErr.message === 'DUPLICATE_RUT') {
          state.error = `Ya existe una inscripción con ese RUT (${f.rut}) para este campeonato. Usa "Editar mi inscripción" si necesitas modificarla.`;
          state.submitting = false; render(); return;
        }
        throw txErr;
      }

      // Si es atleta NUEVO (no estaba en data.json), registrarlo en Firestore
      // para que el admin pueda subirle la foto aunque no esté en data.json aún.
      if (f._codigoSource === 'new' && f.codigo) {
        try {
          const rutClean2 = f.rut.replace(/[^0-9kK]/g, '').toUpperCase();
          await window.FB.setDoc(
            window.FB.doc(db, 'atletas_pending', rutClean2),
            {
              nombre: sanitizeInput(f.nombre),
              rut: sanitizeInput(f.rut),
              codigo: sanitizeInput(f.codigo),
              sexo: f.sexo,
              fechaNac: f.fechaNac,
              club: sanitizeInput(f.club),
              zona: f.zona,
              debut: true,
              inscripcion_evento: f.evento,
              ts: window.FB.serverTimestamp(),
            }
          );
        } catch(e2) { console.warn('[atletas_pending]', e2.message); }
      }
    } else {
      // Demo mode: aplana en un solo objeto para localStorage.
      demoSave({...publicEntry, ...privateEntry});
    }

    state.view = 'confirm';
    state.submitting = false;
    state.storageWarning = storageWarning || false;
    render();
    window.scrollTo(0, 0);
  } catch(e) {
    state.error = 'Error al enviar: ' + e.message;
    state.submitting = false;
    render();
  }
}

function resetForm() {
  state = {...state, view:'form', step:0, form:{evento:'',nombre:'',rut:'',codigo:'',sexo:'',fechaNac:'',division:'',categoria:'',modalidad:'',club:'',clubOtro:'',zona:'',comuna:'',correo:'',posNacMod:'',posNacLugar:'',pin:'',universidad:''}, carnetFile:null, carnetName:'', carnetBackFile:null, carnetBackName:'', wadeFile:null, wadeName:'', carnetPhotoFile:null, carnetPhotoName:'', consentimientoFile:null, consentimientoName:'', submitting:false, storageWarning:false, error:'', success:'', editDoc:null, editId:null};
  render();
}

function toggleAdmin() {
  if (state.view === 'admin') { state.view = 'form'; render(); return; }
  state.view = 'admin';
  render();
}

async function authAdmin() {
  const email = (document.getElementById('adminEmail')?.value || '').trim();
  const pass = document.getElementById('adminPass')?.value || '';
  state.error = '';
  if (!email || !pass) { state.error = 'Completa email y contraseña'; render(); return; }
  if (!firebaseReady || !authInstance) { state.error = 'Firebase no disponible'; render(); return; }
  try {
    await window.FB.signInWithEmailAndPassword(authInstance, email, pass);
    // onAuthStateChanged handler verifies admins/{uid} and sets state.adminAuth
  } catch(e) {
    let msg = 'Error: ' + e.message;
    if (e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found') msg = 'Email o contraseña incorrectos';
    else if (e.code === 'auth/too-many-requests') msg = 'Demasiados intentos. Espera unos minutos.';
    state.error = msg;
    render();
  }
}

async function logoutAdmin() {
  if (!confirm('¿Cerrar sesión de admin?')) return;
  try { await window.FB.signOut(authInstance); } catch(e) { console.warn(e); }
  state.adminAuth = false;
  state.view = 'form';
  render();
}

async function loadInscripciones() {
  if (firebaseReady) {
    try {
      // Start real-time listener if not already running
      if (!window._adminListener) {
        const q = window.FB.query(window.FB.collection(db, 'inscripciones'), window.FB.orderBy('timestamp', 'desc'));
        window._adminListener = window.FB.onSnapshot(q, (snap) => {
          state.inscripciones = snap.docs.map(d => ({id: d.id, ...d.data()}));
          // Only re-render if admin panel is visible
          if (state.view === 'admin') render();
        });
      }
      // Also do an immediate fetch for first load
      const q = window.FB.query(window.FB.collection(db, 'inscripciones'), window.FB.orderBy('timestamp', 'desc'));
      const snap = await window.FB.getDocs(q);
      state.inscripciones = snap.docs.map(d => ({id: d.id, ...d.data()}));
    } catch(e) { console.error(e); }
  } else {
    state.inscripciones = demoGetAll().reverse();
  }
  render();
}

async function approveAllPending() {
  const pending = state.inscripciones.filter(i => i.status === 'pending');
  if (!pending.length) { alert('No hay inscripciones pendientes'); return; }
  if (!confirm(`¿Aprobar ${pending.length} inscripción${pending.length !== 1 ? 'es' : ''} pendiente${pending.length !== 1 ? 's' : ''}?`)) return;
  if (firebaseReady) {
    try {
      await Promise.all(pending.map(i =>
        window.FB.updateDoc(window.FB.doc(db, 'inscripciones', i.id), {status: 'approved'})
      ));
      // listener will auto-update state.inscripciones
    } catch(e) { console.error(e); alert('Error: ' + e.message); }
  } else {
    pending.forEach(i => demoUpdate(i.id, {status: 'approved'}));
    state.inscripciones = demoGetAll().reverse();
    render();
  }
}
async function updateStatus(id, newStatus) {
  const realId = decodeURIComponent(id);
  if (firebaseReady) {
    try {
      await window.FB.updateDoc(window.FB.doc(db, 'inscripciones', realId), {status: newStatus});
    } catch(e) { console.error(e); }
  } else {
    demoUpdate(realId, {status: newStatus});
  }
  await loadInscripciones();
}

function exportNominas() {
  const approved = state.inscripciones.filter(i => i.status === 'approved');
  const byEvent = {};
  approved.forEach(i => {
    if (!byEvent[i.evento]) byEvent[i.evento] = [];
    byEvent[i.evento].push({
      nombre: i.nombre,
      rut: i.rut,
      sexo: i.sexo,
      dob: i.fechaNac,
      division: i.division,
      categoria: i.categoria,
      modalidad: i.modalidad,
      club: i.club === 'Otro' ? i.clubOtro : i.club,
      universidad: i.universidad || '',
    });
  });

  // Generate nominas.json format
  const nominas = { events: EVENTS.map(ev => ({
    name: ev.name,
    short: ev.name.replace('Campeonato ','').replace('Primer ',''),
    date: ev.date,
    closeDate: ev.closeDate,
    location: ev.location,
    organizer: ev.org,
    days: ev.date.split('-').reverse().join(' de '),
    athletes: byEvent[ev.id] || byEvent[ev.name] || [],
    extraCols: ev.id.includes('universitario') ? ['universidad'] : ['modalidad'],
  }))};

  const blob = new Blob([JSON.stringify(nominas, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = 'nominas.json';
  link.click();
  URL.revokeObjectURL(url);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
initFirebase().then(() => render());
</script>
