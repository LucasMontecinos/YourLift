<!doctype html><html lang="es"><head>
<meta charset="utf-8">
<link rel="icon" type="image/png" href="favicon.png?v=2">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C41E3A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="YourLift">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YourLift — Cronograma</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a1424;--card:#111f36;--border:#22304d;--text:#e7ecf3;--muted:#8a96a8;--gold:#d4a843;--green:#22c55e;--accent:#c41e3a;--blue:#3b82f6}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:1100px;margin:0 auto;padding:22px 14px 60px}
.brand{font-family:Oswald;font-weight:700;letter-spacing:2px;font-size:22px}
.brand span{color:var(--accent)}
.sub{color:var(--muted);font-size:13px;margin:2px 0 18px}
select{background:#0a1424;border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;min-width:240px}
.flight{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden}
.fhd{display:flex;gap:10px;align-items:center;padding:11px 16px;background:linear-gradient(90deg,rgba(196,30,58,.18),transparent);border-bottom:1px solid var(--border)}
.fhd .t{font-family:Oswald;font-weight:700;letter-spacing:1px;font-size:15px}
.fhd .b{font-size:11px;color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-family:Oswald;font-size:10px;letter-spacing:1px;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--border);text-transform:uppercase}
td{padding:8px 10px;border-bottom:1px solid #16233c;vertical-align:top}
tr:last-child td{border-bottom:none}
.nm{font-weight:600}
.muted{color:var(--muted)}
.pill{display:inline-block;background:#0a1424;border:1px solid var(--border);border-radius:14px;padding:1px 8px;font-size:11px;color:var(--muted)}
.hd{font-size:12px;color:var(--text)}
.hd .n{color:var(--gold)}
@media(max-width:720px){.hide-sm{display:none}td,th{padding:6px 6px;font-size:12px}}
</style></head><body>
<div class="wrap">
  <div class="brand"><span>YOUR</span>LIFT · Cronograma</div>
  <div class="sub">Start list por tarima y flight · entrenador y handlers</div>
  <div style="margin-bottom:18px"><select id="evsel" onchange="pick(this.value)"><option value="">Cargando campeonatos…</option></select></div>
  <div id="out"></div>
</div>
<script type="module">
import {initializeApp} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {getFirestore,collection,getDocs,doc,onSnapshot,query,where} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const app=initializeApp({apiKey:"AIzaSyA21IHMus2bklPLJm7ExRrVJJL9bzLhyp4",authDomain:"fechipo-db-13148.firebaseapp.com",projectId:"fechipo-db-13148"});
const db=getFirestore(app);
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const nn=s=>String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,' ').trim();
const slug=s=>nn(s).replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'').slice(0,50);
let EVENTS=[], CUR='', unsub=null, HANDLERS={};

async function init(){
  try{
    const evs=await getDocs(collection(db,'eventos'));
    const list=[];
    for(const d of evs.docs){ const e={id:d.id,...d.data()}; if(e.status==='archived')continue; list.push(e); }
    // solo los que tienen cronograma: se sabe al leer; mostramos todos y filtramos al elegir
    EVENTS=list.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    $('evsel').innerHTML='<option value="">— Elegir campeonato —</option>'+EVENTS.map(e=>`<option value="${esc(e.id)}">${esc(e.name||e.id)}</option>`).join('');
  }catch(e){ $('out').innerHTML='<div class="muted">No se pudo cargar.</div>'; }
}
async function loadHandlers(ev){
  HANDLERS={};
  try{
    const hs=await getDocs(query(collection(db,'handlers'),where('evento','==',ev)));
    hs.forEach(d=>{ HANDLERS[d.id]=d.data(); });
  }catch(e){}
}
window.pick=async function(ev){
  CUR=ev; if(unsub){try{unsub()}catch(e){}unsub=null;}
  if(!ev){ $('out').innerHTML=''; return; }
  $('out').innerHTML='<div class="muted">Cargando cronograma…</div>';
  await loadHandlers(ev);
  unsub=onSnapshot(doc(db,'cronograma',ev),(d)=>{
    const rows=(d.exists()&&Array.isArray(d.data().rows))?d.data().rows:[];
    render(ev,rows);
  },()=>{ $('out').innerHTML='<div class="muted">Este campeonato no tiene cronograma publicado.</div>'; });
};
function handlerNames(ev,row){
  // overlay: handlers enviados por el entrenador (por jornada) tienen prioridad
  const k=ev+'__'+slug(row.entrenador||'')+'__'+((row.jornada||'1').toString().trim()||'1');
  const sub=HANDLERS[k];
  if(sub&&Array.isArray(sub.handlers)&&sub.handlers.length) return sub.handlers.map(h=>h.nombre).filter(Boolean);
  const a=[]; if((row.handler1||{}).nombre)a.push(row.handler1.nombre); if((row.handler2||{}).nombre)a.push(row.handler2.nombre);
  return a;
}
function render(ev,rows){
  if(!rows.length){ $('out').innerHTML='<div class="muted">Sin atletas en este cronograma.</div>'; return; }
  // agrupar por tarima -> flight
  const groups={};
  rows.forEach(r=>{ const key=(r.tarima||'?')+'||'+(r.flight||'?'); (groups[key]=groups[key]||[]).push(r); });
  const keys=Object.keys(groups).sort((a,b)=>{const [ta,fa]=a.split('||'),[tb,fb]=b.split('||');return String(ta).localeCompare(String(tb))||String(fa).localeCompare(String(fb));});
  let h='';
  keys.forEach(k=>{
    const [tar,fl]=k.split('||'); const aths=groups[k];
    h+=`<div class="flight"><div class="fhd"><div class="t">Tarima ${esc(tar)} · Flight ${esc(fl)}</div><div class="b">${aths.length} atleta(s)${aths[0].jornada?(' · Jornada '+esc(aths[0].jornada)):''}</div></div>
      <table><tr><th>#</th><th>Atleta</th><th class="hide-sm">Div / Cat</th><th class="hide-sm">Club</th><th>Modalidad</th><th>Entrenador</th><th>Handlers</th></tr>`;
    aths.forEach((r,i)=>{
      const hs=handlerNames(ev,r);
      h+=`<tr><td class="muted">${i+1}</td>
        <td class="nm">${esc(r.nombre||'')}</td>
        <td class="hide-sm muted">${esc(r.division||'')} ${esc(r.categoria||'')}</td>
        <td class="hide-sm muted">${esc(r.club||'')}</td>
        <td><span class="pill">${esc(r.modalidad||'')}</span></td>
        <td class="hd">${esc(r.entrenador||'—')}</td>
        <td class="hd">${hs.length?hs.map(n=>'<span class="n">'+esc(n)+'</span>').join('<br>'):'<span class="muted">—</span>'}</td>
      </tr>`;
    });
    h+='</table></div>';
  });
  $('out').innerHTML=h;
}
init();
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').then(r=>console.log('[PWA] SW:',r.scope)).catch(e=>console.warn('[PWA]',e));});}</script>
</body></html>
