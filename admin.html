<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A1628;--card:#11223B;--border:#1E3A5F;--text:#D4E1F0;--muted:#7A8FA6;--accent:#C41E3A;--blue:#1E5BA8;--gold:#D4A843;--green:#22c55e;--red:#ef4444;--orange:#f59e0b}
body{font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased} /* background controlado por bg-fechipo.css */
.os{font-family:'Oswald',sans-serif}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
input,select,button,textarea{font-family:inherit;outline:none}
.shell{min-height:100vh}
.side{background:#0d1b30;border-right:1px solid var(--border);padding:18px 14px;display:flex;flex-direction:column;position:fixed;top:0;left:0;width:264px;height:100vh;overflow-y:auto;z-index:1000;transform:translateX(-100%);transition:transform .22s ease}
body.nav-open .side{transform:translateX(0);box-shadow:2px 0 24px rgba(0,0,0,.55)}
.nav-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;opacity:0;pointer-events:none;transition:opacity .2s}
body.nav-open .nav-backdrop{opacity:1;pointer-events:auto}
.adm-burger{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:9px 15px;font-family:Oswald;font-weight:700;letter-spacing:1px;font-size:13px;cursor:pointer;margin-bottom:18px}
.adm-burger:hover{border-color:var(--accent)}
.logo{font-family:Oswald;font-size:20px;font-weight:700;letter-spacing:2px;margin-bottom:4px}
.logo span{color:var(--accent)}
.user{font-size:11px;color:var(--green);margin-bottom:18px;padding:6px 10px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:6px}
.side-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 6px;font-family:Oswald}
.side-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-size:13px;cursor:pointer;text-align:left;transition:all .15s;margin-bottom:2px}
.side-btn:hover{background:rgba(196,30,58,.08);color:var(--text)}
.side-btn.active{background:var(--accent);color:#fff}
.side-btn .icon{font-size:16px;width:22px;text-align:center}
.main{padding:24px;overflow-y:auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.h1{font-family:Oswald;font-size:24px;font-weight:700;letter-spacing:1px;margin-bottom:6px}
.h2{font-family:Oswald;font-size:18px;font-weight:700;letter-spacing:1px;margin-bottom:14px}
.subtitle{color:var(--muted);font-size:13px;margin-bottom:20px}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:Oswald;font-size:12px;font-weight:700;letter-spacing:1px;transition:all .15s}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover{background:#a01730}
.btn-b{background:var(--blue);color:#fff}
.btn-g{background:var(--green);color:#fff}
.btn-d{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-r{background:var(--red);color:#fff}
.btn-w{background:var(--gold);color:#000}
.inp{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px}
.inp:focus{border-color:var(--accent)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:10px 8px;color:var(--muted);font-family:Oswald;font-size:10px;letter-spacing:1px;text-transform:uppercase;border-bottom:2px solid var(--border)}
.tbl td{padding:8px;border-bottom:1px solid rgba(30,58,95,.3)}
.tbl tr:hover td{background:rgba(196,30,58,.04)}
.editable{cursor:pointer;color:var(--text);padding:3px 6px;border-radius:4px;display:inline-block}
.editable:hover{background:rgba(212,168,67,.15);color:var(--gold)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;font-family:Oswald;letter-spacing:.5px}
.b-g{background:rgba(34,197,94,.15);color:var(--green)}
.b-y{background:rgba(212,168,67,.15);color:var(--gold)}
.b-r{background:rgba(239,68,68,.15);color:var(--red)}
.b-b{background:rgba(30,91,168,.15);color:var(--blue)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--green);color:var(--text);padding:14px 22px;border-radius:10px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 24px rgba(0,0,0,.4);z-index:9999;animation:slideUp .3s ease}
.toast.err{border-color:var(--red)}
.toast button{background:var(--accent);color:#fff;border:none;padding:6px 12px;border-radius:6px;font-family:Oswald;font-size:11px;cursor:pointer;font-weight:700;letter-spacing:.5px}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:9998}
.modal-c{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:480px;width:90%;max-height:90vh;overflow-y:auto}
.modal-c h3{font-family:Oswald;font-size:18px;letter-spacing:1px;margin-bottom:16px;color:var(--text)}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.field select,.field input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px}
.modal-btns{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.login{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-c{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px;max-width:400px;width:90%}
.login-c h1{font-family:Oswald;font-size:26px;text-align:center;letter-spacing:2px;margin-bottom:6px}
.login-c h1 span{color:var(--accent)}
.login-c p{text-align:center;color:var(--muted);font-size:13px;margin-bottom:24px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat .v{font-family:Oswald;font-size:26px;font-weight:700}
.stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.tag{display:inline-block;padding:3px 9px;border-radius:6px;font-size:10px;font-weight:600;font-family:Oswald;letter-spacing:.5px;margin-right:4px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:30px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.search-box{display:flex;gap:8px;margin-bottom:14px}
.search-box input{flex:1}
@media(max-width:768px){.side{width:84vw}.stat-grid{grid-template-columns:repeat(2,1fr)}.tbl{font-size:10px}.tbl th,.tbl td{padding:5px 4px}}
</style>
</head>

<script>
(function(){
  setTimeout(function(){
    var msg = document.getElementById('loadingMsg');
    var btn = document.getElementById('loadingBtn');
    if(msg && msg.textContent === 'Cargando...'){
      msg.textContent = 'Verificando sesión...';
    }
    if(btn) btn.style.display = 'block';
  }, 5000);

  setTimeout(function(){
    var app = document.getElementById('app');
    if(app && app.innerHTML.indexOf('Cargando') !== -1){
      app.innerHTML = '<div style="text-align:center;padding:60px;color:#C41E3A;font-family:Oswald">'
        + '<div style="font-size:32px;margin-bottom:12px"></div>'
        + '<div style="font-size:18px;letter-spacing:1px;margin-bottom:8px">Error al cargar</div>'
        + '<div style="font-size:13px;color:#7A8FA6;margin-bottom:20px">Prueba limpiar el caché del navegador (Ctrl+Shift+R).</div>'
        + '<button onclick="location.reload()" style="padding:10px 24px;border-radius:8px;border:none;background:#C41E3A;color:#fff;font-family:Oswald;font-size:14px;cursor:pointer">↻ Recargar</button>'
        + '</div>';
    }
  }, 12000);
})();
</script>

// ── Peer helpers ──
function _getPeerKey(a){
  const comps=[...(a.competencias||[])].filter(c=>c.sexo&&c.categoria&&c.resultado&&c.resultado.total>0).sort((x,y)=>(y.fecha||'').localeCompare(x.fecha||''));
  if(!comps.length)return null;
  const l=comps[0];
  const sex=(l.sexo||'').match(/mujer|fem/i)?'F':'M';
  const modal=(l.modalidad||'').toLowerCase().includes('equip')?'equipped':'classic';
  return sex+'|'+(l.categoria||'').trim()+'|'+(l.division||'Open').trim()+'|'+modal;
}
function _peerPerc(myTotal,key){const g=PEERS[key];if(!g)return null;const all=[...g.members.map(m=>m.total),myTotal].sort((a,b)=>b-a);const rank=all.indexOf(myTotal)+1;return{rank,n:all.length,pct:Math.round((1-rank/all.length)*100),g};}

// HTML-escape helper — defensa contra XSS al inyectar datos en innerHTML
function esc(s){
  if(s==null)return'';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
window.esc=esc;

onAuthStateChanged(auth,async(u)=>{window._authFired=true;
  if(!u){ST.user=null;ST.adminInfo=null;render();return}
  try{
    const adminDoc=await getDoc(doc(db,'admins',u.uid));
    if(!adminDoc.exists()){
      await signOut(auth);
      ST.user=null;ST.adminInfo=null;
      alert('Acceso denegado.\nUID: '+u.uid+'\n\nAgrega este UID a Firestore → admins/'+u.uid+' con campo role:"superadmin"');
      render();return;
    }
    ST.user=u;
    ST.adminInfo=adminDoc.data();
    sessionStorage.setItem('fechipo_admin_session','1');
    // ── bootstrap one-time: logro YourLift Owner para Lucas ──────────────
    (async()=>{
      try{
        const _achRef=doc(db,'atleta_achievements','2145LMA-2024');
        const _achSnap=await getDoc(_achRef);
        if(!_achSnap.exists()||!(_achSnap.data()?.achievements?.length)){
          await setDoc(_achRef,{
            codigo:'2145LMA-2024',
            achievements:[{label:'YourLift Owner',evento:'yourlift.cl',logo_url:'YourLift_logo.png',anio:null,color:'#C41E3A',display:'verified'}]
          });
          console.log('Bootstrap: logro de Lucas escrito en Firestore');
        }
      }catch(e){console.warn('Bootstrap achievement skip:',e.message);}
    })();
    // ─────────────────────────────────────────────────────────────────────
    loadAll(); // intentional: no await — render() called inside
  }catch(e){
    console.error('Auth error',e);
    ST.user=null;
    render();
  }
});

window.doLogin=async function(){
  const em=document.getElementById('lEm').value.trim();
  const pw=document.getElementById('lPw').value;
  const errEl=document.getElementById('loginErr');
  if(errEl){errEl.style.display='none';}
  if(!em||!pw){
    if(errEl){errEl.style.display='block';errEl.textContent='Completa email y contraseña';}
    return;
  }
  const btn=document.querySelector('[onclick*="doLogin"]');
  if(btn){btn.textContent='Ingresando...';btn.disabled=true;}
  try{
    await signInWithEmailAndPassword(auth,em,pw);
  }catch(e){
    console.error('[doLogin]',e.code,e.message);
    let msg='Error: '+e.message;
    if(e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'||e.code==='auth/user-not-found')msg='Email o contraseña incorrectos';
    else if(e.code==='auth/too-many-requests')msg='Demasiados intentos. Espera unos minutos.';
    else if(e.code==='auth/network-request-failed')msg='Sin conexión a internet';
    if(errEl){errEl.style.display='block';errEl.textContent=msg;}
  }finally{
    if(btn){btn.textContent='INGRESAR';btn.disabled=false;}
  }
}

window.doLogout=async function(){
  if(!confirm('¿Cerrar sesión?'))return;
  await signOut(auth);
  sessionStorage.removeItem('fechipo_admin_session');
  ST.user=null;ST.adminInfo=null;render();
}

// Crea una cuenta de entrenador: Firebase Auth user + doc coaches/{uid}.
// Usa una "secondary app" para no cerrar la sesión del admin actual.
// Uso desde la consola del navegador (tras login admin):
//   await createCoach('coach@yourlift.cl', 'Passw0rd!', 'Nombre Apellido', 'Nacional', '12345678')
window.createCoach=async function(email,password,nombre,grado,rut){
  if(!ST.user) throw new Error('Debes estar autenticado como admin.');
  if(!email||!password||!nombre) throw new Error('email, password y nombre son obligatorios.');
  if(password.length<8) throw new Error('La contraseña debe tener al menos 8 caracteres.');
  const secondary=initSecondaryApp(FB_CFG,'coachCreate_'+Date.now());
  const secondaryAuth=getAuth(secondary);
  try{
    const cred=await createUserWithEmailAndPassword(secondaryAuth,email,password);
    const uid=cred.user.uid;
    await setDoc(doc(db,'coaches',uid),{
      email:email.toLowerCase(),
      nombre,
      grado:grado||'',
      rut:rut||'',
      createdAt:serverTimestamp(),
      createdBy:ST.user.email
    });
    try{await signOut(secondaryAuth);}catch(_){}
    await logAction('coach_create','coaches/'+uid,null,{email,nombre,grado,rut});
    console.log('✓ Coach creado:',email,'UID:',uid);
    return uid;
  }catch(e){
    console.error('createCoach falló:',e.code||'',e.message);
    throw e;
  }
}

async function loadAll(){
  // Load data.json — non-blocking, dashboard degrades gracefully if missing
  try{
    const dRes=await fetch('data.json').then(r=>r.json()).catch(()=>[]);
    ST.data=Array.isArray(dRes)?dRes:[];
  }catch(e){
    console.warn('[loadAll] JSON fetch failed:',e.message);
    ST.data=ST.data||[];
  }

  // Load atletas_pending (debutants who inscribed but aren't in data.json yet)
  try{
    const pendSnap=await getDocs(collection(db,'atletas_pending'));
    const rutNorm=(s)=>String(s||'').replace(/[^0-9kK]/g,'').toUpperCase();
    pendSnap.forEach(d=>{
      const pd=d.data();
      const alreadyIn=(ST.data||[]).find(a=>rutNorm(a.rut)===rutNorm(pd.rut));
      if(!alreadyIn && pd.nombre && pd.codigo){
        ST.data.push({...pd, _isPending:true});
      }
    });
  }catch(e){console.warn('[loadAll] atletas_pending:',e.message);}

  // Apply athlete_edits non-blocking. Matchea por RUT (estable), fallback a código.
  try{
    const rutNormE=s=>String(s||'').replace(/[^0-9kK]/gi,'').toUpperCase();
    const editsSnap=await getDocs(collection(db,'athlete_edits'));
    editsSnap.forEach(d=>{
      const ed=d.data();
      // Buscar por RUT primero (no cambia nunca), luego por código (compat docs viejos)
      let a=null;
      if(ed.rut) a=(ST.data||[]).find(x=>rutNormE(x.rut)===rutNormE(ed.rut));
      if(!a && ed.codigo) a=(ST.data||[]).find(x=>x.codigo===ed.codigo);
      if(a){
        if(ed.nombre)a.nombre=ed.nombre;
        if(ed.club!==undefined)a.club=ed.club;
        if(ed.debut!==undefined)a.debut=ed.debut;
        if(ed.rut)a.rut=ed.rut;
        if(ed.codigo)a.codigo=ed.codigo;   // ← clave: aplicar el código editado
        if(ed.sexo)a.sexo=ed.sexo;
        if(ed.fechaNac)a.fechaNac=ed.fechaNac;
        if(ed.zona)a.zona=ed.zona;
        if(ed.comuna)a.comuna=ed.comuna;
      }
    });
  }catch(e){console.warn('[loadAll] athlete_edits:',e.message);}

  // Load inscripciones — no orderBy to avoid index requirement
  try{
    const inscSnap=await getDocs(collection(db,'inscripciones'));
    ST.inscripciones=[];
    inscSnap.forEach(d=>ST.inscripciones.push({id:d.id,...d.data()}));
    ST.inscripciones.sort((a,b)=>(b.timestamp?.seconds||0)-(a.timestamp?.seconds||0));
  }catch(e){console.warn('[loadAll] inscripciones:',e.message);ST.inscripciones=[];}

  // Load inscripciones_private (campos sensibles: pin, carnetURL, wadeURL).
  // Solo admin puede leer. Se indexa por docId para merge rápido.
  try{
    const privSnap=await getDocs(collection(db,'inscripciones_private'));
    ST.inscripcionesPrivate={};
    privSnap.forEach(d=>{ST.inscripcionesPrivate[d.id]=d.data();});
  }catch(e){console.warn('[loadAll] inscripciones_private:',e.message);ST.inscripcionesPrivate={};}

  // Load atleta_fotos (foto_url por código + status). Lectura pública.
  // - status:'approved' (default si tiene foto_url) → mergea en ST.data para verse
  // - status:'rejected' → no aparece como pendiente, no se muestra
  ST.fotosByCodigo = {};
  try{
    const fotosSnap=await getDocs(collection(db,'atleta_fotos'));
    fotosSnap.forEach(d=>{
      const data=d.data();
      const codigo=data.codigo||d.id;
      ST.fotosByCodigo[codigo] = data;
      const ath=(ST.data||[]).find(a=>a.codigo===codigo);
      if(ath && data.foto_url && data.status!=='rejected') ath.foto_url = data.foto_url;
    });
  }catch(e){console.warn('[loadAll] atleta_fotos:',e.message);}

  // Load atleta_achievements (logros/medallas). Un doc por atleta (ID = codigo).
  ST.achievementsByCodigo = {};
  try{
    const achSnap=await getDocs(collection(db,'atleta_achievements'));
    achSnap.forEach(d=>{
      const data=d.data();
      const codigo=data.codigo||d.id;
      ST.achievementsByCodigo[codigo]=data.achievements||[];
      const ath=(ST.data||[]).find(a=>a.codigo===codigo);
      if(ath) ath.achievements=data.achievements||[];
    });
  }catch(e){console.warn('[loadAll] atleta_achievements:',e.message);}

  // Load edit_requests (solicitudes de edición pendientes de atletas).
  try{
    const reqSnap=await getDocs(collection(db,'edit_requests'));
    ST.editRequests=reqSnap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.ts?.seconds||0)-(a.ts?.seconds||0));
  }catch(e){console.warn('[loadAll] edit_requests:',e.message);ST.editRequests=[];}

  // Real-time listeners (non-blocking, set up once)
  if(!window._inscListener){
    try{
      window._inscListener=onSnapshot(collection(db,'inscripciones'),(snap)=>{
        ST.inscripciones=snap.docs.map(d=>({id:d.id,...d.data()}))
          .sort((a,b)=>(b.timestamp?.seconds||0)-(a.timestamp?.seconds||0));
        if(ST.view==='nominas'||ST.view==='dashboard'||ST.view==='approvals'||ST.view==='athletes')render();
      },(e)=>console.warn('[listener] inscripciones:',e.message));
    }catch(e){console.warn('[loadAll] insc listener:',e.message);}
  }
  if(!window._privListener){
    try{
      window._privListener=onSnapshot(collection(db,'inscripciones_private'),(snap)=>{
        ST.inscripcionesPrivate={};
        snap.forEach(d=>{ST.inscripcionesPrivate[d.id]=d.data();});
      },(e)=>console.warn('[listener] inscripciones_private:',e.message));
    }catch(e){console.warn('[loadAll] priv listener:',e.message);}
  }
  if(!window._editReqListener){
    try{
      window._editReqListener=onSnapshot(collection(db,'edit_requests'),(snap)=>{
        ST.editRequests=snap.docs.map(d=>({id:d.id,...d.data()}))
          .sort((a,b)=>(b.ts?.seconds||0)-(a.ts?.seconds||0));
        if(ST.view==='editRequests'||ST.view==='dashboard')render();
      },(e)=>console.warn('[listener] edit_requests:',e.message));
    }catch(e){console.warn('[loadAll] edit_req listener:',e.message);}
  }
  if(!window._entListener){
    try{
      window._entListener=onSnapshot(collection(db,'entrenadores'),(snap)=>{
        ST.entrenadores=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
        if(ST.view==='entrenadoresDB')render();
      },(e)=>console.warn('[listener] entrenadores:',e.message));
    }catch(e){console.warn('[loadAll] ent listener:',e.message);}
  }
  if(!window._allCompResListener){
    try{
      window._allCompResListener=onSnapshot(collection(db,'competition_results'),(snap)=>{
        ST.allCompResults=snap.docs.map(d=>({id:d.id,...d.data()}));
        if(ST.view==='athleteProfile')render();
      },(e)=>console.warn('[listener] competition_results:',e.message));
    }catch(e){console.warn('[loadAll] allCompRes listener:',e.message);}
  }
  if(!window._eventosListener){
    try{
      window._eventosListener=onSnapshot(collection(db,'eventos'),(snap)=>{
        ST.eventos=snap.docs.map(d=>{
          const e={...d.data(),id:d.id};
          // Default: récords activos. En "Universitario" arrancan apagados.
          if(typeof e.recordsEnabled!=='boolean'){
            e.recordsEnabled=!/universitar/i.test(e.name||'');
          }
          return e;
        }).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
        if(ST.view==='campeonatos'||ST.view==='dashboard'||ST.view==='athletes')render();
      },(e)=>console.warn('[listener] eventos:',e.message));
    }catch(e){console.warn('[loadAll] eventos listener:',e.message);}
  }
  if(!window._resultsListener){
    try{
      window._resultsListener=onSnapshot(
        query(collection(db,'competition_results'),where('status','==','pending_merge')),
        (snap)=>{
          ST.pendingResults=snap.size;
          ST.competitionResults=snap.docs.map(d=>({id:d.id,...d.data()}));
          if(ST.pendingResults>0||ST.view==='mergeResults')render();
        },(e)=>console.warn('[listener] results:',e.message)
      );
    }catch(e){console.warn('[loadAll] results listener:',e.message);}
  }

  // Load eventos snapshot for campeonatos view
  try{
    const evSnap=await getDocs(collection(db,'eventos'));
    ST.eventos=evSnap.docs.map(d=>({...d.data(),id:d.id}))
      .sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  }catch(e){console.warn('[loadAll] eventos:',e.message);ST.eventos=[];}

  // Audit log — non-blocking, no ordering (avoids index requirement)
  try{
    const logSnap=await getDocs(collection(db,'audit_log'));
    ST.auditLog=logSnap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,100);
  }catch(e){console.warn('[loadAll] audit_log:',e.message);ST.auditLog=[];}

  // Auto-close overdue nominations (non-blocking)
  setTimeout(()=>{try{autoCloseOverdueEventos();}catch(e){}},3000);

  // Render ahora que tenemos datos
  render();
}

let toastTimer=null,pendingUndo=null;
function showToast(msg,undoFn=null,isError=false){
  if(toastTimer)clearTimeout(toastTimer);
  document.getElementById('toast')?.remove();
  const t=document.createElement('div');
  t.id='toast';t.className='toast'+(isError?' err':'');
  t.innerHTML=`<span>${isError?'':'✓'} ${msg}</span>`;
  if(undoFn){
    pendingUndo=undoFn;
    const b=document.createElement('button');b.textContent='DESHACER';b.onclick=()=>{pendingUndo();document.getElementById('toast')?.remove();pendingUndo=null};
    t.appendChild(b);
  }
  document.body.appendChild(t);
  toastTimer=setTimeout(()=>{t.remove();pendingUndo=null},5500);
}
window.showToast=showToast;

  modalidad:['Classic','Equipped','Bench Only Classic','Bench Only Equipped'],

window.openEditModal=function(title,field,currentValue,onSave){
  const opts=FIELD_OPTS[field];
  const m=document.createElement('div');m.className='modal';
  let inner=`<div class="modal-c"><h3>${title}</h3><div class="field"><label>${field}</label>`;

    inner+=`<select id="emInp">${opts.map(o=>`<option value="${o}" ${o===currentValue?'selected':''}>${o}</option>`).join('')}</select>`;
  }else{
    inner+=`<input type="text" id="emInp" value="${(currentValue||'').replace(/"/g,'&quot;')}">`;
  }
  inner+=`</div><div class="modal-btns"><button class="btn btn-d" onclick="this.closest('.modal').remove()">CANCELAR</button><button class="btn btn-p" id="emSave">GUARDAR</button></div></div>`;

window.importNominaToFB=async function(eventName){
  const ev=ST.nominas.events?.find(e=>e.name===eventName);
  if(!ev){showToast('Evento no encontrado',null,true);return}
  if(!confirm(`Importar ${ev.athletes.length} atletas de "${eventName}" a Firebase?\n\nEsto los hará editables. Los duplicados (mismo RUT) se omiten.`))return;

  // Ensure the event doc exists in Firestore `eventos/` so public pages (index.html)
  // can show it. Use the event name as the doc id (same convention as inscripciones.evento).
  try{
    const existingEv=ST.eventos.find(e=>e.id===eventName||e.name===eventName);
    if(!existingEv){
      await setDoc(doc(db,'eventos',eventName),{
        id:eventName,
        name:eventName,
        date:ev.date||'',
        closeDate:ev.closeDate||'',
        location:ev.location||'',
        org:ev.organizer||'',
        days:ev.days||'',
        status:'open',
        extraCols:ev.extraCols||['modalidad'],
        createdAt:serverTimestamp(),
        updatedAt:serverTimestamp()
      },{merge:true});
      console.log('[import] Evento creado en Firestore:',eventName);
    }
  }catch(e){
    console.error('Error creando evento:',e);
    showToast('Error creando evento: '+(e.code||e.message),null,true);
    return;
  }

  // Get existing RUTs in Firebase for this event
  const existing=new Set(ST.inscripciones.filter(i=>i.evento===eventName).map(i=>(i.rut||'').replace(/[^0-9kK]/gi,'').toUpperCase()));
  
  let imported=0,skipped=0,errors=0,lastErr=null;
  for(const a of ev.athletes){
    const rutClean=(a.rut||'').replace(/[^0-9kK]/gi,'').toUpperCase();
    if(rutClean&&existing.has(rutClean)){skipped++;continue}
    try{
      await addDoc(collection(db,'inscripciones'),{
        nombre:a.nombre||'',
        rut:a.rut||'',
        sexo:a.sexo||'',
        fechaNac:a.dob||'',
        division:a.division||'',
        categoria:a.categoria||'',
        modalidad:a.modalidad||'',
        club:a.club||'',
        universidad:a.universidad||'',
        evento:eventName,
        status:a.status||'approved',
        timestamp:Date.now(),
        importedFromJson:true
      });
      imported++;
    }catch(e){
      errors++; lastErr=e;
      console.warn('Error importing',a.nombre,e);
    }
  }
  await logAction('import_nomina',eventName,null,`${imported} imported, ${skipped} skipped, ${errors} errors`);
  if(errors){
    showToast(`${imported} OK · ${skipped} dup · ${errors} ERR (${lastErr?.code||lastErr?.message||'desconocido'})`,null,true);
  } else {
    showToast(`Importado: ${imported} atletas (${skipped} duplicados omitidos)`);
  }
}

// Crea (o actualiza) el doc en `eventos/{eventName}` a partir de la metadata
// que vive en nominas.json. Útil para eventos cuyas inscripciones ya están en
// Firebase pero que nunca tuvieron doc de evento (ej. cargados antes de que
// existiera esta herramienta).
window.syncEventoFromJson=async function(eventName){
  const ev=ST.nominas.events?.find(e=>e.name===eventName);
  if(!ev){showToast('Evento no encontrado en nominas.json',null,true);return}
  const existing=ST.eventos.find(e=>e.id===eventName||e.name===eventName);
  const msg=existing
    ? `Actualizar metadata de "${eventName}" desde nominas.json?`
    : `Crear el evento "${eventName}" en Firestore con la metadata de nominas.json?\n\nDespués vas a poder editar fechas/ubicación/organizador desde Campeonatos.`;
  if(!confirm(msg))return;
  try{
    const docId=existing?.id||eventName;
    const data={
      id:docId,
      name:eventName,
      date:ev.date||'',
      closeDate:ev.closeDate||'',
      location:ev.location||'',
      org:ev.organizer||ev.org||'',
      days:ev.days||'',
      status:existing?.status||'open',
      extraCols:ev.extraCols||['modalidad'],
      updatedAt:serverTimestamp()
    };
    if(!existing)data.createdAt=serverTimestamp();
    await setDoc(doc(db,'eventos',docId),data,{merge:true});
    await logAction(existing?'sync_evento_meta':'create_evento_from_json',docId,null,eventName);
    showToast(existing?'✓ Metadata actualizada':'Evento creado — ya editable en Campeonatos');
  }catch(e){
    console.error(e);
    showToast('Error: '+(e.code||e.message),null,true);
  }
}

// EDIT ATHLETES (data.json)
// ═══════════════════════════════════════════
// Los athlete_edits se indexan por RUT (que nunca cambia) en vez de código,
// así editar el código no rompe el matching ni revierte al recargar.
function _editDocId(a){
  const rut=String(a.rut||'').replace(/[^0-9kK]/gi,'').toUpperCase();
  if(rut) return 'rut_'+rut;
  // fallback: si no hay rut, usar código (atletas viejos sin rut)
  return 'cod_'+String(a.codigo||'').replace(/[^a-zA-Z0-9_-]/g,'_');
}
// Guarda el overlay completo del atleta en athlete_edits (snapshot de campos editables)
async function _saveEdit(a){
  const docId=_editDocId(a);
  await setDoc(doc(db,'athlete_edits',docId),{
    rut:a.rut||'', codigo:a.codigo||'', nombre:a.nombre||'',
    club:a.club||'', debut:a.debut||'', sexo:a.sexo||'',
    fechaNac:a.fechaNac||a.fecha_nac||'', zona:a.zona||'', comuna:a.comuna||'',
    ts:Date.now()
  },{merge:true});
}
window.editAthlete=async function(cod,field){
  const a=ST.data.find(x=>x.codigo===cod);if(!a)return;
  const cur=a[field]||'';
  openEditModal(`Editar ${field} de ${a.nombre}`,field,cur,async(nv)=>{
    if(nv===cur)return;
    const old=cur;
    a[field]=nv;
    try{
      await _saveEdit(a);   // guarda snapshot completo indexado por RUT
      await logAction('edit_athlete',`${a.codigo}.${field}`,old,nv,{nombre:a.nombre});
      render();
      showToast(`${field} actualizado: ${a.nombre}`,async()=>{
        a[field]=old;
        await _saveEdit(a);
        await logAction('undo_edit_athlete',`${a.codigo}.${field}`,nv,old,{nombre:a.nombre});
        render();showToast('Cambio revertido');
      });
    }catch(e){console.error(e);a[field]=old;render();showToast('Error: '+e.message,null,true)}
  });
}

function generarCodigo(a){
  const rut=String(a.rut||'').replace(/[^0-9]/g,'');
  const nombre=String(a.nombre||'').trim();
  const debut=String(a.debut||'').match(/\d{4}/)?.[0]||'';
  if(!rut||!nombre||!debut)return null;
  const digits=rut.slice(0,4).padEnd(4,'0');
  const partes=nombre.split(/\s+/).filter(Boolean);
  const ini0=(partes[0]||'')[0]?.toUpperCase()||'X';
  // Apellidos = últimas 2 palabras
  const ini1=(partes.length>=2?partes[partes.length-2]:partes[0]||'')[0]?.toUpperCase()||'X';
  const ini2=(partes.length>=3?partes[partes.length-1]:partes[partes.length-1]||'')[0]?.toUpperCase()||'X';
  return `${digits}${ini0}${ini1}${ini2}-${debut}`;
}

async function _applyCodigoFix(a,oldCod,newCod,newRut){
  try{
    // Si el RUT cambia, el docId (basado en RUT) también cambia → borrar el viejo
    const oldDocId=_editDocId(a);
    a.codigo=newCod;
    if(newRut)a.rut=newRut;
    const newDocId=_editDocId(a);
    if(oldDocId!==newDocId){try{await deleteDoc(doc(db,'athlete_edits',oldDocId))}catch(_){}}
    await _saveEdit(a);   // snapshot completo indexado por RUT
    await logAction('fix_codigo',oldCod,oldCod,newCod,{nombre:a.nombre,rut:a.rut||''});
    render();
    showToast('Código corregido: '+newCod);
  }catch(e){a.codigo=oldCod;showToast('Error: '+e.message,null,true);}
}

window.fixCodigoAuto=async function(cod){
  const a=ST.data.find(x=>x.codigo===cod);if(!a)return;
  if(!a.rut){
    openEditModal('RUT de '+a.nombre+' (sin puntos ni guión, ej: 123456787)','rut','',async(newRut)=>{
      if(!newRut)return;
      a.rut=newRut;
      const newCod=generarCodigo(a);
      if(!newCod){showToast('No se pudo generar — falta nombre o debut',null,true);return;}
      if(!confirm('Cambiar código de:\n"'+cod+'"\na:\n"'+newCod+'"'))return;
      await _applyCodigoFix(a,cod,newCod,newRut);
    });
  }else{
    const newCod=generarCodigo(a);
    if(!newCod){showToast('No se pudo generar — falta RUT, nombre o debut',null,true);return;}
    if(!confirm('Cambiar código de:\n"'+cod+'"\na:\n"'+newCod+'"'))return;
    await _applyCodigoFix(a,cod,newCod,null);
  }
};

// ═══════════════════════════════════════════
// EDIT REQUESTS (solicitudes de edición de atletas)
// ═══════════════════════════════════════════
// El atleta crea un doc en edit_requests con RUT+PIN+cambios. Acá el admin
// valida el PIN contra inscripciones_private y aplica los cambios.
window.approveEditRequest=async function(reqId){
  reqId=decodeURIComponent(reqId);
  const req=ST.editRequests.find(r=>r.id===reqId);if(!req)return;
  const priv=ST.inscripcionesPrivate[req.inscripcionId];
  if(!priv){
    if(!confirm(`No encontramos el doc privado para ${req.inscripcionId}. ¿Aplicar los cambios SIN validar el PIN? (úsalo solo si verificaste la identidad por otro medio)`))return;
  }else if(priv.pin!==req.pin){
    if(!confirm(`El PIN enviado (${req.pin}) NO coincide con el registrado. ¿Aplicar igual los cambios? (úsalo solo si verificaste la identidad por otro medio)`))return;
  }
  try{
    // Aplicar cambios al doc público (solo campos permitidos).
    const allowed=['nombre','codigo','sexo','fechaNac','division','categoria','modalidad','club','clubOtro','comuna','universidad'];
    const updates={};
    for(const k of allowed){if(req.changes&&req.changes[k]!==undefined)updates[k]=req.changes[k];}
    if(Object.keys(updates).length){
      await updateDoc(doc(db,'inscripciones',req.inscripcionId),updates);
    }
    await deleteDoc(doc(db,'edit_requests',reqId));

}

// Helper de migración one-shot: copia pin/carnetURL/wadeURL de inscripciones
// viejas a inscripciones_private y limpia el doc público. Correr UNA VEZ
// desde consola tras deploy de reglas nuevas:
//   await migrateToPrivateCollection()
window.migrateToPrivateCollection=async function(){
  if(!ST.user) throw new Error('Debes estar autenticado como admin.');
  let migrated=0,skipped=0,errors=0;
  for(const ins of ST.inscripciones){
    const priv={};
    if(ins.pin)priv.pin=String(ins.pin);
    if(ins.carnetURL)priv.carnetURL=ins.carnetURL;
    if(ins.wadeURL)priv.wadeURL=ins.wadeURL;
    if(!Object.keys(priv).length){skipped++;continue;}
    priv.ts=serverTimestamp();
    try{
      // Escribir doc privado (merge para no pisar si ya existe).
      await setDoc(doc(db,'inscripciones_private',ins.id),priv,{merge:true});
      // Limpiar campos sensibles del doc público.
      const cleanup={};
      if(ins.pin!==undefined)cleanup.pin=deleteField();
      if(ins.carnetURL!==undefined)cleanup.carnetURL=deleteField();
      if(ins.wadeURL!==undefined)cleanup.wadeURL=deleteField();
      await updateDoc(doc(db,'inscripciones',ins.id),cleanup);
      migrated++;
    }catch(e){errors++;console.warn('migrate fail',ins.id,e.message);}
  }
  await logAction('migrate_private',null,null,`migrated=${migrated} skipped=${skipped} errors=${errors}`);
  console.log(`Migración: ${migrated} movidos, ${skipped} omitidos (sin campos sensibles), ${errors} errores.`);
  return {migrated,skipped,errors};
}

window.sortNominaByEvent=async function(eventoId){
  const list=ST.inscripciones.filter(i=>i.evento===eventoId&&i.status!=='rejected');
  if(!list.length){showToast('No hay atletas',null,true);return}
  if(!confirm('Esto reordenará la nómina (hombres por categoría, luego mujeres). ¿Continuar?'))return;
  const wt=a=>parseFloat(String(a.categoria||'999').replace(/[^0-9.]/g,''))||999;
  const isM=a=>a.sexo==='Hombre'||a.sexo==='Masculino'||a.sexo==='M';
  list.sort((a,b)=>{
    const ma=isM(a),mb=isM(b);
    if(ma!==mb)return ma?-1:1;
    return wt(a)-wt(b);
  });
  // Update sortOrder field for each
  let order=1;
  for(const ins of list){
    try{
      await updateDoc(doc(db,'inscripciones',ins.id),{sortOrder:order});
      order++;
    }catch(e){console.warn('sort update fail',e)}
  }
  await logAction('sort_nomina',eventoId,null,`${list.length} athletes`);
  showToast(`Nómina ordenada: ${list.length} atletas`);
}

window._inscMatches=[];
window.inscribirSearch=function(q){
  const res=document.getElementById('im_results');
  if(!q||q.length<2){res.style.display='none';return}
  const lower=q.toLowerCase();
  window._inscMatches=(ST.data||[]).filter(a=>(a.nombre||'').toLowerCase().includes(lower)||(a.codigo||'').toLowerCase().includes(lower)).slice(0,8);
  if(!window._inscMatches.length){res.style.display='none';return}
  res.style.display='block';
  res.innerHTML=window._inscMatches.map((a,i)=>`
    <div onclick="inscribirFill(${i})"
      style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:12px;display:flex;flex-direction:column;gap:2px"
      onmouseover="this.style.background='rgba(59,130,246,.12)'" onmouseout="this.style.background=''">
      <span style="font-weight:600;color:var(--text)">${a.nombre||''}</span>
      <span style="color:var(--muted)">${a.codigo||''} · ${a.club||''}</span>
    </div>`).join('');

window.inscribirFill=function(idx){
  const a=window._inscMatches[idx];
  if(!a)return;
  document.getElementById('im_search').value=a.nombre||'';
  document.getElementById('im_results').style.display='none';
  document.getElementById('im_nombre').value=a.nombre||'';
  document.getElementById('im_rut').value=a.rut||'';
  document.getElementById('im_fechaNac').value=a.fechaNac||'';
  document.getElementById('im_club').value=a.club||'';
  // Inferir sexo desde competencias
  const comps=a.competencias||[];
  const sexoComp=(comps.find(c=>c.sexo)||{}).sexo||'';
  const esFem=sexoComp.toLowerCase().includes('f')||sexoComp.toLowerCase().includes('mujer');
  document.getElementById('im_sexo').value=esFem?'Femenino':'Masculino';
  // Inferir categoría y división desde la competencia más reciente con datos
  const conCat=comps.filter(c=>c.categoria).sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));
  if(conCat.length){
    const cat=String(conCat[0].categoria).replace(/[^0-9+]/g,'');
    document.getElementById('im_categoria').value=cat;
    const div=conCat[0].division||'';
    const divEl=document.getElementById('im_division');
    const opts=[...divEl.options].map(o=>o.value);
    const match=opts.find(o=>div.toLowerCase().includes(o.toLowerCase()));
    if(match)divEl.value=match;
  }
};

window.viewInsDocs = function(sid){
  const insId = decodeURIComponent(sid);
  const i = ST.inscripciones.find(x=>x.id===insId);
  if(!i) { showToast('Inscripción no encontrada', null, true); return; }
  const priv = ST.inscripcionesPrivate?.[insId] || {};

  // Mapeo de campos legacy → metadata del catálogo
  const LEGACY_MAP = {
    carnetURL:         { label: 'Carnet de Identidad', icon: '' },
    wadeURL:           { label: 'ADEL/WADA', icon: '' },
    carnetPhotoURL:    { label: 'Foto fondo blanco', icon: '' },
    consentimientoURL: { label: 'Consentimiento Menor', icon: '' },
    passportURL:       { label: 'Pasaporte', icon: '' },
    ipfConsentURL:     { label: 'Consentimiento IPF', icon: '' },
    notasURL:          { label: 'Concentración de Notas', icon: '' }
  };
  const NEW_MAP = (window.DOC_TYPES_CATALOG||{});

  // Construir lista unificada de docs (sin duplicar)
  const docs = [];
  // 1) Primero del campo `docs` (nuevo sistema)
  if(priv.docs && typeof priv.docs==='object'){
    Object.entries(priv.docs).forEach(([k, url])=>{
      const meta = NEW_MAP[k] || { label: k, icon: '', desc: '' };
      docs.push({ key: k, url, label: meta.label, icon: meta.icon, source: 'docs' });

  // 2) Después los campos legacy que no estén ya cubiertos

  const isImg = url => /\.(jpg|jpeg|png|webp|gif)(\?|$)/i.test(url);

          </div>
          <div style="padding:10px 12px">
            <div style="font-family:Oswald;font-size:11px;letter-spacing:2px;color:var(--gold);font-weight:600">${d.icon} ${esc(d.label)}</div>
            <div style="display:flex;gap:6px;margin-top:8px">
              <a href="${esc(d.url)}" target="_blank" rel="noopener" style="flex:1;padding:6px 10px;background:rgba(34,197,94,.15);border:1px solid var(--green);color:var(--green);border-radius:5px;text-align:center;font-family:Oswald;font-size:11px;font-weight:700;letter-spacing:1px;text-decoration:none">↗ ABRIR</a>
              <a href="${esc(d.url)}" download style="padding:6px 10px;background:rgba(59,130,246,.15);border:1px solid var(--blue);color:var(--blue);border-radius:5px;font-family:Oswald;font-size:11px;font-weight:700;letter-spacing:1px;text-decoration:none"></a>
            </div>
            <button onclick="replaceInsDocFile('${sid}','${d.key}')" style="width:100%;margin-top:6px;padding:6px 10px;background:rgba(212,168,67,.12);border:1px solid var(--gold);color:var(--gold);border-radius:5px;cursor:pointer;font-family:Oswald;font-size:11px;font-weight:700;letter-spacing:1px">REEMPLAZAR</button>
          </div>

  m.onclick = (e) => { if(e.target===m) m.remove(); };

        <div style="font-family:Oswald;font-size:20px;font-weight:700;color:var(--text);margin-top:4px">${esc(i.nombre)} <span style="color:var(--muted);font-weight:400">· ${esc(i.rut||'')}</span></div>

      <button onclick="document.getElementById('docsModal').remove()" style="background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 14px;border-radius:6px;cursor:pointer;font-family:Oswald;font-size:12px">✕ CERRAR</button>

// ════════════════════════════════════════════════════════════════
// Reemplazar un documento de inscripción: sube el archivo nuevo a
// Storage y ACTUALIZA la URL en inscripciones_private. No hay que
// tocar Storage manualmente — esto evita el problema de URLs viejas.
// docKey: clave nueva ('carnetIdFront'...) o legacy ('carnetURL'...)
// ════════════════════════════════════════════════════════════════
// Mapa docKey nuevo → campo legacy + storagePath
const DOC_STORAGE_MAP = {
  carnetIdFront:{legacy:'carnetURL',path:'carnet'},
  fotoBlanco:{legacy:'carnetPhotoURL',path:'carnetPhoto'},
  pasaporte:{legacy:'passportURL',path:'passport'},
  wadaIntl:{legacy:'wadeURL',path:'wada'},
  ipfConsent:{legacy:'ipfConsentURL',path:'ipfConsent'},
  menorConsent:{legacy:'consentimientoURL',path:'consentimiento'},
  notas:{legacy:'notasURL',path:'notas'},
  // legacy keys (cuando el doc viene del sistema viejo)
  carnetURL:{legacy:'carnetURL',path:'carnet',newKey:'carnetIdFront'},
  wadeURL:{legacy:'wadeURL',path:'wada',newKey:'wadaIntl'},
  carnetPhotoURL:{legacy:'carnetPhotoURL',path:'carnetPhoto',newKey:'fotoBlanco'},
  consentimientoURL:{legacy:'consentimientoURL',path:'consentimiento',newKey:'menorConsent'},
  passportURL:{legacy:'passportURL',path:'passport',newKey:'pasaporte'},
  ipfConsentURL:{legacy:'ipfConsentURL',path:'ipfConsent',newKey:'ipfConsent'},
  notasURL:{legacy:'notasURL',path:'notas',newKey:'notas'}
};
window.replaceInsDocFile = function(sid, docKey){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*,.pdf';
  inp.onchange=async()=>{
    const file=inp.files&&inp.files[0]; if(!file) return;
    const insId=decodeURIComponent(sid);
    const i=ST.inscripciones.find(x=>x.id===insId);
    if(!i){showToast('Inscripción no encontrada',null,true);return;}
    const map=DOC_STORAGE_MAP[docKey];
    if(!map){showToast('Tipo de documento desconocido: '+docKey,null,true);return;}
    const rutClean=String(i.rut||'').replace(/[^0-9kK]/g,'').toUpperCase();
    if(!rutClean){showToast('Esta inscripción no tiene RUT',null,true);return;}
    showToast('Subiendo archivo nuevo…');
    try{
      const storage=getStorage(app);
      const ts=Date.now();
      const sref=storageRef(storage,`athlete_files/${rutClean}/${map.path}_${ts}`);
      await uploadBytes(sref,file,{contentType:file.type||'application/octet-stream'});
      const url=await getDownloadURL(sref);
      // Actualizar AMBOS: campo legacy y el mapa docs (nuevo sistema)
      const update={[map.legacy]:url};
      const newKey=map.newKey||docKey;
      // si DOC_TYPES_CATALOG tiene newKey, escribir también en docs.{newKey}
      update['docs.'+newKey]=url;
      await updateDoc(doc(db,'inscripciones_private',insId),update);
      // refrescar estado local
      if(!ST.inscripcionesPrivate[insId])ST.inscripcionesPrivate[insId]={};
      ST.inscripcionesPrivate[insId][map.legacy]=url;
      if(!ST.inscripcionesPrivate[insId].docs)ST.inscripcionesPrivate[insId].docs={};
      ST.inscripcionesPrivate[insId].docs[newKey]=url;
      await logAction('replace_doc',insId,docKey,'(nuevo archivo)',{nombre:i.nombre});
      showToast('Documento reemplazado');
      // re-abrir el modal con los datos frescos
      document.getElementById('docsModal')?.remove();
      viewInsDocs(sid);
    }catch(e){
      console.error(e);
      showToast('Error: '+e.message,null,true);
    }
  };
  inp.click();
};

window.crearPerfilDebutante=async function(sid){
  const insId=decodeURIComponent(sid);
  const i=ST.inscripciones.find(x=>x.id===insId);
  if(!i){showToast('Inscripción no encontrada',null,true);return;}
  const priv=ST.inscripcionesPrivate?.[insId]||{};
  const rutRaw=i.rut||priv.rut||'';
  const rutClean=rutRaw.replace(/[^0-9kK]/g,'').toUpperCase();
  if(!rutClean){showToast('Esta inscripción no tiene RUT — no se puede crear el perfil',null,true);return;}
  // Verificar de nuevo que no existe
  const rutNorm=s=>String(s||'').replace(/[^0-9kK]/g,'').toUpperCase();
  const yaExiste=(ST.data||[]).find(a=>rutNorm(a.rut)===rutClean);
  if(yaExiste){showToast('Ya existe un perfil para este RUT: '+yaExiste.nombre,null,true);return;}
  // Generar código único
  const codigo=i.codigo||('FCP-'+new Date().getFullYear()+'-'+Math.random().toString(36).slice(2,6).toUpperCase());
  const fechaNac=i.fechaNac||priv.fechaNac||'';
  const pendDoc={
    nombre:i.nombre||'',
    rut:rutRaw,
    codigo,
    sexo:i.sexo||'',
    fechaNac,
    club:i.club||'',
    zona:i.comuna||'',
    debut:true,
    inscripcion_evento:i.evento||'',
    ts:serverTimestamp(),
  };
  try{
    await setDoc(doc(db,'atletas_pending',rutClean),pendDoc);
    // Agregar en memoria para que aparezca el banner y en búsquedas
    ST.data.push({...pendDoc,_isPending:true});
    await logAction('crear_perfil_debutante',rutClean,null,i.nombre);
    showToast('★ Perfil creado para '+i.nombre+' — ya visible en atleta.html');
    render();
  }catch(e){showToast('Error: '+e.message,null,true);}
};

window.publicarDataJson=async function(){
  if(ST.adminInfo?.role!=='owner'&&!ST.adminInfo?.bootstrap){showToast('Solo el Owner puede publicar data.json',null,true);return;}
  const pendientes=(ST.data||[]).filter(a=>a._isPending);
  if(!pendientes.length){showToast('No hay debutantes pendientes',null,true);return;}
  if(!confirm(`¿Incorporar ${pendientes.length} debutante(s) al data.json?\n\n${pendientes.map(a=>a.nombre).join('\n')}\n\nSe descargará el archivo actualizado. Súbelo al servidor para publicarlo.`))return;

  // Build clean data.json: all athletes without internal flags
  const clean=ST.data.map(({_isPending,...a})=>{
    // Convert fechaNac yyyy-mm-dd → dd/mm/yyyy if needed (debutants come in HTML date format)
    if(a.debut&&a.fechaNac&&/^\d{4}-\d{2}-\d{2}$/.test(a.fechaNac)){
      const [y,m,d]=a.fechaNac.split('-');
      a.fechaNac=`${d}/${m}/${y}`;
    }
    // Ensure debut year is set
    if(!a.debut&&a.fechaNac){
      const m=a.fechaNac.match(/(\d{4})/);
      if(m)a.debut=m[1];
    }
    // Ensure required fields exist
    if(!a.competencias)a.competencias=[];
    if(!a.bestLifts)a.bestLifts={sq:0,bp:0,dl:0,total:0,glp:0,dots:0};
    return a;
  });

  // Download locally
  const blob=new Blob([JSON.stringify(clean,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('a');link.href=url;link.download='data.json';link.click();
  URL.revokeObjectURL(url);

  // Mark as incorporated in Firestore
  const rutNorm=s=>String(s||'').replace(/[^0-9kK]/g,'').toUpperCase();
  let marcados=0;
  for(const a of pendientes){
    try{
      const rut=rutNorm(a.rut);
      if(!rut)continue;
      await setDoc(doc(db,'atletas_pending',rut),{incorporated:true,incorporatedAt:serverTimestamp()},{merge:true});
      marcados++;
    }catch(e){console.warn('[publicarDataJson] mark:',e.message);}
  }

  // Remove _isPending flag from local state so banner disappears
  ST.data.forEach(a=>delete a._isPending);

  await logAction('publicar_data_json',`${clean.length} atletas`,null,`${pendientes.length} debutantes`);
  showToast(`data.json descargado (${clean.length} atletas). ${marcados} debutante(s) marcados como incorporados. Sube el archivo al servidor.`);
  render();
}

// ── OPL Export ──────────────────────────────────────────────
window.exportOPL=function(eventoId){
  const list=ST.inscripciones.filter(i=>
    (!eventoId||i.evento===eventoId)&&i.status==='approved'
  );
  if(!list.length){showToast('Sin inscripciones aprobadas para exportar',null,true);return;}
  // OPL CSV format: Name,Sex,Event,Equipment,Age,AgeClass,BirthYearClass,Division,
  // BodyweightKg,WeightClassKg,Squat1Kg,...,TotalKg,Place,Federation,Date,MeetCountry,MeetState,MeetTown,MeetName
  const today=new Date().toISOString().slice(0,10);
  const evName=eventoId?(ST.eventos.find(e=>e.id===eventoId)?.name||eventoId):'FECHIPO 2026';
  const header='Name,Sex,Event,Equipment,Age,AgeClass,BirthYearClass,Division,BodyweightKg,WeightClassKg,Squat1Kg,Squat2Kg,Squat3Kg,Bench1Kg,Bench2Kg,Bench3Kg,Deadlift1Kg,Deadlift2Kg,Deadlift3Kg,TotalKg,Place,Federation,Date,MeetCountry,MeetState,MeetTown,MeetName';
  const rows=list.map(i=>{
    const sex=i.sexo==='Hombre'||i.sexo==='Masculino'||i.sexo==='M'?'M':'F';
    const modal=(i.modalidad||'').toLowerCase();
    const event=modal.includes('bench')?'B':'SBD';
    const equip=modal.includes('equip')?'Single-ply':'Raw';
    const catKg=parseFloat((i.categoria||'').replace(/[^0-9.+]/g,''))||'';
    let age='';
    if(i.fechaNac){try{const b=new Date(i.fechaNac);age=Math.floor((new Date()-b)/365.25/86400000);}catch(e){}}
    const div=(i.division||'Open').replace('Sub-Junior','Sub-Juniors').replace('Junior','Juniors').replace('Open','Open').replace('Master I','Masters 1').replace('Master II','Masters 2').replace('Master III','Masters 3').replace('Master IV','Masters 4');
    return [i.nombre,'',sex,event,equip,age||'','','',div,'',catKg,'','','','','','','','','','','','','CHL','RM','',evName].join(',');
  });
  const csv=[header,...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download='OPL_'+((eventoId||'fechipo').replace(/[^a-zA-Z0-9]/g,'_'))+'_'+today+'.csv';
  a.click();
  showToast('CSV OPL exportado — '+list.length+' atletas');
};

// ═══════════════════════════════════════════
// ESTADÍSTICAS
// ═══════════════════════════════════════════
function buildStatsRows(){
  const rows=[];const yearRe=/20\d{2}/;

  // Normalize category: extract number + detect open (plus) category
  const normCat=raw=>{
    const s=String(raw||'');
    const num=(s.match(/\d+/)||[''])[0];
    if(!num)return'?';
    return s.includes('+')?num+'+':num;
  };

  // Normalize division to canonical labels
  const normDiv=raw=>{
    const d=(raw||'').toLowerCase().replace(/[-_]/g,' ').trim();
    if(/sub\s*jun/.test(d)||d==='subjunior')return'Sub-Junior';
    if(/\bjunior\b/.test(d))return'Junior';
    if(/master/.test(d)){
      if(/iv|4/.test(d))return'Master IV';
      if(/iii|3/.test(d))return'Master III';
      if(/ii|2/.test(d))return'Master II';
      return'Master I';
    }
    if(/universitari/.test(d))return'Universitario';
    return'Open';
  };

  // Normalize modalidad → returns array of mods (combined events produce 2)
  const normMods=raw=>{
    const m=(raw||'').toLowerCase();
    if(m.includes('equip')&&(m.includes('bench')||m.includes('only')))return['Equipado','Only Bench'];
    if(m.includes('equip'))return['Equipado'];
    const hasBench=m.includes('bench')||m.includes('only')||m.includes('onlybench');
    const hasClassic=m.includes('powerlifting')||m.includes('classic')||m.includes('raw')||!hasBench;
    if(hasBench&&hasClassic)return['Classic','Only Bench'];
    if(hasBench)return['Only Bench'];
    return['Classic'];
  };

  (ST.data||[]).forEach(a=>{
    // Birth year — supports DD/MM/YYYY and YYYY/MM/DD
    const fp=(a.fechaNac||'').split('/');
    let by=0;
    if(fp.length===3){
      const y0=parseInt(fp[0]),y2=parseInt(fp[2]);
      if(y2>1920&&y2<2015)by=y2;       // DD/MM/YYYY
      else if(y0>1920&&y0<2015)by=y0;  // YYYY/MM/DD
    }
    (a.competencias||[]).forEach(c=>{
      let year='';
      if(c.fecha)year=String(c.fecha).substring(0,4);
      else{const m=yearRe.exec(c.evento||'');if(m)year=m[0];}
      const yn=parseInt(year);
      if(!year||yn<2016||yn>2030)return;
      const sr=(c.sexo||'').toLowerCase();
      const sexo=sr.includes('mujer')||sr.includes('f')?'F':sr.includes('hombre')||sr.includes('m')?'M':'';
      const base={codigo:a.codigo,club:a.club||'',year,yn,sexo,
        cat:normCat(c.categoria),div:normDiv(c.division),
        age:by>0?yn-by:null,total:parseFloat(c.resultado?.total)||0};
      normMods(c.modalidad).forEach(mod=>rows.push({...base,mod}));
    });
  });
  return rows;
}

// Aplica filtros globales a las filas de stats
function applyStatsFilters(rows){
  const f = ST.statsFilters || {};
  return rows.filter(r => {
    if(f.yearFrom && r.year < f.yearFrom) return false;
    if(f.yearTo && r.year > f.yearTo) return false;
    if(f.sex && r.sexo !== f.sex) return false;
    if(f.mod && r.mod !== f.mod) return false;
    if(f.div && r.div !== f.div) return false;
    if(f.club && r.club !== f.club) return false;
    return true;
  });
}

window.exportStatsCSV = function(){
  const rows = applyStatsFilters(buildStatsRows());
  const headers = ['codigo','club','year','sexo','categoria','division','modalidad','edad','total_kg'];
  const csv = [headers.join(',')];
  rows.forEach(r=>{
    csv.push([
      r.codigo, `"${(r.club||'').replace(/"/g,'""')}"`, r.year, r.sexo,
      r.cat, r.div, r.mod, r.age||'', r.total||''
    ].join(','));
  });
  const blob = new Blob([csv.join('\n')], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'yourlift_stats_' + new Date().toISOString().slice(0,10) + '.csv'; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  showToast('CSV exportado: ' + rows.length + ' filas');
};

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'yourlift_stats_' + new Date().toISOString().slice(0,10) + '.json'; a.click();

let _webCharts={};
async function loadWebAnalytics(){
  const cont=document.getElementById('statsWebContent');
  if(!cont)return;
  try{
    const snap=await getDocs(collection(db,'analytics_daily'));
    const days=[];
    snap.forEach(d=>{const x=d.data();days.push({date:d.id,total:x.total||0,unique:x.unique||0,pages:x.pages||{},refs:x.refs||{}})});
    days.sort((a,b)=>a.date.localeCompare(b.date));
    window._WEB_DAYS=days;
    cont.innerHTML=renderWebAnalytics(days);
    setTimeout(()=>initWebCharts(days),0);
  }catch(e){
    cont.innerHTML='<div style="padding:30px;text-align:center;color:var(--red)">Error cargando analytics: '+e.message+'</div>';
  }
}

function _sumRange(days,fromDate){
  let t=0,u=0;
  days.forEach(d=>{ if(d.date>=fromDate){ t+=d.total; u+=d.unique; } });
  return {t,u};
}
function renderWebAnalytics(days){
  if(!days.length) return '<div style="padding:40px;text-align:center;color:var(--muted)">Aún no hay datos de visitas. Se registrarán a medida que la gente entre a yourlift.cl.</div>';
  const today=new Date();
  const ymd=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const todayStr=ymd(today);
  const weekAgo=new Date(today);weekAgo.setDate(today.getDate()-6);
  const monthAgo=new Date(today);monthAgo.setDate(today.getDate()-29);
  const todayRow=days.find(d=>d.date===todayStr)||{total:0,unique:0};
  const week=_sumRange(days,ymd(weekAgo));
  const month=_sumRange(days,ymd(monthAgo));
  const totalAll=days.reduce((s,d)=>s+d.total,0);
  const uniqueAll=days.reduce((s,d)=>s+d.unique,0);
  // Páginas agregadas
  const pageAgg={};
  days.forEach(d=>Object.entries(d.pages).forEach(([k,v])=>{pageAgg[k]=(pageAgg[k]||0)+v}));
  const pageTop=Object.entries(pageAgg).sort((a,b)=>b[1]-a[1]).slice(0,8);
  // Orígenes agregados
  const refAgg={};
  days.forEach(d=>Object.entries(d.refs).forEach(([k,v])=>{refAgg[k]=(refAgg[k]||0)+v}));
  const refTop=Object.entries(refAgg).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const PAGE_LABEL={home:'Inicio',nominas:'Nóminas',stats:'Estadísticas',records:'Records',trans:'Transmisiones',atletas:'Atletas',insc:'Inscripción',rank:'Ranking',glcalc:'Calc. GL'};
  const ks='background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;text-align:center';
  const kpi=(val,lbl,col)=>`<div style="${ks}"><div style="font-family:Oswald;font-size:34px;font-weight:700;color:${col}">${val.toLocaleString()}</div><div style="color:var(--muted);font-size:11px;margin-top:4px;font-family:Oswald;letter-spacing:1px">${lbl}</div></div>`;
  const card=(t,id,h='300px')=>`<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px"><div style="font-family:Oswald;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:14px">${t}</div><div style="position:relative;height:${h}"><canvas id="${id}"></canvas></div></div>`;
  return `
  <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
    <button onclick="exportWebCSV()" style="background:rgba(34,197,94,.15);border:1px solid var(--green);color:var(--green);padding:8px 14px;border-radius:8px;font-family:Oswald;font-size:11px;letter-spacing:1px;cursor:pointer;font-weight:700">EXPORTAR CSV</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px">
    ${kpi(todayRow.total,'VISITAS HOY','var(--gold)')}
    ${kpi(week.t,'VISITAS 7 DÍAS','#3b82f6')}
    ${kpi(month.t,'VISITAS 30 DÍAS','#22c55e')}
    ${kpi(totalAll,'VISITAS TOTALES','#a78bfa')}
    ${kpi(uniqueAll,'VISITANTES ÚNICOS','#f59e0b')}
  </div>
  <div style="margin-bottom:12px;font-family:Oswald;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--muted)">EVOLUCIÓN DE VISITAS</div>
  <div style="margin-bottom:16px">${card('VISITAS POR DÍA (TOTAL vs ÚNICOS)','webDaily','320px')}</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    ${card('PÁGINAS MÁS VISITADAS','webPages','320px')}
    ${card('ORIGEN DEL TRÁFICO','webRefs','320px')}
  </div>
  <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:16px">Datos propios de YourLift · Actualizado en tiempo real · Visitante único = 1 por persona por día</div>`;
}

function initWebCharts(days){
  Object.values(_webCharts).forEach(c=>{try{c.destroy()}catch(e){}});_webCharts={};
  const base={color:'#D4E1F0',plugins:{legend:{labels:{color:'#D4E1F0',font:{family:'Oswald',size:11}}}},
    scales:{x:{ticks:{color:'#7A8FA6',font:{family:'Oswald',size:10}},grid:{color:'rgba(30,58,95,.5)'}},y:{ticks:{color:'#7A8FA6',font:{family:'Oswald',size:10}},grid:{color:'rgba(30,58,95,.5)'},beginAtZero:true}}};
  const mk=(id,type,data,extra={})=>{const el=document.getElementById(id);if(!el)return;_webCharts[id]=new Chart(el,{type,data,options:{responsive:true,maintainAspectRatio:false,...base,...extra,plugins:{...base.plugins,...(extra.plugins||{})}}})};
  // Últimos 30 días
  const last=days.slice(-30);
  const labels=last.map(d=>d.date.slice(5));
  mk('webDaily','line',{labels,datasets:[
    {label:'Total',data:last.map(d=>d.total),borderColor:'#D4A843',backgroundColor:'rgba(212,168,67,.15)',fill:true,tension:.3},
    {label:'Únicos',data:last.map(d=>d.unique),borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.1)',fill:true,tension:.3}
  ]});
  // Páginas
  const pageAgg={};days.forEach(d=>Object.entries(d.pages).forEach(([k,v])=>{pageAgg[k]=(pageAgg[k]||0)+v}));
  const PAGE_LABEL={home:'Inicio',nominas:'Nóminas',stats:'Estadísticas',records:'Records',trans:'Transmisiones',atletas:'Atletas',insc:'Inscripción',rank:'Ranking',glcalc:'Calc. GL'};
  const pe=Object.entries(pageAgg).sort((a,b)=>b[1]-a[1]).slice(0,8);
  mk('webPages','bar',{labels:pe.map(([k])=>PAGE_LABEL[k]||k),datasets:[{label:'Vistas',data:pe.map(([,v])=>v),backgroundColor:'#22c55e'}]},{indexAxis:'y'});
  // Refs
  const refAgg={};days.forEach(d=>Object.entries(d.refs).forEach(([k,v])=>{refAgg[k]=(refAgg[k]||0)+v}));
  const re=Object.entries(refAgg).sort((a,b)=>b[1]-a[1]).slice(0,8);
  mk('webRefs','doughnut',{labels:re.map(([k])=>k),datasets:[{data:re.map(([,v])=>v),backgroundColor:['#D4A843','#3b82f6','#22c55e','#ef4444','#a78bfa','#f59e0b','#ec4899','#06b6d4']}]},{scales:{}});
}

window.exportWebCSV=function(){
  const days=window._WEB_DAYS||[];
  const csv=['fecha,total,unicos'];
  days.forEach(d=>csv.push(`${d.date},${d.total},${d.unique}`));
  const blob=new Blob([csv.join('\n')],{type:'text/csv'});
  const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download='yourlift_trafico_web.csv';a.click();
  setTimeout(()=>URL.revokeObjectURL(u),1000);
};

function aiMd(t){
  let s=String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/`([^`]+)`/g,'<code style="background:rgba(212,168,67,.14);padding:1px 5px;border-radius:4px;font-size:12px">$1</code>');
  s=s.replace(/\n/g,'<br>');
  return s;
}

  h+='<p style="color:var(--muted);font-size:12px;margin-bottom:12px">Preguntá sobre el sistema o pedile diagnosticar fallas (inscripciones, livecast, datos). Lee Firestore en vivo; no modifica nada.</p>';
  h+='<div id="aiMsgs" style="flex:1;overflow-y:auto;border:1px solid var(--border);border-radius:12px;padding:16px;background:var(--card);display:flex;flex-direction:column;gap:12px">';
  if(!msgs.length){
    h+='<div style="color:var(--muted);font-size:13px;text-align:center;margin:auto 0"><div style="font-size:34px;margin-bottom:8px"></div>Probá con:<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px">';
    window._AI_SUG.forEach((s,i)=>{h+=`<button onclick="aiSuggest(${i})" style="padding:8px 13px;border:1px solid var(--border);background:transparent;color:var(--text);border-radius:20px;font-size:12px;cursor:pointer">${s}</button>`;});
    h+='</div></div>';
  } else {
    msgs.forEach(m=>{
      if(m.role==='user') h+=`<div style="align-self:flex-end;max-width:80%;background:var(--accent);color:#fff;padding:10px 14px;border-radius:14px 14px 4px 14px;font-size:14px">${aiMd(m.content)}</div>`;
      else h+=`<div style="align-self:flex-start;max-width:90%;background:rgba(10,22,40,.6);border:1px solid var(--border);padding:12px 16px;border-radius:14px 14px 14px 4px;font-size:14px;line-height:1.55">${aiMd(m.content)}</div>`;
    });
  }
  if(ST.aiBusy)h+='<div style="align-self:flex-start;color:var(--gold);font-size:13px;font-style:italic">⏳ El asistente está mirando los datos…</div>';
  h+='</div>';
  h+='<div style="display:flex;gap:8px;margin-top:12px">';
  h+=`<textarea id="aiInput" rows="2" placeholder="Escribí tu pregunta… (Enter para enviar)" onkeydown="aiKey(event)" ${ST.aiBusy?'disabled':''} style="flex:1;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;resize:none;font-family:inherit"></textarea>`;
  h+=`<button onclick="sendAi()" ${ST.aiBusy?'disabled':''} class="btn btn-g" style="padding:0 22px">Enviar</button>`;
  h+='</div>';
  h+='<div style="font-size:10px;color:var(--muted);margin-top:6px">Requiere la Cloud Function <code>aiAssistant</code> desplegada con el secreto ANTHROPIC_API_KEY. Fase 1: no modifica datos.</div>';
  h+='</div>';
  setTimeout(()=>{const e=document.getElementById('aiMsgs');if(e)e.scrollTop=e.scrollHeight;const i=document.getElementById('aiInput');if(i&&!ST.aiBusy)i.focus();},30);
  return h;
}
window.aiSuggest=function(i){const inp=document.getElementById('aiInput');if(inp){inp.value=window._AI_SUG[i]||'';sendAi();}};
window.aiKey=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAi();}};
window.sendAi=async function(){
  if(ST.aiBusy)return;
  const inp=document.getElementById('aiInput');const text=(inp?.value||'').trim();if(!text)return;
  if(!ST.aiMessages)ST.aiMessages=[];
  ST.aiMessages.push({role:'user',content:text});
  ST.aiBusy=true;render();
  try{
    const call=httpsCallable(fbFunctions,'aiAssistant');
    const res=await call({messages:ST.aiMessages.map(m=>({role:m.role,content:m.content}))});
    ST.aiMessages.push({role:'assistant',content:(res&&res.data&&res.data.reply)||'(sin respuesta)'});
  }catch(e){
    let msg='No pude contactar al asistente. ';
    const em=(e&&e.message)||String(e);
    if(/not-found|NOT_FOUND/i.test(em)) msg+='La Cloud Function `aiAssistant` no está desplegada. Corré: cd functions && npm install, después firebase deploy --only functions.';
    else if(/secret|ANTHROPIC|api key/i.test(em)) msg+='Falta cargar el secreto: firebase functions:secrets:set ANTHROPIC_API_KEY';
    else if(/permission|unauthenticated/i.test(em)) msg+='Permisos: solo admin/owner puede usar el asistente.';
    else msg+=em;
    ST.aiMessages.push({role:'assistant',content:msg});
  }
  ST.aiBusy=false;render();
};

function _entRutId(r){return String(r||'').replace(/[^0-9kK]/g,'').toUpperCase();}
function _entVence(fecha){ if(!fecha)return ''; const p=String(fecha).split('-'); if(p.length<2)return ''; return (parseInt(p[0])+1)+'-'+p[1]; }
function _entVigente(c){ const m=new Date().toISOString().slice(0,7); return (c.acreditaciones||[]).some(a=>a.vence&&a.vence>=m); }

function entListHtml(){
  const q=(ST.entSearch||'').toLowerCase().trim();
  const f=ST.entFilters||{};
  const catDig=s=>((/cat\.?\s*(\d)/i.exec(s||'')||[])[1]||'');
  const minProc=c=>{const ps=(c.acreditaciones||[]).map(a=>parseInt(a.proceso)).filter(n=>n);return ps.length?Math.min(...ps):99;};
  let list=(ST.entrenadores||[]).slice();
  if(q)list=list.filter(c=>((c.nombre||'')+' '+(c.rut||'')+' '+(c.club||'')+' '+(c.categoria||'')+' '+(c.correos||[]).join(' ')).toLowerCase().includes(q));
  if(f.proceso)list=list.filter(c=>(c.acreditaciones||[]).some(a=>String(a.proceso)===String(f.proceso)));
  if(f.sexo)list=list.filter(c=>{const s=(c.sexo||'').toLowerCase();return f.sexo==='H'?/^h|hombre|masc/.test(s):/muj|fem/.test(s);});
  if(f.cat)list=list.filter(c=>catDig(c.categoria)===f.cat);
  if(f.club)list=list.filter(c=>(c.club||'')===f.club);
  list.sort((a,b)=>(minProc(a)-minProc(b))||(a.nombre||'').localeCompare(b.nombre||''));
  const rows=list.map(c=>{
    const vig=_entVigente(c);
    const procs=(c.acreditaciones||[]).map(a=>a.proceso).filter(Boolean).sort((a,b)=>a-b).join(', ');
    const ult=(c.acreditaciones||[]).reduce((m,a)=>(a.vence&&(!m||a.vence>m.vence)?a:m),null);
    return `<tr>
      <td>${esc(c.nombre||'')}<br><span style="font-size:9px;color:var(--muted)">${esc(c.rut||'')}${c.club?' · '+esc(c.club):''}</span></td>
      <td style="font-size:11px">${esc((c.correos||[]).join(', ')||'—')}</td>
      <td><span class="badge b-y">${esc(c.categoria||'?')}</span></td>
      <td style="font-size:11px">P: ${procs||'—'}</td>
      <td>${vig?`<span class="badge b-g">Vigente</span>`:`<span class="badge b-r">Vencida</span>`}<br><span style="font-size:9px;color:var(--muted)">${ult?('hasta '+esc(ult.vence)):''}</span></td>
      <td style="white-space:nowrap">
        <button onclick="openEntModal('${esc(c.id)}')" class="btn" style="padding:3px 9px;font-size:10px">Editar</button>
        <button onclick="delEnt('${esc(c.id)}')" class="btn btn-r" style="padding:3px 9px;font-size:10px">Eliminar</button>
      </td>
    </tr>`;
  }).join('');
  return `<table class="tbl"><tr><th>Nombre / RUT</th><th>Correos</th><th>Cat.</th><th>Procesos</th><th>Vigencia</th><th></th></tr>${rows}</table>
    ${list.length===0?`<div class="empty">${q?'Sin resultados':'Base vacía — usa “Importar base”.'}</div>`:''}`;
}

// ── Demografía: total, rangos de edad, zona y sexo (auto desde data.json) ──
function buildDemoStats(){
  const today=new Date();
  const ageOf=fn=>{
    if(!fn)return null;
    const p=String(fn).split('/');if(p.length!==3)return null;
    let dd,mm,yy;
    const a0=parseInt(p[0]),a2=parseInt(p[2]);
    if(a2>1920&&a2<2015){dd=a0;mm=parseInt(p[1]);yy=a2;}        // DD/MM/YYYY
    else if(a0>1920&&a0<2015){yy=a0;mm=parseInt(p[1]);dd=parseInt(p[2]);} // YYYY/MM/DD
    else return null;
    if(!yy)return null;
    let age=today.getFullYear()-yy;
    const bm=mm-1,bd=dd;
    if(today.getMonth()<bm||(today.getMonth()===bm&&today.getDate()<bd))age--;
    return age;
  };
  const zoneOf=ev=>{
    const e=(ev||'').toLowerCase();
    if(e.includes('sur austral'))return'Sur Austral';
    if(e.includes('centro norte'))return'Centro Norte';
    if(e.includes('centro sur'))return'Centro Sur';
    if(e.includes('zona norte')||e.includes('regional norte')||e.includes('atacama'))return'Norte';
    if(e.includes('zona sur')||e.includes('osorno'))return'Sur';
    if(e.includes('zona centro')||e.includes('regional centro'))return'Centro';
    return null;
  };
  const sexOf=s=>{
    if(!s)return null;s=String(s).toLowerCase().trim();
    if(s.includes('muj')||s.includes('fem')||s.includes('dama')||s==='f')return'F';
    if(s.includes('hombre')||s.includes('masc')||s==='m'||s==='varon')return'M';
    return null;
  };
  const rngOf=a=>{
    if(a===null)return'Sin fecha';
    if(a<14)return'Menor de 14';if(a<=18)return'14-18';if(a<=23)return'19-23';
    if(a<=39)return'24-39';if(a<=49)return'40-49';if(a<=59)return'50-59';
    if(a<=69)return'60-69';return'70+';
  };
  const detail=[];
  (ST.data||[]).forEach(o=>{
    const a=ageOf(o.fechaNac);
    const votes={};(o.competencias||[]).forEach(c=>{const z=zoneOf(c.evento);if(z)votes[z]=(votes[z]||0)+1;});
    let best=null,bn=0;Object.keys(votes).forEach(z=>{if(votes[z]>bn){bn=votes[z];best=z;}});
    if(!best)best='No determinada';
    let sx=sexOf(o.sexo);
    if(!sx)(o.competencias||[]).some(c=>{const s=sexOf(c.sexo);if(s){sx=s;return true;}return false;});
    detail.push({codigo:o.codigo||'',edad:a===null?'':a,rango:rngOf(a),zona:best,sexo:sx||'N/D',club:o.club||'',debut:(o.debut===true?'':(o.debut||''))});
  });
  const tally=k=>{const t={};detail.forEach(r=>{t[r[k]]=(t[r[k]]||0)+1;});return t;};
  return {total:detail.length,porEdad:tally('rango'),porZona:tally('zona'),porSexo:tally('sexo'),detail};
}

// ── Afiliados por año: persona única que compitió ≥1 vez en el año (auto desde data.json) ──
function buildAfilStats(){
  const Y0=2017, Y1=new Date().getFullYear();
  const years=[]; for(let y=Y0;y<=Y1;y++) years.push(y);
  const zOrder=['Centro','Centro Norte','Centro Sur','Norte','Sur','Sur Austral','No determinada'];
  const aOrder=['Menor de 14','14-18','19-23','24-39','40-49','50-59','60-69','70+','Sin fecha'];
  const byOf=fn=>{if(!fn)return null;const p=String(fn).split('/');if(p.length!==3)return null;const a0=+p[0],a2=+p[2];if(a2>1920&&a2<2016)return a2;if(a0>1920&&a0<2016)return a0;return null;};
  const cy=c=>{if(c.fecha){const s=String(c.fecha).slice(0,4);if(/^\d{4}$/.test(s))return +s;}const m=/20\d{2}/.exec(c.evento||'');return m?+m[0]:null;};
  const zoneOf=ev=>{const e=(ev||'').toLowerCase();if(e.includes('sur austral'))return'Sur Austral';if(e.includes('centro norte'))return'Centro Norte';if(e.includes('centro sur'))return'Centro Sur';if(e.includes('zona norte')||e.includes('regional norte')||e.includes('atacama'))return'Norte';if(e.includes('zona sur')||e.includes('osorno'))return'Sur';if(e.includes('zona centro')||e.includes('regional centro'))return'Centro';return null;};
  const rngOf=a=>{if(a===null||a===undefined||isNaN(a))return'Sin fecha';if(a<14)return'Menor de 14';if(a<=18)return'14-18';if(a<=23)return'19-23';if(a<=39)return'24-39';if(a<=49)return'40-49';if(a<=59)return'50-59';if(a<=69)return'60-69';return'70+';};
  const afil={},zoneYear={},ageYear={};
  years.forEach(y=>{afil[y]=new Set();zoneYear[y]={};ageYear[y]={};zOrder.forEach(z=>zoneYear[y][z]=new Set());aOrder.forEach(a=>ageYear[y][a]=new Set());});
  const uniqAll=new Set();
  (ST.data||[]).forEach((o,idx)=>{
    const aid=o.rut||o.codigo||('x'+idx);
    const by=byOf(o.fechaNac);
    const peryear={};
    (o.competencias||[]).forEach(c=>{
      const y=cy(c); if(!y||y<Y0||y>Y1)return;
      afil[y].add(aid); uniqAll.add(aid);
      const z=zoneOf(c.evento);
      if(!peryear[y])peryear[y]={};
      if(z)peryear[y][z]=(peryear[y][z]||0)+1;
      ageYear[y][rngOf(by?(y-by):null)].add(aid);
    });
    Object.keys(peryear).forEach(y=>{
      const v=peryear[y];let best=null,bn=0;Object.keys(v).forEach(z=>{if(v[z]>bn){bn=v[z];best=z;}});
      if(!best)best='No determinada';
      zoneYear[y][best].add(aid);
    });
  });
  const afilCount={};let totalAfil=0;years.forEach(y=>{afilCount[y]=afil[y].size;totalAfil+=afil[y].size;});
  const zoneYearC={},ageYearC={};
  years.forEach(y=>{zoneYearC[y]={};zOrder.forEach(z=>zoneYearC[y][z]=zoneYear[y][z].size);ageYearC[y]={};aOrder.forEach(a=>ageYearC[y][a]=ageYear[y][a].size);});
  // Proyección (estimación manual basada en inscritos esperados de los regionales que faltan).
  // El cierre 2026 nunca baja del real ya cargado; 2027 mantiene la misma tasa 2025→cierre2026.
  const proj={};
  proj[2026]=Math.max(690, afilCount[2026]||0);
  const g26=afilCount[2025]?proj[2026]/afilCount[2025]:1.06;
  proj[2027]=Math.round(proj[2026]*g26);
  return {years,zOrder,aOrder,afilCount,totalAfiliaciones:totalAfil,totalUnicos:uniqAll.size,zoneYear:zoneYearC,ageYear:ageYearC,proj};
}

  });

    <div style="${ks}"><div style="font-family:Oswald;font-size:34px;font-weight:700;color:#3b82f6">${totalPartic.toLocaleString()}</div><div style="color:var(--muted);font-size:11px;margin-top:4px;font-family:Oswald;letter-spacing:1px">PARTICIPACIONES</div></div>

    <div style="${ks}"><div style="font-family:Oswald;font-size:34px;font-weight:700;color:#a78bfa">${clubsActivos}</div><div style="color:var(--muted);font-size:11px;margin-top:4px;font-family:Oswald;letter-spacing:1px">CLUBES ACTIVOS</div></div>
    <div style="${ks}"><div style="font-family:Oswald;font-size:34px;font-weight:700;color:#f59e0b">${Math.round(totalKg).toLocaleString()}</div><div style="color:var(--muted);font-size:11px;margin-top:4px;font-family:Oswald;letter-spacing:1px">KG TOTALES MOVIDOS</div></div>
    <div style="${ks}"><div style="font-family:Oswald;font-size:34px;font-weight:700;color:var(--green)">${maxGY||'—'}${maxG>0?' (+'+maxG+')':''}</div><div style="color:var(--muted);font-size:11px;margin-top:4px;font-family:Oswald;letter-spacing:1px">MAYOR CRECIMIENTO</div></div>
