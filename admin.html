window.createAdmin = async function(){
  const nombre = document.getElementById('naNombre').value.trim();
  const email  = document.getElementById('naEmail').value.trim().toLowerCase();
  const pass   = document.getElementById('naPass').value;
  const role   = document.getElementById('naRole').value;
  const errEl  = document.getElementById('naError');
  errEl.style.display = 'none';

  if(!nombre||!email||!pass){ errEl.style.display='block'; errEl.textContent='Completa todos los campos'; return; }
  if(pass.length < 6){ errEl.style.display='block'; errEl.textContent='La contraseña debe tener al menos 6 caracteres'; return; }

  const btn = document.querySelector('#naError + button')||document.querySelector('[onclick="createAdmin()"]');
  if(btn){ btn.disabled=true; btn.textContent='Creando...'; }

  try{
    // Use secondary app instance so we don't log out the current superadmin
    const secondaryApp = initSecondaryApp(FB_CFG, 'admin_creator_'+Date.now());
    const {getAuth:getSecAuth, createUserWithEmailAndPassword:createSecUser} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
    const secondaryAuth = getSecAuth(secondaryApp);

    const cred = await createSecUser(secondaryAuth, email, pass);
    const newUID = cred.user.uid;

    // Sign out from secondary immediately
    const {signOut:signOutSec,deleteUser} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
    await signOutSec(secondaryAuth);

    // Write to Firestore admins collection
    await setDoc(doc(db,'admins',newUID),{
      uid: newUID,
      email,
      nombre,
      role,
      createdBy: ST.user.email,
      createdAt: new Date().toISOString()
    });

    await logAction('create_admin', email, null, role, {nombre, createdBy:ST.user.email});
    showToast('Admin creado: '+nombre+' ('+email+')');

    // Clear form
    ST.adminForm = {};
    await refreshAdmins();

  }catch(e){
    errEl.style.display='block';
    if(e.code==='auth/email-already-in-use'){
      errEl.textContent = 'Ese correo ya tiene una cuenta en Firebase. Puedes agregarlo manualmente a Firestore con su UID.';
    } else {
      errEl.textContent = 'Error: '+e.message;
    }
    console.error('createAdmin error', e);
  }finally{
    if(btn){ btn.disabled=false; btn.textContent='Crear cuenta'; }
  }
};

window.revokeAdmin = async function(uid, nombre){
  if(!confirm('¿Revocar acceso de admin a '+nombre+'?\nSu cuenta de Firebase se mantiene pero ya no podrá entrar al panel.')) return;
  try{
    await deleteDoc(doc(db,'admins',uid));
    await logAction('revoke_admin', uid, nombre, 'revoked', {by:ST.user.email});
    showToast('Acceso revocado: '+nombre);
    await refreshAdmins();
  }catch(e){ showToast('Error: '+e.message, null, true); }
};

window.refreshAdmins = async function(){
  await loadAdminsList();
  if(ST.view==='admins') render();
};

// AGREGAR / ELIMINAR COMPETENCIAS A ATLETAS (owner) — guardado en vivo
// ═══════════════════════════════════════════
function _glPoints(total,bw,sex,modalidad){
  if(!total||!bw)return 0;
  const eq=/equip/i.test(modalidad||''); const fem=/muj|fem/i.test(sex||'');
  let A,B,C;
  if(eq){ if(fem){A=758.63878;B=949.31382;C=0.02435;} else {A=1236.25115;B=1449.21864;C=0.01644;} }
  else  { if(fem){A=610.32796;B=1045.59282;C=0.03048;} else {A=1199.72839;B=1025.18162;C=0.00921;} }
  return +(total*100/(A-B*Math.exp(-C*bw))).toFixed(2);
}
function _dotsPoints(total,bw,sex){
  if(!total||!bw)return 0;
  const fem=/muj|fem/i.test(sex||'');
  const c=fem?[-57.96288,13.6175032,-0.1126655495,0.0005158568,-0.0000010706]
             :[-307.75076,24.0900756,-0.1918759221,0.0007391293,-0.000001093];
  const den=c[0]+c[1]*bw+c[2]*bw*bw+c[3]*bw**3+c[4]*bw**4;
  if(!den)return 0;
  return +(total*500/den).toFixed(2);
}
function _bestLift(pfx){
  let best=0;
  for(let i=1;i<=3;i++){
    const el=document.getElementById('cm_'+pfx+i); const ev=document.getElementById('cm_'+pfx+i+'v');
    if(!el)continue; const w=parseFloat(el.value)||0; const v=ev?ev.checked:true;
    if(v&&w>best)best=w;
  }
  return best;
}
window.compRecalc=function(){
  const sq=_bestLift('sq'),bp=_bestLift('bp'),dl=_bestLift('dl'),total=sq+bp+dl;
  const bw=parseFloat(document.getElementById('cm_bw').value)||0;
  const sex=document.getElementById('cm_sex').value, mod=document.getElementById('cm_mod').value;
  const gl=_glPoints(total,bw,sex,mod), dots=_dotsPoints(total,bw,sex);
  const out=document.getElementById('cm_out');
  if(out)out.innerHTML='SQ <b>'+(sq||'-')+'</b> · BP <b>'+(bp||'-')+'</b> · DL <b>'+(dl||'-')+'</b> &nbsp;|&nbsp; Total <b style="color:var(--gold)">'+(total||'-')+'</b> kg &nbsp;|&nbsp; GL <b style="color:var(--gold)">'+(gl||'-')+'</b> &nbsp;|&nbsp; DOTS <b>'+(dots||'-')+'</b>';
};

    <div style="font-family:Oswald;font-size:19px;font-weight:700;margin-bottom:4px">Agregar competencia</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:14px">Elige un atleta cargado o escribe un nombre manual. Marca el check de cada intento válido.</div>
    <input list="cm_athDL" id="cm_ath" value="${esc(a?a.nombre:'')}" oninput="compAthPick(this.value)" placeholder="Atleta" class="inp" style="width:100%;margin-bottom:8px">
    <datalist id="cm_athDL">${dlist}</datalist>
    <input id="cm_codigo" type="hidden" value="${esc(a?a.codigo:'')}"><input id="cm_rut" type="hidden" value="${esc(a?a.rut:'')}">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <input id="cm_evento" placeholder="Campeonato" class="inp">
      <input id="cm_fecha" type="date" class="inp">
      <select id="cm_mod" class="inp" onchange="compRecalc()"><option>Powerlifting Classic</option><option>Powerlifting Equipado</option><option>Only Bench</option></select>
      <select id="cm_sex" class="inp" onchange="compRecalc()"><option>Hombre</option><option>Mujer</option></select>
      <input id="cm_div" placeholder="División (ej: Open)" class="inp">
      <input id="cm_cat" placeholder="Categoría (ej: 83)" class="inp">
      <input id="cm_bw" type="number" step="0.1" placeholder="Peso corporal (kg)" oninput="compRecalc()" class="inp" style="grid-column:span 2">
    </div>
    ${lift('sq','SENTADILLA')}${lift('bp','BANCA')}${lift('dl','PESO MUERTO')}
    <div id="cm_out" style="margin:10px 0;font-size:13px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px">—</div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button onclick="closeCompModal()" class="btn" style="background:transparent;border:1px solid var(--border);color:var(--muted)">Cancelar</button>
      <button onclick="saveCompResult()" class="btn btn-g">Guardar</button>
    </div>
  </div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeCompModal();});
  document.body.appendChild(ov);
  if(a){const sx=(a.competencias||[]).map(c=>c.sexo).find(Boolean);if(sx&&/muj|fem/i.test(sx))document.getElementById('cm_sex').value='Mujer';}
  compRecalc();
};
window.closeCompModal=function(){const m=document.getElementById('compModal');if(m)m.remove();};
window.saveCompResult=async function(){
  const g=id=>document.getElementById(id);
  const nombre=(g('cm_ath').value||'').trim();
  if(!nombre){showToast('Falta el atleta',null,true);return;}
  const evento=(g('cm_evento').value||'').trim();
  if(!evento){showToast('Falta el campeonato',null,true);return;}
  const codigo=(g('cm_codigo').value||'').trim(), rut=(g('cm_rut').value||'').trim();
  const fecha=g('cm_fecha').value||'', division=(g('cm_div').value||'').trim(), categoria=(g('cm_cat').value||'').trim();
  const modalidad=g('cm_mod').value, sexo=g('cm_sex').value, bw=parseFloat(g('cm_bw').value)||0;
  const sq=_bestLift('sq'),bp=_bestLift('bp'),dl=_bestLift('dl'),total=sq+bp+dl;
  const glp=_glPoints(total,bw,sexo,modalidad), dots=_dotsPoints(total,bw,sexo);
  const att=pfx=>{const arr=[];for(let i=1;i<=3;i++){const w=parseFloat(g('cm_'+pfx+i).value)||0;const v=g('cm_'+pfx+i+'v').checked;if(w)arr.push({w,r:v?'g':'n'});}return arr;};
  const slug=s=>String(s).normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-zA-Z0-9]+/g,'_').replace(/^_|_$/g,'').slice(0,40);
  const docId=(codigo||('m_'+slug(nombre)))+'__'+slug(evento)+'__'+slug(modalidad||'cl');
  try{
    await setDoc(doc(db,'competition_results',docId),{
      codigo,rut,nombre,evento,fecha,sexo,division,categoria,modalidad,
      resultado:{sq,bp,dl,total,bw,pesoCorporal:bw,glp,dots,intentos:{sq:att('sq'),bp:att('bp'),dl:att('dl')}},
      source:'manual', addedBy:(ST.user?.email||'admin'), updatedAt:serverTimestamp()
    },{merge:true});
    await logAction('add_comp_result',docId,null,evento+' · '+total+'kg · GL '+glp,{nombre});
    showToast('Competencia guardada: '+nombre+' · '+total+'kg');
    closeCompModal();
  }catch(e){showToast('Error: '+e.message,null,true);}
};
window.deleteCompResult=async function(id){
  if(!confirm('¿Eliminar esta competencia del atleta?\n(Quita solo lo agregado en vivo, no afecta data.json)'))return;
  try{ await deleteDoc(doc(db,'competition_results',id)); await logAction('delete_comp_result',id,null,'deleted'); showToast('Competencia eliminada'); }
  catch(e){showToast('Error: '+e.message,null,true);}
};

function renderAthleteProfile(){
  const a = ST.data?.find(x=>x.codigo===ST.athleteProfile);
  if(!a) return '<div class="h1">Atleta no encontrado</div>';

  const bl = a.bestLifts||{};
  const allComps = a.competencias||[];
  const withResults = allComps.filter(c=>c.resultado&&c.resultado.total>0);
  const sorted = [...withResults].sort((x,y)=>(y.fecha||y.evento||'').localeCompare(x.fecha||x.evento||''));

  // Sex
  const sexRaw = [...allComps].sort((x,y)=>(y.fecha||'').localeCompare(x.fecha||'')).find(c=>c.sexo)?.sexo||'';
  const isFem = sexRaw.match(/mujer|fem/i);

  // Churn
  const lastFecha = allComps.filter(c=>c.fecha).sort((x,y)=>y.fecha.localeCompare(x.fecha))[0]?.fecha||null;
  const monthsSince = lastFecha?Math.floor((Date.now()-new Date(lastFecha))/(1000*60*60*24*30.4)):null;
  const churnRisk = monthsSince&&monthsSince>14;

  // GL history
  const lastModal=(sorted[0]?.modalidad||'').toLowerCase().includes('equip')?'equipped':'classic';
  const glHistory = [...withResults]
    .filter(c=>{
      const m=(c.modalidad||'').toLowerCase().includes('equip')?'equipped':'classic';
      return m===lastModal&&(c.resultado?.glp||c.resultado?.gl);
    })
    .sort((x,y)=>(x.fecha||x.evento||'').localeCompare(y.fecha||y.evento||''));

  // Peer comparison
  const peerKey = _getPeerKey(a);
  const peer = peerKey&&bl.total?_peerPerc(bl.total,peerKey):null;
  const pg = peer?.g;

  // Active inscriptions
  const activeInsc = ST.inscripciones.filter(i=>{
    if(i.status==='rejected')return false;
    return (i.nombre||'').toLowerCase().trim()===(a.nombre||'').toLowerCase().trim()||(i.codigo&&i.codigo===a.codigo);
  });

  const initials = a.nombre.split(' ').map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();

  let h = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
    <button onclick="ST.athleteProfile=null;go('athletes')" style="background:transparent;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0;font-family:DM Sans">← Atletas</button>
    <span style="color:var(--border)">|</span>
    <span style="font-size:12px;color:var(--muted)">${a.codigo}</span>
  </div>`;

  // ── Header card ──────────────────────────────────────────
  h+=`<div class="card" style="border-left:4px solid var(--accent);margin-bottom:14px">
    <div style="display:flex;gap:14px;align-items:flex-start">
      <div style="width:64px;height:64px;border-radius:12px;background:var(--bg);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <span class="os" style="font-size:24px;font-weight:700;color:var(--muted)">${initials}</span>
      </div>
      <div style="flex:1;min-width:0">
        <div class="os" style="font-size:22px;font-weight:700;letter-spacing:1px">${a.nombre}</div>
        <div style="font-size:13px;color:var(--gold);font-family:Oswald">${a.codigo}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">
          RUT: <strong style="color:var(--text)">${a.rut||'—'}</strong>
          &nbsp;·&nbsp; Club: <strong style="color:var(--text)">${a.club||'—'}</strong>
          &nbsp;·&nbsp; Debut: <strong style="color:var(--text)">${a.debut||'—'}</strong>
        </div>
        ${churnRisk?`<div style="margin-top:8px;padding:7px 11px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:7px;font-size:11px;color:var(--gold)">Sin competir ${monthsSince} meses — posible churn</div>`:''}
        <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
          ${sexRaw?`<span class="tag ${isFem?'b-r':'b-b'}">${isFem?'♀ Mujer':'♂ Hombre'}</span>`:''}
          <span class="tag b-y">${allComps.length} competencia${allComps.length!==1?'s':''}</span>
          ${withResults.length?`<span class="tag b-g">${withResults.length} resultado${withResults.length!==1?'s':''}</span>`:''}
          ${activeInsc.length?`<span class="tag b-b">${activeInsc.length} inscripción${activeInsc.length!==1?'es':''} activa${activeInsc.length!==1?'s':''}</span>`:''}
        </div>
      </div>
      <button onclick="editAthlete('${a.codigo.replace(/'/g,"\\'")}','nombre')" style="padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;flex-shrink:0">Editar</button>
    </div>
  </div>`;

  // ── Competencias en vivo (agregar / eliminar) — solo owner ───
  const _canComp=['owner','superadmin'].includes(ST.adminInfo?.role)||ST.adminInfo?.bootstrap;
  if(_canComp){
    const rnorm=s=>String(s||'').replace(/[^0-9kK]/g,'').toLowerCase();
    const mine=(ST.allCompResults||[]).filter(r=>
      (a.codigo&&r.codigo===a.codigo) ||
      (a.rut&&r.rut&&rnorm(r.rut)===rnorm(a.rut)) ||
      (r.nombre&&(r.nombre||'').toLowerCase().trim()===(a.nombre||'').toLowerCase().trim())
    );
    h+=`<div class="card" style="margin-bottom:14px;border-left:4px solid var(--green)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-family:Oswald;font-size:14px;font-weight:700;letter-spacing:1px;color:var(--green)">COMPETENCIAS (en vivo)</div>
        <button onclick="openCompModal('${a.codigo.replace(/'/g,"\\'")}')" class="btn btn-g" style="padding:6px 12px;font-size:11px">+ Agregar competencia</button>
      </div>
      ${mine.length?`<table class="tbl"><tr><th>Campeonato</th><th>Cat/Div</th><th>Total</th><th>GL</th><th></th></tr>
        ${mine.map(r=>`<tr>
          <td>${esc(r.evento||'')}<br><span style="font-size:9px;color:var(--muted)">${esc(r.fecha||'')} · ${esc(r.modalidad||'')}${r.source==='manual'?' · manual':''}</span></td>
          <td style="font-size:11px">${esc(r.categoria||'')} ${esc(r.division||'')}</td>
          <td style="font-weight:700">${r.resultado?.total||'-'}</td>
          <td>${r.resultado?.glp||r.resultado?.gl||'-'}</td>
          <td><button onclick="deleteCompResult('${(r.id||'').replace(/'/g,"\\'")}')" style="background:transparent;border:1px solid rgba(239,68,68,.4);color:var(--red);padding:3px 8px;border-radius:5px;font-size:10px;cursor:pointer">Eliminar</button></td>
        </tr>`).join('')}
      </table>`:'<div style="font-size:12px;color:var(--muted)">Sin competencias agregadas en vivo. Usa “+ Agregar competencia”.</div>'}
      <div style="font-size:10px;color:var(--muted);margin-top:8px">Se guardan en vivo y aparecen al instante en el perfil público (yourlift.cl/atleta). El total, GL e IPF/DOTS se calculan solos desde los intentos válidos y el peso corporal. Eliminar quita solo lo agregado aquí.</div>
    </div>`;
  }

  // ── Logros / Medallas ────────────────────────────────────
  const _canAch=['superadmin','owner'].includes(ST.adminInfo?.role);
  const achList=ST.achievementsByCodigo?.[a.codigo]||[];
  h+=`<div class="card" style="margin-bottom:14px;border-left:4px solid #D4A843">
    <div style="font-family:Oswald;font-size:14px;font-weight:700;letter-spacing:1px;color:#D4A843;margin-bottom:12px">LOGROS Y MEDALLAS</div>
    ${achList.length===0?'<div style="font-size:12px;color:var(--muted);margin-bottom:12px">Sin logros registrados</div>':''}
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px">
      ${achList.map((ach,i)=>{
        const col=ach.color||'#D4A843';
        return `<div style="position:relative;background:var(--bg);border:1px solid ${col}55;border-radius:10px;padding:10px 12px;display:flex;gap:10px;align-items:center;min-width:220px">
          ${ach.logo_url?`<img src="${ach.logo_url}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid ${col}" onerror="this.style.display='none'">`:'<div style="width:48px;height:48px;border-radius:50%;background:rgba(212,168,67,.15);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0"></div>'}
          <div style="flex:1;min-width:0">
            <div style="font-family:Oswald;font-size:12px;color:${col};letter-spacing:.5px">${ach.label||'—'}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px">${ach.evento||''} ${ach.anio?'· '+ach.anio:''}</div>
            <div style="font-size:9px;color:var(--muted);margin-top:2px;opacity:.7">${ach.display==='verified'?'✓ Badge verificado':'Medalla'}</div>
          </div>
          ${_canAch?`<button onclick="removeAchievement('${a.codigo}',${i})" style="background:transparent;border:none;color:var(--red);font-size:14px;cursor:pointer;padding:2px 4px;flex-shrink:0" title="Eliminar logro">✕</button>`:''}
        </div>`;
      }).join('')}
    </div>
    ${_canAch
      ? `<details style="border:1px solid var(--border);border-radius:8px;padding:12px">
          <summary style="cursor:pointer;font-size:12px;font-family:Oswald;letter-spacing:1px;color:var(--muted)">AGREGAR LOGRO / MEDALLA</summary>
          <div style="margin-top:12px;display:flex;flex-direction:column;gap:10px">
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <div style="flex:1;min-width:180px">
                <label style="font-size:10px;color:var(--muted);letter-spacing:1px;display:block;margin-bottom:3px">ETIQUETA (aparece debajo de la medalla)</label>
                <input id="achLabel" type="text" placeholder="1ª Campeona Mundial Chile" class="inp" style="font-size:12px">
              </div>
              <div style="flex:1;min-width:180px">
                <label style="font-size:10px;color:var(--muted);letter-spacing:1px;display:block;margin-bottom:3px">EVENTO</label>
                <input id="achEvento" type="text" placeholder="IPF Sub-Junior & Junior Worlds 2025" class="inp" style="font-size:12px">
              </div>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <div style="flex:2;min-width:260px">
                <label style="font-size:10px;color:var(--muted);letter-spacing:1px;display:block;margin-bottom:3px">URL DEL LOGO (Firebase Storage, CDN, etc.)</label>
                <input id="achLogoUrl" type="text" placeholder="https://firebasestorage.googleapis.com/..." class="inp" style="font-size:12px">
              </div>
              <div style="flex:0 0 auto">
                <label style="font-size:10px;color:var(--muted);letter-spacing:1px;display:block;margin-bottom:3px">AÑO</label>
                <input id="achAnio" type="number" placeholder="2025" class="inp" style="width:80px;font-size:12px">
              </div>
              <div style="flex:0 0 auto">
                <label style="font-size:10px;color:var(--muted);letter-spacing:1px;display:block;margin-bottom:3px">COLOR</label>
                <input id="achColor" type="color" value="#D4A843" style="width:48px;height:36px;padding:2px;border-radius:6px;border:1px solid var(--border);background:var(--bg);cursor:pointer">
              </div>
              <div style="flex:1;min-width:180px">
                <label style="font-size:10px;color:var(--muted);letter-spacing:1px;display:block;margin-bottom:3px">TIPO DE VISUALIZACIÓN</label>
                <select id="achDisplay" class="inp" style="font-size:12px">
                  <option value="medal">Medalla (colgante a la derecha)</option>
                  <option value="verified">✓ Badge verificado (junto al nombre)</option>
                </select>
              </div>
            </div>
            <button onclick="addAchievement('${a.codigo}')" class="btn btn-g" style="align-self:flex-start;padding:8px 20px;font-size:12px">Guardar logro</button>
          </div>
        </details>`
      : `<div style="font-size:11px;color:var(--muted);padding:8px 10px;background:rgba(30,58,95,.12);border-radius:6px;border:1px solid var(--border)">Solo owner/superadmin puede agregar o eliminar logros.</div>`
    }
  </div>`;

  // ── PRs ──────────────────────────────────────────────────
  if(bl.sq||bl.bp||bl.dl||bl.total){
    h+=`<div class="card" style="margin-bottom:14px"><div class="h2">Mejores marcas personales</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">`;
    [['SQ',bl.sq,'rgba(59,130,246,.2)','var(--blue)'],['BP',bl.bp,'rgba(245,158,11,.2)','var(--orange)'],['DL',bl.dl,'rgba(34,197,94,.2)','var(--green)'],['TOTAL',bl.total,'rgba(212,168,67,.25)','var(--gold)'],['GL',bl.glp||bl.glp,'rgba(196,30,58,.2)','var(--accent)']].forEach(([lbl,val,bg,col])=>{
      if(!val)return;
      h+=`<div style="flex:1;min-width:60px;text-align:center;padding:10px 6px;background:var(--bg);border:1px solid ${bg};border-radius:10px">
        <div style="font-size:9px;color:${col};font-family:Oswald;letter-spacing:1px">${lbl}</div>
        <div class="os" style="font-size:${lbl==='TOTAL'?'24':'18'}px;font-weight:700;color:${col};margin-top:2px">${val}</div>
        <div style="font-size:9px;color:var(--muted)">${lbl==='GL'?'pts':'kg'}</div>
      </div>`;
    });
    h+=`</div></div>`;
  }

  // ── GL evolution chart ────────────────────────────────────
  if(glHistory.length>1){
    const W=460,H=90,PX=8,PY=8;
    const gls=glHistory.map(c=>c.resultado.glp||c.resultado.gl||0);
    const maxG=Math.max(...gls),minG=Math.min(...gls.filter(v=>v>0));
    const catPalette=['#D4A843','#3B82F6','#22C55E','#F59E0B','#C41E3A','#A78BFA','#F472B6'];
    const uniqueCats=[...new Set(glHistory.map(c=>(c.categoria||'').trim()).filter(Boolean))];
    const catColor=c=>{const i=uniqueCats.indexOf((c||'').trim());return i>=0?catPalette[i%catPalette.length]:'#D4A843'};
    const pts=glHistory.map((c,i)=>{
      const x=PX+i*(W-PX*2)/(glHistory.length-1);
      const y=PY+(H-PY*2)*(1-(gls[i]-minG)/Math.max(maxG-minG,1));
      return{x,y,v:gls[i],ev:c.evento||'',fecha:c.fecha||'',cat:(c.categoria||'').trim()};
    });
    const poly=pts.map(p=>p.x+','+p.y).join(' ');
    const area=PX+','+H+' '+poly+' '+pts[pts.length-1].x+','+H;
    h+=`<div class="card" style="margin-bottom:14px"><div class="h2">Evolución GL Points</div>
      <svg viewBox="0 0 ${W} ${H+22}" style="width:100%;max-width:${W}px">
        <defs><linearGradient id="gg2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#D4A843" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="#D4A843" stop-opacity="0.02"/>
        </linearGradient></defs>
        <polygon points="${area}" fill="url(#gg2)"/>
        <polyline points="${poly}" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4.5" fill="${catColor(p.cat)}" stroke="var(--card)" stroke-width="2"/>
          <text x="${p.x}" y="${p.y-8}" text-anchor="middle" font-size="9" fill="rgba(212,168,67,.9)" font-family="Oswald" font-weight="700">${p.v}</text>
          <text x="${p.x}" y="${H+16}" text-anchor="middle" font-size="8" fill="rgba(120,143,166,.7)">${(p.ev.match(/20\d\d/)||[''])[0]}</text>`).join('')}
      </svg>
      ${uniqueCats.length>1?`<div style="display:flex;flex-wrap:wrap;gap:6px 12px;justify-content:center;font-size:10px;color:var(--muted);margin-top:6px;padding-top:8px;border-top:1px solid rgba(30,58,95,.3)">
        ${uniqueCats.map(cat=>`<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:50%;background:${catColor(cat)};display:inline-block"></span>${cat}</span>`).join('')}
      </div>`:''}
    </div>`;
  }

  // ── Peer comparison ───────────────────────────────────────
  if(peer&&pg){
    const pctColor=peer.pct>=75?'var(--green)':peer.pct>=50?'var(--gold)':'var(--accent)';
    const keyParts=peerKey.split('|');
    const peerLabel=(keyParts[0]==='F'?'Mujer':'Hombre')+' · '+keyParts[1]+' kg · '+keyParts[2];
    const maxT=pg.members[0]?.total||1;
    h+=`<div class="card" style="margin-bottom:14px"><div class="h2">Comparativa en categoría</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px">${peerLabel} · ${pg.n} atletas en el grupo</div>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
            <span style="color:var(--muted)">Posición</span>
            <span style="font-weight:700;color:${pctColor}">Top ${100-peer.pct}% · #${peer.rank} de ${peer.n}</span>
          </div>
          <div style="background:rgba(30,58,95,.4);border-radius:6px;height:10px;overflow:hidden">
            <div style="background:${pctColor};height:100%;width:${Math.max(peer.pct,4)}%;border-radius:6px"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:3px">
            <span>Mín</span><span>Prom ${pg.avg}</span><span>Top ${pg.top}</span>
          </div>
        </div>
        <div style="text-align:center;min-width:54px">
          <div class="os" style="font-size:28px;font-weight:700;color:${pctColor}">${peer.pct}°</div>
          <div style="font-size:9px;color:var(--muted)">PERCENTIL</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
        ${[['Promedio',pg.avg,'var(--muted)'],['Mediana',pg.p50,'var(--text)'],['Top 1',pg.top,'var(--gold)']].map(([lbl,val,col])=>`
          <div style="background:var(--bg);border-radius:8px;padding:8px;text-align:center">
            <div style="font-size:9px;color:var(--muted);margin-bottom:2px">${lbl}</div>
            <div class="os" style="font-size:17px;font-weight:700;color:${col}">${val}</div>
          </div>`).join('')}
      </div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:6px;font-family:Oswald;letter-spacing:1px">TOP DE LA CATEGORÍA</div>
      ${pg.members.map((m,i)=>{
        const isMe=m.codigo===a.codigo;

        const col=isMe?'var(--accent)':i===0?'var(--gold)':'var(--blue)';

            </div>

              <div style="background:${col};height:100%;width:${pct}%;border-radius:3px"></div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  // ── Active inscriptions ───────────────────────────────────
  if(activeInsc.length){
    h+=`<div class="card" style="margin-bottom:14px"><div class="h2">Inscripciones activas</div>`;
    activeInsc.forEach(i=>{
      const ev=ST.eventos.find(e=>e.id===i.evento);
      const evName=ev?.name||i.evento;
      const ok=i.status==='approved';
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(30,58,95,.3)">
        <div>
          <div style="font-weight:600;font-size:13px">${evName}</div>
          <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);margin-top:2px"><span>${i.division||'—'} · ${i.categoria||'—'} · ${i.modalidad||'—'} · </span>${window.clubLogoImg?window.clubLogoImg(i.club,16,'background:var(--bg);padding:1px;'):''}<span>${i.club||'—'}</span></div>
        </div>
        <span class="badge ${ok?'b-g':'b-y'}" style="flex-shrink:0;margin-left:12px">${ok?'✓ Confirmado':'⏳ Pendiente'}</span>
      </div>`;
    });
    h+=`</div>`;
  }

  // ── Competition history ───────────────────────────────────
  if(sorted.length){
    h+=`<div class="card"><div class="h2">Historial de competencias (${sorted.length})</div>`;
    sorted.forEach((c,ci)=>{
      const r=c.resultado||{};
      const prevTotal=sorted[ci+1]?.resultado?.total||0;
      const delta=prevTotal?r.total-prevTotal:null;
      const glVal=r.glp||r.gl||null;
      h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(30,58,95,.3)">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.evento}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${c.division||'—'} · ${c.categoria||'—'}${c.modalidad?' · '+c.modalidad:''}</div>
          ${c.fecha?`<div style="font-size:10px;color:var(--muted)">${c.fecha}</div>`:''}
          <div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:4px">
            ${r.sq?`<span style="font-size:9px;background:rgba(59,130,246,.1);color:var(--blue);padding:1px 5px;border-radius:3px">SQ ${r.sq}</span>`:''}
            ${r.bp?`<span style="font-size:9px;background:rgba(245,158,11,.1);color:var(--orange);padding:1px 5px;border-radius:3px">BP ${r.bp}</span>`:''}
            ${r.dl?`<span style="font-size:9px;background:rgba(34,197,94,.1);color:var(--green);padding:1px 5px;border-radius:3px">DL ${r.dl}</span>`:''}
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:12px">
          <div class="os" style="font-size:19px;font-weight:700;color:var(--gold)">${r.total} kg</div>
          ${delta!==null?`<div style="font-size:11px;font-weight:700;color:${delta>0?'var(--green)':delta<0?'var(--red)':'var(--muted)'}">${delta>0?'+':''}${delta} kg</div>`:''}
          ${glVal?`<div style="font-size:10px;color:var(--muted)">GL ${glVal}${r.pos?' · #'+r.pos:''}</div>`:''}
        </div>
      </div>`;
    });
    h+=`</div>`;
  }

  return h;
}

function nrmName(s){return(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim().replace(/\s+/g,' ');}

function findAthleteInDB(nombre,rut){
  const nn=nrmName(nombre);
  const rutClean=(rut||'').replace(/[^0-9kK]/gi,'').toUpperCase();
  // Match by RUT first (most reliable)
  if(rutClean.length>3){
    const byRut=ST.data.find(a=>(a.rut||'').replace(/[^0-9kK]/gi,'').toUpperCase()===rutClean);
    if(byRut)return byRut;
  }
  // Match by normalized name
  return ST.data.find(a=>nrmName(a.nombre)===nn)
    ||ST.data.find(a=>{
      const parts=nn.split(' ').filter(p=>p.length>2);
      return parts.length>=2&&parts.every(p=>nrmName(a.nombre).includes(p));
    });
}

function checkRecord(total,bw,categoria,division,modalidad,sexo,lift){
  if(!total||!lift)return null;
  const mod=(modalidad||'').toLowerCase().includes('equip')?'equipped':'classic';
  const sex=(sexo||'').match(/mujer|fem|f/i)?'F':'M';
  // Find matching record entry
  const matches=(RECORDS_DATA.records||[]).filter(r=>{
    return r.categoria===categoria&&r.division===division&&
      (r.modalidad||'').toLowerCase().includes(mod==='equipped'?'equip':'classic')&&
      r.sexo===sexo&&r.levantamiento===lift;
  });
  if(!matches.length)return null;
  const rec=matches[0];
  if(total>rec.marca)return{...rec,newMarca:total};
  return null;
}

let _impState = {evento:'', csvText:'', parsed:null, status:'', preview:null};

// Parser de CSV con soporte para campos entre comillas y delimitador auto
function _impParseCsv(text){
  if(!text) return {headers:[], rows:[]};
  text = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim();
  // Auto-detectar delimitador: , o ; o tab
  const firstLine = text.split('\n')[0];
  const delim = (firstLine.split('\t').length > firstLine.split(',').length && firstLine.split('\t').length > firstLine.split(';').length) ? '\t'
              : (firstLine.split(';').length > firstLine.split(',').length) ? ';' : ',';
  const lines = text.split('\n').filter(l=>l.trim());
  const parseLine = (line) => {
    const out = []; let cur = ''; let q = false;
    for(let i=0;i<line.length;i++){
      const c = line[i];
      if(c === '"'){
        if(q && line[i+1] === '"'){ cur += '"'; i++; }
        else q = !q;
      } else if(c === delim && !q){
        out.push(cur); cur = '';
      } else cur += c;
    }
    out.push(cur);
    return out.map(s=>s.trim());
  };
  const headers = parseLine(lines[0]).map(h=>h.toLowerCase().replace(/[^a-z0-9]/g,''));
  const rows = lines.slice(1).map(parseLine);
  return {headers, rows, delim};
}

// Mapeo de columnas LiftingCast (acepta varias variantes) → campos LiveCast
function _impMap(headers){
  const find = (...cands)=>{
    for(const c of cands){
      const norm = c.toLowerCase().replace(/[^a-z0-9]/g,'');
      const idx = headers.indexOf(norm);
      if(idx>=0) return idx;
    }
    return -1;
  };
  return {
    nombre: find('lifter','liftername','name','nombre','fullname'),
    rut:    find('rut','memberid','memberno','lifterid','usapl','member','license'),
    sexo:   find('sex','gender','sexo','gen'),
    edad:   find('age','edad'),
    bw:     find('bwkg','bw','bodyweight','bodyweightkg','weight','bweight'),
    cat:    find('bwclass','weightclass','class','wtclass','categoria','category','divisionclass'),
    div:    find('division','agedivision','agedivisn','divname','divisn'),
    mod:    find('equipment','eq','equip','modalidad','modality','rawequiped','tested'),
    club:   find('team','club','gym','equipo'),
    flight: find('flight','vuelo','session','sessionletter','platform','day'),
    lot:    find('lot','lotnumber','lotno','platformorder','order','sessionorder'),
    s1: find('squat1kg','s1','squat1','sq1','squatopener'),
    s2: find('squat2kg','s2','squat2','sq2'),
    s3: find('squat3kg','s3','squat3','sq3'),
    b1: find('bench1kg','b1','bench1','bp1','benchopener'),
    b2: find('bench2kg','b2','bench2','bp2'),
    b3: find('bench3kg','b3','bench3','bp3'),
    d1: find('deadlift1kg','d1','dead1','deadlift1','dl1','deadliftopener'),
    d2: find('deadlift2kg','d2','dead2','deadlift2','dl2'),
    d3: find('deadlift3kg','d3','dead3','deadlift3','dl3'),
  };
}

function _impNormalize(row, m){
  const get = i => i>=0 && i<row.length ? (row[i]||'').trim() : '';
  const nombre = get(m.nombre);
  if(!nombre) return null;
  // Sexo
  let sexo = get(m.sexo).toUpperCase();
  if(sexo==='M'||sexo==='MALE'||sexo==='MAN'||sexo==='HOMBRE') sexo='Hombre';
  else if(sexo==='F'||sexo==='FEMALE'||sexo==='WOMAN'||sexo==='MUJER') sexo='Mujer';
  else sexo='';
  // Modalidad
  const modRaw = get(m.mod).toLowerCase();
  let modalidad = 'Powerlifting Classic';
  if(modRaw.includes('eq')||modRaw.includes('single')||modRaw.includes('multi')||modRaw.includes('equipped')||modRaw.includes('equipado')){
    modalidad = 'Powerlifting Equipped';
  }
  // Categoría: extraer el número y formatear "-83 kg (Hombre)"
  let catRaw = get(m.cat);
  let categoria = catRaw;
  const catMatch = catRaw.match(/([+\-]?\d+\.?\d*)/);
  if(catMatch && sexo){
    const num = catMatch[1];
    const isPlus = catRaw.includes('+') || /\d+\+/.test(catRaw);
    categoria = (isPlus?'':'-') + num + (isPlus?'+':'') + ' kg ('+sexo+')';
  }
  // División: normalizar a Open/Junior/Subjunior/Master I-IV
  const divRaw = get(m.div).toLowerCase();
  let division = get(m.div);
  if(divRaw.includes('open')) division='Open';
  else if(divRaw.includes('subjun')||divRaw.includes('sub-jun')||divRaw.includes('sub jun')||divRaw.includes('teen')) division='Sub Junior';
  else if(divRaw.includes('jun')) division='Junior';
  else if(divRaw.includes('master 4')||divRaw.includes('master iv')||divRaw.includes('m4')) division='Master IV';
  else if(divRaw.includes('master 3')||divRaw.includes('master iii')||divRaw.includes('m3')) division='Master III';
  else if(divRaw.includes('master 2')||divRaw.includes('master ii')||divRaw.includes('m2')) division='Master II';
  else if(divRaw.includes('master')||divRaw.includes('m1')) division='Master I';
  // Flight: tomar la primera letra A-F si existe
  let flight = get(m.flight).toUpperCase().match(/^[A-F]/)?.[0] || 'A';
  // Lot
  const lotRaw = get(m.lot);
  const lot = parseInt(lotRaw,10) || 0;
  // BW
  const bw = parseFloat(get(m.bw)) || 0;
  // Pesos de intentos (si vienen)
  const num = i => { const v = parseFloat(get(i)); return Number.isFinite(v)&&v>0 ? v : 0; };
  const att = {
    sq:[{w:num(m.s1),r:null},{w:num(m.s2),r:null},{w:num(m.s3),r:null}],
    bp:[{w:num(m.b1),r:null},{w:num(m.b2),r:null},{w:num(m.b3),r:null}],
    dl:[{w:num(m.d1),r:null},{w:num(m.d2),r:null},{w:num(m.d3),r:null}],
  };
  return {
    nombre,
    rut: get(m.rut),
    sexo, division, categoria, modalidad,
    club: get(m.club),
    flight, lot, bw,
    edad: parseInt(get(m.edad),10)||null,
    att,
  };
}

window.impLoadFile = function(input){
  const f = input.files && input.files[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = (e)=>{
    _impState.csvText = String(e.target.result||'');
    _impParseAndPreview();
  };
  r.readAsText(f, 'utf-8');
};
window.impLoadPaste = function(textarea){
  _impState.csvText = textarea.value || '';
  _impParseAndPreview();
};
window.impSelectEvento = function(sel){
  _impState.evento = sel.value;
  render();
};
function _impParseAndPreview(){
  const parsed = _impParseCsv(_impState.csvText);
  if(!parsed.rows.length){ _impState.parsed=null; _impState.preview=null; render(); return; }
  const m = _impMap(parsed.headers);
  const items = parsed.rows.map(r=>_impNormalize(r,m)).filter(Boolean);
  _impState.parsed = {parsed, mapping:m, items};
  render();
}

window.impDoImport = async function(btn){
  if(!_impState.parsed || !_impState.evento){
    alert('Faltan datos: cargá un CSV y elegí un campeonato destino.');
    return;
  }
  const items = _impState.parsed.items;
  if(!items.length){ alert('No hay filas para importar.'); return; }
  if(!confirm('Importar '+items.length+' atletas al campeonato "'+_impState.evento+'"?\n\nSe crearán como inscripciones APROBADAS (status:approved). Si querés revisarlas, podés editarlas después en Nóminas.')) return;
  if(btn){btn.disabled=true; btn.textContent='Importando...';}
  let ok=0, err=0;
  for(const a of items){
    try{
      const id = 'lc_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
      const data = {
        evento: _impState.evento,
        nombre: a.nombre,
        rut: a.rut || '',
        sexo: a.sexo || '',
        division: a.division || '',
        categoria: a.categoria || '',
        modalidad: a.modalidad || 'Powerlifting Classic',
        club: a.club || '',
        status: 'approved',
        timestamp: Date.now(),
        importedFromLiftingCast: true,
        sortOrder: a.lot || 0,
      };
      // Si vienen attempts pre-cargados, los guardamos para que LiveCast los levante
      const hasAttempts = ['sq','bp','dl'].some(k => a.att[k].some(x=>x.w>0));
      if(hasAttempts) data.attempts = a.att;
      if(a.flight) data.flight = a.flight;
      if(a.bw>0) data.bw = a.bw;
      await setDoc(doc(db,'inscripciones',id), data);
      ok++;
    }catch(e){ console.error('Import row failed:', a.nombre, e); err++; }
  }
  if(btn){btn.disabled=false; btn.textContent='Importar a Firestore';}
  alert('Importación terminada.\n✓ Importados: '+ok+'\n✗ Errores: '+err+(err?'\n\nRevisá la consola (F12) para detalles.':''));
  _impState = {evento:_impState.evento, csvText:'', parsed:null, status:'', preview:null};
  render();
};

// Re-renderiza el canvas de preview aplicando el transform actual
function _redrawFotoPreview(){
  const F = window._fotosState;
  if(!F.bgRemovedImg) return;
  const W=600, H=800;
  const c = document.createElement('canvas');
  c.width=W; c.height=H;
  const ctx = c.getContext('2d');
  ctx.fillStyle='#FFFFFF';
  ctx.fillRect(0,0,W,H);
  ctx.save();
  ctx.translate(W/2 + F.transform.offsetX, H/2 + F.transform.offsetY);
  ctx.rotate(F.transform.rotation * Math.PI / 180);
  const img = F.bgRemovedImg;
  const baseScale = Math.min(W/img.width, H/img.height);
  const s = baseScale * F.transform.zoom;
  const dw = img.width * s, dh = img.height * s;
  ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
  ctx.restore();
  F.preview = c.toDataURL('image/jpeg', 0.92);
  // Actualizar ambos previews en vivo (sin re-render completo)
  const previewEl = document.getElementById('fotoPreviewImg');
  if(previewEl) previewEl.src = F.preview;
  const previewObs = document.getElementById('fotoPreviewObs');
  if(previewObs) previewObs.src = F.preview;
}

window.editorFotoZoom = function(delta){
  const F = window._fotosState;
  F.transform.zoom = Math.max(0.3, Math.min(3, F.transform.zoom + delta));
  _redrawFotoPreview();
};
window.editorFotoMove = function(dx,dy){
  const F = window._fotosState;
  F.transform.offsetX += dx;
  F.transform.offsetY += dy;
  _redrawFotoPreview();
};
window.editorFotoRotate = function(deg){
  const F = window._fotosState;
  F.transform.rotation = (F.transform.rotation + deg) % 360;
  _redrawFotoPreview();
};
window.editorFotoReset = function(){
  const F = window._fotosState;
  F.transform = {zoom:1.0, offsetX:0, offsetY:0, rotation:0};
  _redrawFotoPreview();
};

  const all = ST.data || [];

  // Buscar atletas
  const q = (F.search||'').toLowerCase().trim();
  const matches = q ? all.filter(a=>{
    const n=(a.nombre||'').toLowerCase();
    const r=(a.rut||'').toLowerCase();
    const c=(a.codigo||'').toLowerCase();
    return n.includes(q)||r.includes(q)||c.includes(q);
  }).slice(0,20) : [];

  let h = '<div class="h1">Fotos de Atletas</div>';
  h += '<p style="color:var(--muted);font-size:13px;margin-bottom:18px">Sube fotos de atletas. El sistema les quita el fondo automáticamente y deja fondo blanco estilo IPF. Las fotos se ven en perfiles públicos y en la transmisión OBS.</p>';

  // Atletas con foto pendiente de inscripción (sin foto_url todavía)
  // Match: cada atleta con RUT que tenga carnetPhotoURL en alguna inscripción privada
  const norm = (s)=>String(s||'').replace(/[^0-9kK]/g,'').toLowerCase();
  const photosByRut = {};
  Object.entries(ST.inscripcionesPrivate||{}).forEach(([docId, priv])=>{
    if(!priv?.carnetPhotoURL) return;
    const rutKey = priv.rut || (docId.includes('_') ? docId.split('_').slice(1).join('_') : '');
    const k = norm(rutKey);
    if(!k) return;
    const ts = priv.ts?.seconds || priv.ts?.toMillis?.() || 0;
    if(!photosByRut[k] || ts > photosByRut[k].ts){
      photosByRut[k] = {url: priv.carnetPhotoURL, ts};
    }
  });
  const pendientes = all.filter(a=>{
    if(a.foto_url) return false;  // ya aceptada y publicada
    // Si fue rechazada → no aparece como pendiente
    const fotoDoc = (ST.fotosByCodigo||{})[a.codigo];
    if(fotoDoc && fotoDoc.status === 'rejected') return false;
    const k = norm(a.rut);
    return k && photosByRut[k];
  });
  if(pendientes.length>0){
    h += '<div class="card" style="margin-bottom:14px;background:rgba(212,168,67,.05);border-color:rgba(212,168,67,.4)">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
    h += '<div><div style="font-size:14px;font-weight:700;color:var(--gold)">'+pendientes.length+' atleta(s) con foto pendiente de inscripción</div>';
    h += '<div style="font-size:11px;color:var(--muted);margin-top:2px">Estas fotos las subieron los atletas al inscribirse. Procesalas y guardalas para que aparezcan en perfiles.</div></div>';
    h += '</div>';
    h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;max-height:280px;overflow-y:auto">';
    pendientes.slice(0,30).forEach(a=>{
      const k = norm(a.rut);
      const photoUrl = photosByRut[k].url;
      h += '<div onclick="seleccionarAtletaFoto(\''+escapeJsAttr(a.codigo)+'\')" style="background:var(--bg);padding:8px;border-radius:6px;border:1px solid var(--border);cursor:pointer;display:flex;gap:8px;align-items:center" title="Click para procesar">';
      h += '<img src="'+escapeHtml(photoUrl)+'" style="width:36px;height:48px;object-fit:cover;border-radius:3px;flex-shrink:0">';
      h += '<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+escapeHtml(a.nombre||'')+'</div>';
      h += '<div style="font-size:9px;color:var(--muted)">'+escapeHtml(a.rut||'')+'</div>';
      if(a._isPending) h += '<div style="font-size:9px;color:var(--gold);font-weight:700;margin-top:2px">★ DEBUT</div>';
      h += '</div>';
      h += '</div>';
    });
    if(pendientes.length>30) h += '<div style="grid-column:1/-1;text-align:center;font-size:11px;color:var(--muted);padding:8px">y '+(pendientes.length-30)+' más...</div>';
    h += '</div></div>';
  }

  // Buscador
  h += '<div class="card" style="margin-bottom:14px">';
  h += '<div style="display:flex;gap:8px;align-items:center">';
  h += '<input type="text" id="fotoSearchInput" placeholder="Buscar por nombre, RUT o código..." value="'+escapeHtml(F.search)+'" oninput="onFotoSearchInput(this)" style="flex:1;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px">';
  h += '</div>';

  if(q && matches.length===0){
    h += '<p style="color:var(--muted);text-align:center;margin-top:14px;font-size:12px">Sin resultados para "'+escapeHtml(q)+'"</p>';
  } else if(matches.length>0){
    h += '<div style="margin-top:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;max-height:400px;overflow-y:auto">';
    matches.forEach(a=>{
      const sel = F.selected && F.selected.codigo===a.codigo;
      const hasPhoto = !!a.foto_url;
      h += '<div onclick="seleccionarAtletaFoto(\''+escapeJsAttr(a.codigo)+'\')" style="padding:10px;border-radius:8px;border:2px solid '+(sel?'var(--accent)':'var(--border)')+';background:'+(sel?'rgba(196,30,58,.08)':'var(--bg)')+';cursor:pointer;display:flex;gap:10px;align-items:center" title="Click para seleccionar">';
      h += '<div style="width:48px;height:48px;border-radius:50%;background:'+(hasPhoto?'#fff':'var(--card)')+';border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0">';
      if(hasPhoto){
        h += '<img src="'+escapeHtml(a.foto_url)+'" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display=\'none\'">';
      } else {
        h += '<span style="font-size:18px;color:var(--muted)"></span>';
      }
      h += '</div>';
      h += '<div style="flex:1;min-width:0"><div style="font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+escapeHtml(a.nombre||'(sin nombre)')+(a._isPending?' <span style="background:var(--gold);color:#000;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700">DEBUT</span>':'')+'</div>';
      h += '<div style="font-size:10px;color:var(--muted)">'+escapeHtml(a.rut||a.codigo||'')+' · '+escapeHtml(a.club||'')+'</div></div>';
      if(hasPhoto) h+='<span style="background:var(--green);color:#000;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700">✓</span>';
      h += '</div>';

    h += '</div>';
  } else {
    h += '<p style="color:var(--muted);text-align:center;margin-top:14px;font-size:12px">Escribí algo arriba para buscar atletas (mín. 1 letra)</p>';
  }
  h += '</div>';

  // Panel de subida (cuando hay atleta seleccionado)
  if(F.selected){
    const a = F.selected;
    h += '<div class="card">';
    h += '<h3 style="margin-bottom:14px">Atleta: '+escapeHtml(a.nombre||'')+' <small style="color:var(--muted);font-size:12px">('+escapeHtml(a.rut||a.codigo||'')+')</small></h3>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">';

    // Columna izquierda: foto actual
    h += '<div><div style="font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:1px">FOTO ACTUAL</div>';
    if(a.foto_url){
      h += '<img src="'+escapeHtml(a.foto_url)+'" style="width:100%;max-width:300px;aspect-ratio:3/4;object-fit:cover;background:#fff;border-radius:8px;border:2px solid var(--border)">';
      h += '<button onclick="borrarFotoAtleta()" style="margin-top:10px;padding:8px 16px;background:transparent;border:1px solid var(--red);color:var(--red);border-radius:6px;cursor:pointer;font-size:12px">Borrar foto</button>';

      h += '<div style="font-size:11px;color:var(--gold);font-weight:700;margin-bottom:8px">FOTO PENDIENTE DE REVISIÓN</div>';
      h += '<div style="display:flex;gap:10px;align-items:flex-start">';

      h += '<div style="display:flex;flex-direction:column;gap:6px">';
      h += '<button onclick="importarFotoInscripcion()" '+(F.processing?'disabled':'')+' style="padding:10px;background:var(--gold);color:#000;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700">Importar para procesar</button>';
      h += '<button onclick="rechazarFotoInscripcion()" '+(F.processing?'disabled':'')+' style="padding:8px;background:transparent;color:var(--red);border:1px solid var(--red);border-radius:6px;cursor:pointer;font-size:11px">✗ Rechazar foto</button>';
      h += '</div></div></div>';
      h += '</div>';
    }
    h += '<input type="file" id="fotoInput" accept="image/*" onchange="cargarFotoAtleta(this)" style="display:none">';
    h += '<input type="file" id="fotoInputRaw" accept="image/*" onchange="cargarFotoAtletaSinFondo(this)" style="display:none">';
    h += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
    h += '<button onclick="document.getElementById(\'fotoInput\').click()" style="flex:1;padding:12px 16px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600">Elegir foto (quitar fondo)</button>';
    h += '<button onclick="document.getElementById(\'fotoInputRaw\').click()" style="flex:1;padding:12px 16px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px;font-weight:600" title="Sube la foto tal cual, sin modificar. Ideal para fotos con fondo negro o diseño propio.">Sin procesar (tal cual)</button>';
    h += '</div>';
    if(F.preview){
      h += '<div style="margin-top:12px"><div style="font-size:10px;color:var(--muted);margin-bottom:4px">PREVIEW (con fondo blanco — ajustá si hace falta)</div>';
      h += '<img id="fotoPreviewImg" src="'+F.preview+'" style="width:100%;max-width:300px;aspect-ratio:3/4;object-fit:cover;background:#fff;border-radius:8px;border:2px solid var(--green)"></div>';

      // Preview real estilo OBS Profile Widget (cómo se verá en transmisión)
      h += '<div style="margin-top:14px"><div style="font-size:10px;color:var(--muted);margin-bottom:4px;letter-spacing:1px">VISTA PREVIA EN TRANSMISIÓN</div>';
      h += '<div style="display:flex;gap:14px;align-items:flex-start;background:linear-gradient(135deg,#0a1628,#11223b);padding:14px;border-radius:8px">';
      // Imitamos el estilo del widget renderTxProfile (líneas ~2266-2280 en livecast)
      h += '<div style="width:160px;aspect-ratio:3/4;background:#fff;border:3px solid #D4A843;border-radius:4px;overflow:hidden;flex-shrink:0;box-shadow:0 8px 30px rgba(0,0,0,.5)">';
      h += '<img id="fotoPreviewObs" src="'+F.preview+'" style="width:100%;height:100%;object-fit:cover">';
      h += '</div>';
      h += '<div style="flex:1;font-size:11px;color:rgba(220,230,245,.7);line-height:1.6">';
      h += '<div style="background:#D4A843;padding:6px 10px;border-radius:4px;color:#0A1628;display:inline-block;margin-bottom:8px;font-family:Oswald;font-weight:700;font-size:11px">'+escapeHtml((a.nombre||'').toUpperCase().split(/\s+/).slice(0,3).join(' '))+'</div>';
      h += '<div style="font-family:Oswald;font-size:10px;color:rgba(220,230,245,.55);letter-spacing:2px;margin-top:4px">CLUB</div>';
      h += '<div style="font-family:Oswald;font-size:14px;color:#D4A843;font-weight:700">'+escapeHtml(a.club||'—')+'</div>';
      h += '</div></div>';
      h += '<div style="font-size:10px;color:var(--muted);margin-top:6px">↑ Aprox cómo se verá durante la transmisión OBS. Si la cabeza queda muy abajo o se ve mucho cuerpo, usá los controles de Zoom/Mover de arriba.</div>';
      h += '</div>';

      // Editor de imagen
      h += '<div style="margin-top:12px;padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--border)">';
      h += '<div style="font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:1px;font-weight:700">AJUSTAR IMAGEN</div>';

      // Zoom
      h += '<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="color:var(--muted)">Zoom</span><span style="color:var(--gold)">'+F.transform.zoom.toFixed(2)+'x</span></div>';
      h += '<input type="range" min="0.3" max="3" step="0.05" value="'+F.transform.zoom+'" oninput="editorFotoSetZoom(this.value)" style="width:100%">';
      h += '<div style="display:flex;gap:6px;margin-top:4px"><button onclick="editorFotoZoom(-0.1)" style="flex:1;padding:6px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:4px;cursor:pointer;font-size:11px">- Zoom</button><button onclick="editorFotoZoom(0.1)" style="flex:1;padding:6px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:4px;cursor:pointer;font-size:11px">+ Zoom</button></div></div>';

      // Posición (D-pad)
      h += '<div style="margin-bottom:10px"><div style="font-size:11px;color:var(--muted);margin-bottom:6px">Mover</div>';
      h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;max-width:160px;margin:0 auto">';
      h += '<div></div><button onclick="editorFotoMove(0,-20)" style="padding:8px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:4px;cursor:pointer">↑</button><div></div>';
      h += '<button onclick="editorFotoMove(-20,0)" style="padding:8px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:4px;cursor:pointer">←</button>';
      h += '<button onclick="editorFotoReset()" style="padding:8px;background:var(--card);border:1px solid var(--border);color:var(--gold);border-radius:4px;cursor:pointer;font-size:10px">⌂</button>';
      h += '<button onclick="editorFotoMove(20,0)" style="padding:8px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:4px;cursor:pointer">→</button>';
      h += '<div></div><button onclick="editorFotoMove(0,20)" style="padding:8px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:4px;cursor:pointer">↓</button><div></div>';
      h += '</div></div>';

      // Rotación
      h += '<div><div style="font-size:11px;color:var(--muted);margin-bottom:4px">Rotación: '+F.transform.rotation+'°</div>';
      h += '<div style="display:flex;gap:6px"><button onclick="editorFotoRotate(-90)" style="flex:1;padding:6px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:4px;cursor:pointer;font-size:11px">↺ -90°</button><button onclick="editorFotoRotate(90)" style="flex:1;padding:6px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:4px;cursor:pointer;font-size:11px">↻ +90°</button></div></div>';

      h += '</div>';

      h += '<div style="display:flex;gap:8px;margin-top:10px">';
      h += '<button onclick="cancelarFotoAtleta()" '+(F.processing?'disabled':'')+' style="flex:1;padding:12px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px">✗ Cancelar</button>';
      h += '<button onclick="guardarFotoAtleta()" '+(F.processing?'disabled':'')+' style="flex:2;padding:12px 20px;background:var(--green);color:#000;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:700">'+(F.processing?'⏳ Procesando...':'✓ Aceptar y publicar')+'</button>';
      h += '</div>';
    }
    if(F.status){
      h += '<div style="margin-top:10px;padding:10px;background:rgba(34,197,94,.1);border-left:3px solid var(--green);font-size:12px;color:var(--green)">'+escapeHtml(F.status)+'</div>';

    if(F.error){
      h += '<div style="margin-top:10px;padding:10px;background:rgba(239,68,68,.1);border-left:3px solid var(--red);font-size:12px;color:var(--red)">'+escapeHtml(F.error)+'</div>';
    }
    h += '</div></div></div>';

    // ── GIF / Video para transmisión ──────────────────────────────
    const _gifDoc2 = (ST.fotosByCodigo||{})[a.codigo];
    const _gifUrl  = _gifDoc2?.gif_url || null;
    const _gifBlend = F.gifBlend || _gifDoc2?.gif_blend || 'screen';
    h += '<div class="card" style="margin-top:14px;border-color:rgba(139,92,246,.4);background:rgba(139,92,246,.04)">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">';
    h += '<div><div style="font-family:Oswald;font-size:14px;font-weight:700;letter-spacing:1px;color:#a78bfa">GIF / VIDEO DE PERFIL TX</div>';
    h += '<div style="font-size:11px;color:var(--muted);margin-top:2px">Video corto (~3s) que aparece en el perfil durante la transmisión OBS. Se puede usar en lugar de la foto.</div></div>';
    if(_gifUrl){
      h += '<span style="background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);padding:3px 10px;border-radius:6px;font-size:10px;font-family:Oswald;font-weight:700;letter-spacing:1px">✓ CARGADO</span>';
    }
    h += '</div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start">';
    // Columna izquierda: preview actual

    h += '<div style="font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:6px">PREVIEW ACTUAL</div>';
    if(_gifUrl){

      h += '</div>';
    } else {
      h += '<div style="width:100%;max-width:220px;aspect-ratio:3/4;background:rgba(10,22,40,.6);border:2px dashed rgba(139,92,246,.4);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted)">';
      h += '<span style="font-size:30px"></span>';
      h += '<span style="font-size:11px">Sin GIF cargado</span>';
      h += '</div>';
    }
    h += '</div>';
    // Columna derecha: subida + config
    h += '<div>';
    h += '<div style="font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:6px">SUBIR NUEVO</div>';
    h += '<input type="file" id="gifInput" accept="video/*,image/gif" onchange="subirGifAtleta(this)" style="display:none">';
    h += '<button onclick="document.getElementById(\'gifInput\').click()" '+(F.gifUploading?'disabled':'')+' style="padding:11px 18px;background:rgba(139,92,246,.85);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;width:100%;margin-bottom:10px">'+(F.gifUploading?'⏳ Subiendo...':'Elegir GIF / Video')+'</button>';
    // Blend mode
    h += '<div style="margin-bottom:10px"><div style="font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:5px">MEZCLA DE FONDO</div>';
    h += '<select id="gifBlendSel" onchange="gifSetBlend(this.value)" style="width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px">';
    h += '<option value="screen" '+(_gifBlend==='screen'?'selected':'')+'>Screen — fondo negro se vuelve transparente ★</option>';
    h += '<option value="normal" '+(_gifBlend==='normal'?'selected':'')+'>Normal — sin mezcla (WebM con alpha)</option>';
    h += '<option value="multiply" '+(_gifBlend==='multiply'?'selected':'')+'>Multiply — fondo blanco se vuelve transparente</option>';
    h += '</select></div>';
    // Tip técnico
    h += '<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:6px;padding:10px;font-size:10px;color:rgba(245,158,11,.9);line-height:1.6">';
    h += '<b>Para que el fondo desaparezca:</b><br>';

    h += '</div>';
    if(F.gifStatus){h += '<div style="margin-top:8px;padding:8px;background:rgba(34,197,94,.1);border-left:3px solid var(--green);font-size:11px;color:var(--green)">'+escapeHtml(F.gifStatus)+'</div>';}
    if(F.gifError){h += '<div style="margin-top:8px;padding:8px;background:rgba(239,68,68,.1);border-left:3px solid var(--red);font-size:11px;color:var(--red)">'+escapeHtml(F.gifError)+'</div>';}
    h += '</div>'; // right col
    h += '</div>'; // grid 2 cols

    // ── Editor de GIF (zoom / posición / recorte) ─────────────────

function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function escapeJsAttr(s){return (s||'').replace(/['"\\]/g,'\\$&')}

// Helper: busca foto pendiente de la inscripcion (carnetPhotoURL) matcheada por RUT
function _findInscriptionPhotoByRut(rut){
  if(!rut) return null;
  // Normalizar el RUT: solo digitos+K, lowercase
  const norm = (s)=>String(s||'').replace(/[^0-9kK]/g,'').toLowerCase();
  const target = norm(rut);
  if(!target) return null;
  // Iterar todas las inscripciones privadas y matchear
  // El docId es {evento}_{rutClean} y el doc tiene rut + carnetPhotoURL
  let bestMatch = null;
  let bestTs = 0;
  Object.entries(ST.inscripcionesPrivate||{}).forEach(([docId, priv])=>{
    if(!priv || !priv.carnetPhotoURL) return;
    // Matchear por RUT del docId (despues del primer "_")
    const docRut = docId.includes('_') ? docId.split('_').slice(1).join('_') : '';
    const docRutNorm = norm(docRut);
    const privRutNorm = norm(priv.rut);
    if(docRutNorm===target || privRutNorm===target){
      // Quedarnos con la mas reciente
      const ts = priv.ts?.seconds || priv.ts?.toMillis?.() || 0;
      if(ts >= bestTs){
        bestTs = ts;
        bestMatch = priv.carnetPhotoURL;
      }
    }
  });
  return bestMatch;
}

// Importa la foto de inscripcion al flujo de procesamiento
window.importarFotoInscripcion = async function(){
  const F = window._fotosState;
  if(!F.pendingPhotoUrl){F.error='No hay foto de inscripción pendiente'; render(); return;}
  F.processing = true;
  F.status = 'Descargando foto de inscripción...';
  F.error = '';
  render();
  try{
    // Firebase Storage bloquea fetch() directo por CORS desde yourlift.cl.
    // Workaround: cargar como <img>, dibujar en canvas, exportar a Blob.
    // Los <img> tags NO tienen restricción de CORS para cargar la imagen,
    // pero canvas.toBlob() puede fallar si la imagen NO está crossorigin'd.
    // Por eso intentamos primero con crossOrigin='anonymous' (funciona con
    // Firebase Storage cuando el bucket tiene CORS público o el download
    // token está presente).
    const img = await new Promise((resolve, reject) => {
      const i = new Image();
      i.crossOrigin = 'anonymous';
      i.onload = () => resolve(i);
      i.onerror = (e) => reject(new Error('No se pudo cargar la imagen (revisar CORS o URL)'));
      i.src = F.pendingPhotoUrl;
    });
    // Dibujar en canvas para extraer Blob
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const blob = await new Promise((resolve, reject) => {
      canvas.toBlob(b => b ? resolve(b) : reject(new Error('No se pudo convertir la imagen')), 'image/jpeg', 0.95);
    });
    const file = new File([blob], 'inscripcion_photo.jpg', {type: 'image/jpeg'});
    const fakeInput = {files:[file]};
    F.processing = false;
    await window.cargarFotoAtleta(fakeInput);
  } catch(e){
    console.error('[Fotos] importar inscripcion error:', e);
    F.error = 'Error importando: '+e.message+' — alternativa: descargá la foto manualmente del enlace Ver en Nóminas y subila con "Elegir otra foto".';
    F.processing = false;
    F.status = '';
    render();
  }
};

window.cargarFotoAtleta = async function(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const F = window._fotosState;
  F.file = file;
  F.status = 'Procesando foto (quitando fondo)... esto puede tomar 10-30s';
  F.error = '';
  F.preview = null;
  F.processing = true;
  render();
  try{
    // Lazy-load de imgly background-removal (solo cuando se necesita)
    if(!window.imglyRemoveBackground){
      F.status = 'Cargando módulo de procesamiento (~30 MB la primera vez)...';
      render();
      await import('https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/+esm').then(m=>{
        window.imglyRemoveBackground = m.removeBackground;
      });
    }
    F.status = 'Quitando fondo...';
    render();
    const blob = await window.imglyRemoveBackground(file, {
      output:{format:'image/png', quality:0.95}
    });
    // Cargar imagen sin fondo y guardarla para el editor
    const url = URL.createObjectURL(blob);
    const img = await new Promise((res,rej)=>{const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=url;});
    F.bgRemovedImg = img;
    F.transform = {zoom:1.0, offsetX:0, offsetY:0, rotation:0};
    _redrawFotoPreview();  // genera el preview inicial centrado
    URL.revokeObjectURL(url);
    F.status = '✓ Lista. Ajustá la posición/zoom si hace falta y guardá.';
    F.processing = false;
    render();
  } catch(e){
    console.error('[Fotos] error:', e);
    F.error = 'Error procesando: ' + e.message + '. Probá con otra foto o más chica (<5MB).';
    F.processing = false;
    F.status = '';
    render();
  }
};

// Sube la foto sin ningún procesamiento — tal cual, sin quitar fondo ni canvas blanco
window.cargarFotoAtletaSinFondo = async function(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const F = window._fotosState;
  F.file = file;
  F.status = 'Cargando imagen...';
  F.error = '';
  F.preview = null;
  F.bgRemovedImg = null;
  F.processing = true;
  render();
  try{
    // Leer como data URL directamente — sin canvas, sin fondo blanco, sin imgly
    const dataUrl = await new Promise((res,rej)=>{
      const reader = new FileReader();
      reader.onload = e => res(e.target.result);
      reader.onerror = rej;
      reader.readAsDataURL(file);
    });
    F.preview = dataUrl;
    F.status = '✓ Lista para subir (foto sin modificar).';
    F.processing = false;
    render();
  }catch(e){
    F.error = 'Error cargando imagen: '+e.message;
    F.processing = false;
    F.status = '';
    render();
  }
};

window.guardarFotoAtleta = async function(){
  const F = window._fotosState;
  if(!F.preview || !F.selected) return;
  if(F.processing){console.log('[Fotos] ya procesando, ignorando click duplicado'); return;}  // ← anti-doble-click
  F.processing = true;
  F.status = 'Subiendo a Storage...';
  F.error = '';
  render();
  try{
    const dataUrl = F.preview;
    const blob = await (await fetch(dataUrl)).blob();
    const rutKey = (F.selected.rut||F.selected.codigo||'unknown').replace(/[^0-9a-zA-Z]/g,'_');
    const ts = Date.now();
    const path = 'athlete_photos/'+rutKey+'_'+ts+'.jpg';
    const storage = getStorage(app);
    const ref = storageRef(storage, path);
    await uploadBytes(ref, blob, {contentType:'image/jpeg'});
    const url = await getDownloadURL(ref);
    // Guardamos la foto en la colección atleta_fotos (separada de data.json)
    const docRef = doc(db, 'atleta_fotos', F.selected.codigo);
    await setDoc(docRef, {
      codigo: F.selected.codigo,
      rut: F.selected.rut||'',
      nombre: F.selected.nombre||'',
      foto_url: url,
      storage_path: path,
      status: 'approved',
      approved_by: ST.user?.email || 'admin',
      updated: ts
    }, {merge:true});
    // Update local cache
    if(!ST.fotosByCodigo) ST.fotosByCodigo = {};
    ST.fotosByCodigo[F.selected.codigo] = {codigo: F.selected.codigo, foto_url: url, status:'approved'};
    // Update local state
    F.selected.foto_url = url;
    const localAth = (ST.data||[]).find(a=>a.codigo===F.selected.codigo);
    if(localAth) localAth.foto_url = url;
    F.status = '✓ Foto guardada y publicada';
    F.preview = null;
    F.file = null;
    F.bgRemovedImg = null;
    F.transform = {zoom:1.0, offsetX:0, offsetY:0, rotation:0};
    F.processing = false;
    render();
  } catch(e){
    console.error('[Fotos] save error:', e);
    F.error = 'Error guardando: ' + e.message + '. Si dice "permissions" → desplegar firestore.rules.';
    F.processing = false;
    F.status = '';
    render();
  }
};

window.borrarFotoAtleta = async function(){

  const E = F.gifEditor;

  if(vid){
    vid.style.transform = 'scale('+E.zoom+') translate('+E.offsetX+'%,'+E.offsetY+'%)';

  window._fotosState.gifEditor.zoom = Math.max(0.5, Math.min(3, parseFloat(v)||1));

  const E = window._fotosState.gifEditor;
  gifEditorSetZoom(E.zoom + delta);

  E.offsetX = Math.max(-50, Math.min(50, E.offsetX + dx));

    startTime:window._fotosState.gifEditor.startTime||0,
    endTime:window._fotosState.gifEditor.endTime,

window.gifEditorSetStart = function(v){

window.gifEditorSetEnd = function(v){

};
window.gifTrimLoop = function(vid){
  const E = window._fotosState?.gifEditor;
  if(!E) return;
  const end = E.endTime != null ? E.endTime : Infinity;
  if(vid.currentTime >= end) vid.currentTime = E.startTime || 0;
};
window.gifEditorOnMeta = function(vid){
  const dur = vid.duration;
  const F = window._fotosState;
  if(F.gifEditor) F.gifEditor.duration = dur;
  const el = document.getElementById('gifDuration');
  if(el) el.textContent = 'Duración: '+dur.toFixed(2)+'s';
  vid.currentTime = F.gifEditor?.startTime || 0;
  _setupGifTimeline();
};

// ── Timeline trimmer estilo reels ────────────────────────────────
let _gifTimelineCleanup = null;
function _setupGifTimeline(){
  if(_gifTimelineCleanup){ _gifTimelineCleanup(); _gifTimelineCleanup=null; }
  const tl   = document.getElementById('gifTimeline');
  const lh   = document.getElementById('gifTrimLeft');
  const rh   = document.getElementById('gifTrimRight');
  const vid  = document.getElementById('gifPreviewVid');
  if(!tl || !lh || !rh || !vid) return;

  function E(){ return window._fotosState?.gifEditor; }
  function dur(){ return E()?.duration || vid.duration || 1; }

  function pctFromClientX(cx){
    const r = tl.getBoundingClientRect();
    return Math.max(0, Math.min(1, (cx - r.left) / r.width));
  }

  function refreshUI(){
    const e=E(); if(!e) return;
    const d=dur();
    const s=e.startTime||0;
    const en=e.endTime!=null?e.endTime:d;
    const lp=(s/d*100).toFixed(3)+'%';
    const rp=(en/d*100).toFixed(3)+'%';
    lh.style.left=lp; rh.style.left=rp;
    const reg=document.getElementById('gifTrimRegion');
    if(reg){ reg.style.left=lp; reg.style.width=((en-s)/d*100).toFixed(3)+'%'; }
    const lbl=document.getElementById('gifTrimLabels');
    if(lbl){
      const len=(en-s).toFixed(2);
      lbl.innerHTML='<span style="color:#D4A843">'+s.toFixed(2)+'s</span>'
        +' <span style="color:var(--muted)">→</span> '
        +'<span style="color:#D4A843">'+en.toFixed(2)+'s</span>'
        +' <span style="color:var(--muted);font-size:9px">('+len+'s seleccionados)</span>';
    }
  }

  // Playhead mientras reproduce
  vid.ontimeupdate=function(){
    const d=dur();
    const ph=document.getElementById('gifPlayhead');
    if(ph) ph.style.left=(vid.currentTime/d*100).toFixed(3)+'%';
    const e=E();
    if(e){ const end=e.endTime!=null?e.endTime:Infinity; if(vid.currentTime>=end) vid.currentTime=e.startTime||0; }
  };

  // Click en la barra para saltar
  tl.addEventListener('click', function(ev){
    if(window._gifTlDrag) return;
    vid.currentTime = pctFromClientX(ev.clientX) * dur();
  });

  // Drag con Pointer Events (mouse + touch)
  function startDrag(which, ev){
    ev.preventDefault(); ev.stopPropagation();
    window._gifTlDrag = which;
    ev.currentTarget.setPointerCapture(ev.pointerId);
  }
  function onMove(ev){
    if(!window._gifTlDrag) return;
    const t = pctFromClientX(ev.clientX) * dur();
    const e = E(); if(!e) return;
    const d = dur();
    if(window._gifTlDrag==='left'){
      e.startTime = Math.max(0, Math.min(t, (e.endTime!=null?e.endTime:d)-0.05));
      vid.currentTime = e.startTime;
    } else {
      e.endTime = Math.min(d, Math.max(t, (e.startTime||0)+0.05));
    }
    refreshUI();
  }
  function endDrag(){ window._gifTlDrag=null; }

  lh.addEventListener('pointerdown', ev=>startDrag('left',ev));
  rh.addEventListener('pointerdown', ev=>startDrag('right',ev));
  lh.addEventListener('pointermove', onMove);
  rh.addEventListener('pointermove', onMove);
  lh.addEventListener('pointerup', endDrag);
  rh.addEventListener('pointerup', endDrag);

  refreshUI();
  _gifTimelineCleanup = ()=>{ window._gifTlDrag=null; };
}

window.quitarFondoGif = async function(){
  const F = window._fotosState;
  if(!F.selected) return;
  const gifDoc = (ST.fotosByCodigo||{})[F.selected.codigo];
  const gifUrl = gifDoc?.gif_url;
  if(!gifUrl){ alert('Subí el GIF primero antes de procesar.'); return; }

  function setAIStatus(msg, pct){
    const el=document.getElementById('gifAIStatus');
    const pb=document.getElementById('gifAIProgress');
    const bar=document.getElementById('gifAIProgressBar');
    const btn=document.getElementById('gifAIBtn');
    if(el){ el.style.display=msg?'block':'none'; el.textContent=msg||''; }
    if(pb){ pb.style.display=pct!=null?'block':'none'; }
    if(bar&&pct!=null){ bar.style.width=pct+'%'; }
    if(btn){ btn.disabled=!!msg; btn.style.opacity=msg?.5:1; }
  }

  setAIStatus('Cargando módulo IA (~30 MB la primera vez)...', 0);
  try{
    // 1. Cargar imgly si no está
    if(!window.imglyRemoveBackground){
      await import('https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/+esm')
        .then(m=>{ window.imglyRemoveBackground=m.removeBackground; });
    }

    // 2. Cargar el video original
    setAIStatus('Cargando video...', 2);
    const video=document.createElement('video');
    video.crossOrigin='anonymous'; video.muted=true; video.src=gifUrl;
    await new Promise((res,rej)=>{ video.onloadedmetadata=res; video.onerror=rej; video.load(); });
    const W=video.videoWidth, H=video.videoHeight;
    const dur=video.duration;
    const fps=Math.min(12, Math.max(8, Math.round(1/(dur/Math.round(dur*10)))||10));
    const totalFrames=Math.max(1,Math.round(dur*fps));
    const frameDurMs=1000/fps;

    // 3. Extraer y procesar cada frame
    const frameCanvas=document.createElement('canvas');
    frameCanvas.width=W; frameCanvas.height=H;
    const ctx=frameCanvas.getContext('2d');
    const processedBitmaps=[];

    for(let i=0;i<totalFrames;i++){
      const t=Math.min(i/fps, dur-0.05);
      video.currentTime=t;
      await new Promise(res=>{ video.onseeked=()=>res(); setTimeout(res,500); });
      ctx.drawImage(video,0,0,W,H);
      const frameBlob=await new Promise(res=>frameCanvas.toBlob(res,'image/png',0.92));
      const pct=Math.round((i/totalFrames)*80);
      setAIStatus(`Quitando fondo: frame ${i+1} / ${totalFrames}...`, pct);
      const processed=await window.imglyRemoveBackground(frameBlob,{
        output:{format:'image/png',quality:0.92}
      });
      processedBitmaps.push(await createImageBitmap(processed));
    }

    // 4. Re-ensamblar como WebM con alpha (VP9)
    setAIStatus('Ensamblando video transparente...', 82);
    const outCanvas=document.createElement('canvas');
    outCanvas.width=W; outCanvas.height=H;
    const outCtx=outCanvas.getContext('2d');
    const mimeType=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
      ?'video/webm;codecs=vp9':'video/webm';
    const stream=outCanvas.captureStream(fps);
    const recorder=new MediaRecorder(stream,{mimeType,videoBitsPerSecond:6000000});
    const chunks=[];
    recorder.ondataavailable=e=>{ if(e.data.size)chunks.push(e.data); };
    recorder.start();
    await new Promise(res=>{
      let fi=0;
      function next(){
        if(fi>=processedBitmaps.length){ setTimeout(()=>{ recorder.stop(); res(); },300); return; }
        outCtx.clearRect(0,0,W,H);
        outCtx.drawImage(processedBitmaps[fi],0,0);
        fi++;
        setTimeout(next,frameDurMs);
      }
      next();
    });
    await new Promise(res=>{ recorder.onstop=res; });

    // 5. Subir WebM procesado
    setAIStatus('Subiendo video procesado...', 90);
    const webmBlob=new Blob(chunks,{type:mimeType});
    const rutKey=(F.selected.rut||F.selected.codigo||'x').replace(/[^0-9a-zA-Z]/g,'_');
    const ts=Date.now();
    const path='athlete_gifs/'+rutKey+'_'+ts+'_nobg.webm';
    const storage=getStorage(app);
    const sRef=storageRef(storage,path);
    await uploadBytes(sRef,webmBlob,{contentType:'video/webm'});
    const url=await getDownloadURL(sRef);

    // 6. Guardar en Firestore
    setAIStatus('Guardando...', 97);
    const docRef=doc(db,'atleta_fotos',F.selected.codigo);
    const newData={gif_url:url,gif_blend:'normal',gif_storage_path:path,gif_updated:ts};
    await setDoc(docRef,newData,{merge:true});

    // 7. Actualizar cache local
    if(!ST.fotosByCodigo) ST.fotosByCodigo={};
    Object.assign(ST.fotosByCodigo[F.selected.codigo]||{}, newData);
    if(!ST.fotosByCodigo[F.selected.codigo]) ST.fotosByCodigo[F.selected.codigo]=newData;
    else Object.assign(ST.fotosByCodigo[F.selected.codigo], newData);
    F.gifBlend='normal';
    F.selected.gif_url=url;
    const la=(ST.data||[]).find(a=>a.codigo===F.selected.codigo);
    if(la){la.gif_url=url;la.gif_blend='normal';}

    setAIStatus(null);
    F.gifStatus='✓ Fondo eliminado y guardado. Blend cambiado a Normal (alpha).';
    render();
  }catch(e){
    console.error('[quitarFondoGif]',e);
    setAIStatus(null);
    F.gifError='Error: '+e.message;
    render();
  }
};
