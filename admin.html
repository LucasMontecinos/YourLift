let _sc={};
function initStatsCharts(){
  Object.values(_sc).forEach(c=>{try{c.destroy()}catch(e){}});_sc={};
  // Aplicar filtros del usuario para que todos los charts se actualicen juntos
  const rows = applyStatsFilters(buildStatsRows());
  const years=[...new Set(rows.map(r=>r.year))].sort();
  const base={color:'#D4E1F0',
    plugins:{legend:{labels:{color:'#D4E1F0',font:{family:'Oswald',size:11}}}},
    scales:{x:{ticks:{color:'#7A8FA6',font:{family:'Oswald',size:10}},grid:{color:'rgba(30,58,95,.5)'}},
            y:{ticks:{color:'#7A8FA6',font:{family:'Oswald',size:10}},grid:{color:'rgba(30,58,95,.5)'}}}};
  function mk(id,type,data,extra={}){
    const el=document.getElementById(id);if(!el)return;
    const opts={responsive:true,maintainAspectRatio:false,...base,...extra,
      plugins:{...base.plugins,...(extra.plugins||{})},
      scales:{...base.scales,...(extra.scales||{})}};
    _sc[id]=new Chart(el,{type,data,options:opts});
  }
  // 1 Únicos H/M
  const uM=years.map(y=>[...new Set(rows.filter(r=>r.year===y&&r.sexo==='M').map(r=>r.codigo))].length);
  const uF=years.map(y=>[...new Set(rows.filter(r=>r.year===y&&r.sexo==='F').map(r=>r.codigo))].length);
  mk('chartUnicos','line',{labels:years,datasets:[
    {label:'Hombres',data:uM,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.15)',fill:true,tension:.3,pointBackgroundColor:'#3b82f6'},
    {label:'Mujeres',data:uF,borderColor:'#ec4899',backgroundColor:'rgba(236,72,153,.15)',fill:true,tension:.3,pointBackgroundColor:'#ec4899'}]});
  // 2 Participaciones
  const pM=years.map(y=>rows.filter(r=>r.year===y&&r.sexo==='M').length);
  const pF=years.map(y=>rows.filter(r=>r.year===y&&r.sexo==='F').length);
  mk('chartPartic','bar',{labels:years,datasets:[
    {label:'Hombres',data:pM,backgroundColor:'rgba(59,130,246,.8)',borderRadius:4},
    {label:'Mujeres',data:pF,backgroundColor:'rgba(236,72,153,.8)',borderRadius:4}]});
  // 3&5 Categorías F y M
  const CF=['#ec4899','#f43f5e','#fb923c','#fbbf24','#a78bfa','#60a5fa','#34d399','#f472b6','#e879f9'];
  const CM=['#3b82f6','#6366f1','#0ea5e9','#06b6d4','#10b981','#84cc16','#f59e0b','#ef4444','#8b5cf6'];
  ['F','M'].forEach((sex,si)=>{
    const id=sex==='F'?'chartCatF':'chartCatM';
    const colors=sex==='F'?CF:CM;
    const rs=rows.filter(r=>r.sexo===sex);
    const allCats=[...new Set(rs.map(r=>r.cat))].filter(c=>c&&c!=='?').sort((a,b)=>parseFloat(a)-parseFloat(b));
    // pick top 9 by total count
    const cats=allCats.sort((a,b)=>rs.filter(r=>r.cat===b).length-rs.filter(r=>r.cat===a).length).slice(0,9).sort((a,b)=>parseFloat(a)-parseFloat(b));
    mk(id,'bar',{labels:years,datasets:cats.map((cat,i)=>({
      label:(cat.endsWith('+')?'+'+cat.slice(0,-1):'-'+cat)+' kg',data:years.map(y=>rs.filter(r=>r.year===y&&r.cat===cat).length),
      backgroundColor:colors[i%colors.length],borderRadius:2}))},
      {scales:{x:{...base.scales.x,stacked:true},y:{...base.scales.y,stacked:true}}});
  });
  // 4 Top clubs
  const cc={};rows.forEach(r=>{if(r.club)cc[r.club]=(cc[r.club]||0)+1;});
  const top=Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,10);
  mk('chartClubs','bar',{labels:top.map(([c])=>c.length>20?c.slice(0,19)+'…':c),
    datasets:[{label:'Participaciones',data:top.map(([,v])=>v),backgroundColor:'rgba(212,168,67,.85)',borderRadius:4}]},
    {indexAxis:'y',scales:{x:{...base.scales.x},y:{...base.scales.y,ticks:{color:'#7A8FA6',font:{size:9,family:'DM Sans'}}}}});
  // 6 División
  const DIVS=['Open','Junior','Sub-Junior','Universitario','Master I','Master II','Master III','Master IV'];
  const DC=['#3b82f6','#22c55e','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#f43f5e','#84cc16'];
  mk('chartDiv','doughnut',{labels:DIVS,datasets:[{data:DIVS.map(d=>rows.filter(r=>r.div===d).length),
    backgroundColor:DC,borderColor:'#0A1628',borderWidth:2}]},
    {scales:{},plugins:{legend:{position:'right',labels:{color:'#D4E1F0',font:{family:'Oswald',size:10},boxWidth:12}}}});
  // 7 Edad promedio
  const avg=arr=>arr.length?Math.round(arr.reduce((s,v)=>s+v,0)/arr.length*10)/10:null;
  const eM=years.map(y=>avg(rows.filter(r=>r.year===y&&r.sexo==='M'&&r.age>10&&r.age<80).map(r=>r.age)));
  const eF=years.map(y=>avg(rows.filter(r=>r.year===y&&r.sexo==='F'&&r.age>10&&r.age<80).map(r=>r.age)));
  mk('chartEdad','line',{labels:years,datasets:[
    {label:'Hombres',data:eM,borderColor:'#3b82f6',fill:false,tension:.3,pointBackgroundColor:'#3b82f6'},
    {label:'Mujeres',data:eF,borderColor:'#ec4899',fill:false,tension:.3,pointBackgroundColor:'#ec4899'}]});
  // 8 Modalidad
  const MODS=['Classic','Equipado','Only Bench'];
  const MC=['#22c55e','#f59e0b','#3b82f6'];
  mk('chartMod','bar',{labels:years,datasets:MODS.map((mod,i)=>({
    label:mod,data:years.map(y=>rows.filter(r=>r.year===y&&r.mod===mod).length),
    backgroundColor:MC[i],borderRadius:2}))},
    {scales:{x:{...base.scales.x,stacked:true},y:{...base.scales.y,stacked:true}}});

  // 9 Crecimiento YoY
  const uniqSz=years.map(y=>new Set(rows.filter(r=>r.year===y).map(r=>r.codigo)).size);
  const deltaAbs=years.map((y,i)=>i===0?0:uniqSz[i]-uniqSz[i-1]);
  const deltaPct=years.map((y,i)=>i===0?null:(uniqSz[i-1]>0?Math.round((uniqSz[i]-uniqSz[i-1])/uniqSz[i-1]*1000)/10:null));
  mk('chartCrecimiento','bar',{labels:years,datasets:[
    {label:'Δ atletas únicos',data:deltaAbs,backgroundColor:deltaAbs.map(v=>v>=0?'rgba(34,197,94,.8)':'rgba(239,68,68,.8)'),borderRadius:4,yAxisID:'y'},
    {label:'% cambio',data:deltaPct,type:'line',borderColor:'#f59e0b',backgroundColor:'transparent',pointBackgroundColor:'#f59e0b',tension:.3,yAxisID:'y1'}]},
    {scales:{
      x:{...base.scales.x},
      y:{...base.scales.y,title:{display:true,text:'Δ atletas',color:'#7A8FA6',font:{size:9}}},
      y1:{position:'right',ticks:{color:'#f59e0b',font:{family:'Oswald',size:10},callback:v=>v+'%'},grid:{drawOnChartArea:false}}}});

  // 10 Predicción (regresión lineal + forecast 3 años)
  const nY=years.length,xsR=years.map((_,i)=>i);
  const sxR=xsR.reduce((s,v)=>s+v,0),syR=uniqSz.reduce((s,v)=>s+v,0);
  const sxyR=xsR.reduce((s,x,i)=>s+x*uniqSz[i],0),sxxR=xsR.reduce((s,x)=>s+x*x,0);
  const slp=(nY*sxyR-sxR*syR)/(nY*sxxR-sxR*sxR||1);
  const icp=(syR-slp*sxR)/nY;
  const trendLine=years.map((_,i)=>Math.max(0,Math.round(icp+slp*i)));
  const lastYr=parseInt(years[years.length-1])||2025;
  const fcYears=[lastYr+1,lastYr+2,lastYr+3].map(String);
  const fcVals=fcYears.map((_,i)=>Math.max(0,Math.round(icp+slp*(nY+i))));
  const allLabels=[...years,...fcYears];
  const histData=[...uniqSz,...fcYears.map(()=>null)];
  const trendData=[...trendLine,...fcVals];
  mk('chartPrediccion','line',{labels:allLabels,datasets:[
    {label:'Histórico',data:histData,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.15)',fill:true,tension:.3,pointBackgroundColor:'#3b82f6'},
    {label:'Tendencia + forecast',data:trendData,borderColor:'#a78bfa',backgroundColor:'transparent',
      borderDash:[6,4],tension:.3,pointBackgroundColor:allLabels.map((_,i)=>i>=nY?'#a78bfa':'transparent'),
      pointRadius:allLabels.map((_,i)=>i>=nY?5:0)}]});

  // 11 Retención
  const retLabels=years.slice(1);
  const retData=retLabels.map((y,i)=>{
    const py=years[i];
    const pc=new Set(rows.filter(r=>r.year===py).map(r=>r.codigo));
    const cc=new Set(rows.filter(r=>r.year===y).map(r=>r.codigo));
    return pc.size>0?Math.round([...pc].filter(c=>cc.has(c)).length/pc.size*100):0;
  });
  mk('chartRetencion','line',{labels:retLabels,datasets:[
    {label:'% retención',data:retData,borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,.15)',fill:true,
      tension:.3,pointBackgroundColor:'#f59e0b',pointRadius:5}]},
    {scales:{x:{...base.scales.x},y:{...base.scales.y,min:0,max:100,ticks:{...base.scales.y.ticks,callback:v=>v+'%'}}}});

  // 12 Distribución por n° de competencias
  const cc2={};rows.forEach(r=>{cc2[r.codigo]=(cc2[r.codigo]||0)+1;});
  const buckets={'1 comp':0,'2 comp':0,'3 comp':0,'4 comp':0,'5–9 comp':0,'10+ comp':0};
  Object.values(cc2).forEach(n=>{
    if(n===1)buckets['1 comp']++;
    else if(n===2)buckets['2 comp']++;
    else if(n===3)buckets['3 comp']++;
    else if(n===4)buckets['4 comp']++;
    else if(n<10)buckets['5–9 comp']++;
    else buckets['10+ comp']++;
  });
  mk('chartDistComp','bar',{labels:Object.keys(buckets),datasets:[{
    label:'Atletas',data:Object.values(buckets),
    backgroundColor:['#ef4444','#f59e0b','#22c55e','#3b82f6','#8b5cf6','#ec4899'],borderRadius:4}]},
    {plugins:{legend:{display:false}}});

  // 13 Top 20 atletas
  const nameMap={};(ST.data||[]).forEach(a=>{nameMap[a.codigo]=a.nombre||a.codigo;});
  const top20=Object.entries(cc2).sort((a,b)=>b[1]-a[1]).slice(0,20);
  const t20Labels=top20.map(([cod])=>{const n=nameMap[cod]||cod;return n.length>28?n.slice(0,27)+'…':n;});
  mk('chartTopAtletas','bar',{labels:t20Labels,datasets:[{
    label:'Competencias',data:top20.map(([,v])=>v),
    backgroundColor:'rgba(212,168,67,.85)',borderRadius:4}]},
    {indexAxis:'y',
     scales:{x:{...base.scales.x},y:{...base.scales.y,ticks:{color:'#D4E1F0',font:{size:10,family:'DM Sans'}}}},
     plugins:{legend:{display:false}}});
}

function renderDashboard(){
  const D=ST.data,I=ST.inscripciones;
  const YEARS=['2017','2018','2019','2020','2021','2022','2023','2024','2025','2026'];
  const isSA=ST.adminInfo?.role==='superadmin'||ST.adminInfo?.role==='owner'||ST.adminInfo?.bootstrap||false;

  // ── SVG CHART HELPERS ───────────────────────────────────
  function barChart(series,opts={}){
    const {w=480,h=140,pad=36,gap=3,labelY=true,yLabel='',title=''}=opts;
    const allVals=series.flatMap(s=>s.data);
    const maxV=Math.max(...allVals,1);
    const barW=Math.floor((w-pad*2)/(series[0].data.length*(series.length+gap)));
    const groupW=(series.length*barW)+(gap*barW);
    const labels=opts.labels||series[0].data.map((_,i)=>i);
    let svg=`<svg viewBox="0 0 ${w} ${h+40}" style="width:100%;max-width:${w}px">`;
    // Y gridlines
    [0,25,50,75,100].forEach(pct=>{
      const y=pad+(h-pad*2)*(1-pct/100);
      const val=Math.round(maxV*pct/100);
      svg+=`<line x1="${pad}" y1="${y}" x2="${w-10}" y2="${y}" stroke="rgba(100,140,200,.15)" stroke-width="0.5" stroke-dasharray="3,3"/>`;
      if(labelY&&pct%50===0)svg+=`<text x="${pad-4}" y="${y+4}" text-anchor="end" font-size="9" fill="rgba(120,140,170,.7)">${val}</text>`;
    });
    // Bars
    labels.forEach((lbl,gi)=>{
      const gx=pad+gi*groupW;
      series.forEach((s,si)=>{
        const v=s.data[gi]||0;
        const bh=Math.max((v/maxV)*(h-pad*2),2);
        const x=gx+si*barW+si*1;
        const y=pad+(h-pad*2)-bh;
        svg+=`<rect x="${x}" y="${y}" width="${barW-1}" height="${bh}" fill="${s.color}" rx="2" opacity="0.88"/>`;
        if(bh>14)svg+=`<text x="${x+barW/2-0.5}" y="${y+bh-4}" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">${v}</text>`;
      });
      svg+=`<text x="${gx+groupW/2-barW/2}" y="${h+14}" text-anchor="middle" font-size="9" fill="rgba(160,180,210,.8)">${lbl}</text>`;
    });
    // Legend
    if(series.length>1){
      let lx=pad;
      series.forEach(s=>{
        svg+=`<rect x="${lx}" y="${h+22}" width="10" height="10" fill="${s.color}" rx="2"/>`;
        svg+=`<text x="${lx+13}" y="${h+31}" font-size="9" fill="rgba(160,180,210,.9)">${s.label||''}</text>`;
        lx+=s.label?s.label.length*6+20:30;
      });
    }
    svg+=`</svg>`;
    return svg;
  }

  function miniBar(val,max,color='var(--blue)',h=8){
    const pct=Math.min(Math.round(val/Math.max(max,1)*100),100);
    return `<div style="background:rgba(30,58,95,.3);border-radius:3px;height:${h}px;overflow:hidden"><div style="background:${color};height:100%;width:${pct}%;border-radius:3px;transition:width .4s"></div></div>`;
  }

  // ── DATA EXTRACTION ───────────────────────────────────────
  // Debuts per year
  const debutByYear={};
  YEARS.forEach(y=>debutByYear[y]=0);
  D.forEach(a=>{const m=String(a.debut||'').match(/20\d\d/);if(m&&debutByYear[m[0]]!==undefined)debutByYear[m[0]]++;});

  // Participations per year (unique athletes who competed)
  const partByYear={};
  YEARS.forEach(y=>partByYear[y]=new Set());
  D.forEach(a=>{(a.competencias||[]).forEach(c=>{const m=(c.evento||'').match(/20\d\d/);if(m&&partByYear[m[0]])partByYear[m[0]].add(a.codigo);});});

  // New vs returning per year

       {label:'Equipado',data:['2024','2025','2026'].map(y=>modalByYear[y]['Equipado']||0),color:'var(--gold)'}],

    )}
    <div style="font-size:10px;color:var(--muted);margin-top:8px;text-align:center">
      Classic domina con ${modalByYear['2025']['Classic']||0} vs ${modalByYear['2025']['Equipado']||0} en 2025
    </div>
  </div>`;

  // Bomb-out and performance
  h+=`<div class="card"><div class="h2">Bomb-Out Rate por Año</div>
    ${barChart(
      [{label:'Bomb-out %',data:['2024','2025','2026'].map(yr=>{const b=bombByYear[yr];const t=b.ok+b.bomb;return t?parseFloat((b.bomb/t*100).toFixed(1)):0;}),color:'var(--red)'}],
      {labels:['2024','2025','2026'],w:240,h:100,pad:28,labelY:false}
    )}
    <div style="display:flex;justify-content:space-around;margin-top:8px;font-size:11px">
      ${['2024','2025','2026'].map(yr=>`<span style="color:var(--muted)">${yr}: <strong style="color:var(--text)">${bombRate(yr)}%</strong></span>`).join('')}
    </div>
  </div>`;
  h+=`</div>`;

  // ── SECTION 6: HHI + Club concentration + Inscripciones ──
  h+=`<div style="font-family:Oswald;font-size:11px;letter-spacing:2px;color:var(--muted);margin:4px 0 8px;text-transform:uppercase">Concentración de Mercado · Inscripciones</div>`;
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">`;

  const clubSorted=Object.entries(clubCounts).sort((a,b)=>b[1]-a[1]);
  const top5Sum=clubSorted.slice(0,5).reduce((s,c)=>s+c[1],0);
  const concPct=Math.round(top5Sum/total*100);
  h+=`<div class="card"><div class="h2">Concentración de Clubes (HHI = ${hhi} — ${hhiLabel})</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Top 5 clubes concentran <strong style="color:${concPct>60?'var(--orange)':'var(--green)'}">${concPct}%</strong> de la base · HHI <1000=competitivo · 1000-2500=moderado · >2500=concentrado</div>
    ${clubSorted.slice(0,8).map(([c,n],i)=>{
      const pct=Math.round(n/total*100);
      const color=['var(--gold)','var(--blue)','var(--green)','var(--accent)','var(--muted)','var(--muted)','var(--muted)','var(--muted)'][i];
      return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
        <span style="font-size:10px;color:${color};font-family:Oswald;font-weight:700;width:16px">${i+1}</span>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px"><span>${c}</span><span style="color:var(--muted)">${n} (${pct}%)</span></div>
          ${miniBar(n,total,color,6)}
        </div>
      </div>`;
    }).join('')}
  </div>`;

  h+=`<div class="card"><div class="h2">Inscripciones Operacionales</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div style="padding:10px;background:var(--bg);border-radius:8px;text-align:center"><div style="font-family:Oswald;font-size:26px;color:var(--green)">${approved}</div><div style="font-size:10px;color:var(--muted)">Aprobadas</div></div>
      <div style="padding:10px;background:var(--bg);border-radius:8px;text-align:center"><div style="font-family:Oswald;font-size:26px;color:${pending>0?'var(--gold)':'var(--muted)'}">${pending}</div><div style="font-size:10px;color:var(--muted)">Pendientes</div></div>
      <div style="padding:10px;background:var(--bg);border-radius:8px;text-align:center"><div style="font-family:Oswald;font-size:26px;color:${stale>0?'var(--red)':'var(--green)'}">${stale}</div><div style="font-size:10px;color:var(--muted)">Pendientes +48h</div></div>
      <div style="padding:10px;background:var(--bg);border-radius:8px;text-align:center"><div style="font-family:Oswald;font-size:26px;color:var(--blue)">${totalInsc}</div><div style="font-size:10px;color:var(--muted)">Total Firebase</div></div>
    </div>
    <div style="font-family:Oswald;font-size:11px;color:var(--muted);margin-bottom:6px">Actividad reciente</div>
    ${ST.auditLog.length===0?'<div class="empty">Sin actividad</div>':
      '<table class="tbl" style="font-size:10px"><tr><th>Hora</th><th>Usuario</th><th>Acción</th></tr>'+
      ST.auditLog.slice(0,6).map(l=>{
        const dt=new Date(l.ts);
        return `<tr><td style="color:var(--muted)">${dt.toLocaleTimeString('es-CL')}</td><td>${(l.user||'').split('@')[0]}</td><td><span class="tag b-b">${l.action}</span></td></tr>`;
      }).join('')+'</table>'}
  </div>`;
  h+=`</div>`;


  // ── SECTION 7: KPIs por Club ─────────────────────────────
  h+=`<div class="os" style="font-size:11px;letter-spacing:2px;color:var(--muted);margin:20px 0 8px;text-transform:uppercase">KPIs por Club</div>`;
  const _cS={};
  (ST.data||[]).forEach(a=>{
    const cl=(a.club||'').trim();if(!cl)return;
    if(!_cS[cl])_cS[cl]={n:0,a26:0,a25:0,glps:[],bd:0,rs:0,n26:0};
    const d=_cS[cl];d.n++;
    const debut=String(a.debut||'');
    if(debut.includes('2026'))d.n26++;
    const yrs=new Set();
    (a.competencias||[]).forEach(c=>{
      for(const y of ['2026','2025']){if((c.evento||'').includes(y)){yrs.add(y);break;}}
      const r=c.resultado||{};
      if(r.total>0){d.rs++;const g=r.glp||0;if(g>0)d.glps.push(g);}
      else if(r&&r.total===0)d.bd++;
    });
    if(yrs.has('2026'))d.a26++;if(yrs.has('2025'))d.a25++;
  });
  const _cArr=Object.entries(_cS)
    .map(([name,d])=>({name,n:d.n,a26:d.a26,
      avg:d.glps.length?Math.round(d.glps.reduce((s,v)=>s+v,0)/d.glps.length*10)/10:0,
      top:d.glps.length?Math.round(Math.max(...d.glps)*10)/10:0,
      bomb:d.bd+d.rs>0?Math.round(d.bd/(d.bd+d.rs)*100*10)/10:0,
      ret:d.a25>0?Math.round(d.a26/d.a25*100):0,n26:d.n26}))
    .filter(d=>d.n>=3).sort((a,b)=>b.n-a.n);
  h+=`<div class="card" style="padding:0;overflow-x:auto;margin-bottom:16px">
  <table class="tbl"><thead><tr>
    <th style="padding:10px 12px;text-align:left">Club</th>
    <th class="os" style="text-align:center;font-size:10px;padding:10px 8px">Atletas</th>
    <th class="os" style="text-align:center;font-size:10px;padding:10px 8px">Activos '26</th>
    <th class="os" style="text-align:center;font-size:10px;padding:10px 8px">GL Avg</th>
    <th class="os" style="text-align:center;font-size:10px;padding:10px 8px">GL Top</th>
    <th class="os" style="text-align:center;font-size:10px;padding:10px 8px">Bomb-out</th>
    <th class="os" style="text-align:center;font-size:10px;padding:10px 8px">Retención</th>
    <th class="os" style="text-align:center;font-size:10px;padding:10px 8px">Nuevos '26</th>
  </tr></thead><tbody>
  ${_cArr.map((c,i)=>{
    const rc=i===0?'var(--gold)':i===1?'#c0c0c0':i===2?'#cd7f32':'var(--muted)';
    const rtc=c.ret>=70?'var(--green)':c.ret>=40?'var(--gold)':'var(--red)';
    const bc=c.bomb>5?'var(--red)':c.bomb>2?'var(--gold)':'var(--green)';
    const bw=Math.round(c.n/(_cArr[0]?.n||1)*100);
    return '<tr style="border-bottom:1px solid rgba(30,58,95,.3)">'
      +'<td style="padding:8px 12px"><div style="display:flex;align-items:center;gap:8px">'
      +'<span class="os" style="font-size:11px;color:'+rc+';min-width:18px">'+(i+1)+'</span>'
      +'<div><div style="font-size:13px;font-weight:600">'+c.name+'</div>'
      +'<div style="background:rgba(30,58,95,.3);border-radius:2px;height:3px;width:'+bw+'%;margin-top:3px"></div></div></div></td>'
      +'<td style="text-align:center;font-family:Oswald;font-size:15px">'+c.n+'</td>'
      +'<td style="text-align:center;font-family:Oswald;font-size:15px;color:var(--blue)">'+c.a26+'</td>'
      +'<td style="text-align:center;font-family:Oswald;font-size:15px;color:var(--gold)">'+(c.avg||'—')+'</td>'
      +'<td style="text-align:center;font-family:Oswald;font-size:13px;color:var(--muted)">'+(c.top||'—')+'</td>'
      +'<td style="text-align:center;font-family:Oswald;font-size:15px;color:'+bc+'">'+c.bomb+'%</td>'
      +'<td style="text-align:center;font-family:Oswald;font-size:15px;color:'+rtc+'">'+(c.ret>0?c.ret+'%':'—')+'</td>'
      +'<td style="text-align:center;font-family:Oswald;font-size:15px;color:'+(c.n26>0?'var(--green)':'var(--muted)')+'">'+(c.n26||'—')+'</td>'
      +'</tr>';
  }).join('')}
  </tbody></table></div>`;
  } else {
    h+=`<div class="card" style="background:rgba(212,168,67,.05);border:1px solid rgba(212,168,67,.2);padding:20px;text-align:center"><div style="font-family:Oswald;font-size:13px;letter-spacing:2px;color:var(--gold);margin-bottom:8px">ANÁLISIS AVANZADO</div><div style="font-size:13px;color:var(--muted)">El análisis de crecimiento, cohorte, divisiones y concentración de mercado está disponible solo para <strong style="color:var(--gold)">Superadmin</strong>.</div></div>`;
  }
  return h;
}


function renderAthletes(){
  // Búsqueda normalizada (ignora tildes) + por palabras: "lucas montecinos"
  // matchea "Lucas Andrés Montecinos Alarcón".
  const sRaw=(ST.search||'').trim();
  const sNorm=nrmName(sRaw);
  const words=sNorm.split(' ').filter(Boolean);
  const fl=ST.filterLetter;
  let sorted=[...ST.data].sort((a,b)=>String(a.nombre||'').localeCompare(String(b.nombre||''),'es'));
  let list=sorted.filter(a=>{
    if(fl&&!String(a.nombre||'').toUpperCase().startsWith(fl))return false;
    if(words.length){
      const nName=nrmName(a.nombre);
      const nClub=nrmName(a.club||'');
      const nCod=(a.codigo||'').toLowerCase();
      const nRut=(a.rut||'').replace(/[^0-9kK]/gi,'').toLowerCase();
      const sClean=sNorm.replace(/\s+/g,'');
      const qRut=sRaw.replace(/[^0-9kK]/gi,'').toLowerCase();
      // match si: todas las palabras están en el nombre, O el query está en club/código/rut.
      // OJO: qRut/sClean pueden quedar vacíos al buscar un nombre puro — sin el guard,
      // `incluye('')` es siempre true y dejaría pasar a TODOS (no filtraría nada).
      const byName=words.every(w=>nName.includes(w));
      const byOther=nClub.includes(sNorm)||(sClean&&nCod.includes(sClean))||(qRut&&nRut.includes(qRut));
      if(!byName&&!byOther)return false;
    }
    return true;
  }).slice(0,100);
  const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const _isOwner=ST.adminInfo?.role==='owner'||ST.adminInfo?.bootstrap;
  // Banner de debutantes pendientes eliminado: los debutantes se integran
  // automáticamente al inscribirse (viven en atletas_pending y ya son visibles).
  // Ya no requieren "publicar data.json" manualmente.
  let bannerPend='';
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
      <div class="h1" style="margin:0">Atletas (Base de Datos)</div>
      ${(['owner','superadmin'].includes(ST.adminInfo?.role)||ST.adminInfo?.bootstrap)?`<button onclick="openCompModal('')" class="btn btn-g" style="padding:8px 14px;font-size:12px">+ Agregar competencia</button>`:''}
    </div>
    <p class="subtitle">${ST.data.length} atletas · Ordenados A-Z · Click en cualquier campo para editar</p>
    ${bannerPend}
    <div class="search-box">
      <input class="inp" placeholder="Buscar nombre, club, código o RUT..." value="${ST.search}" oninput="searchDebounced(this.value)">
    </div>
    <div style="display:flex;gap:12px">
      <div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0">
        <button onclick="ST.filterLetter='';render()" style="padding:4px 8px;border-radius:4px;border:1px solid ${!fl?'var(--accent)':'var(--border)'};background:${!fl?'var(--accent)':'transparent'};color:${!fl?'#fff':'var(--muted)'};font-family:Oswald;font-size:11px;font-weight:700;cursor:pointer">ALL</button>
        ${letters.map(l=>`<button onclick="ST.filterLetter='${l}';render()" style="padding:3px 8px;border-radius:4px;border:1px solid ${fl===l?'var(--accent)':'var(--border)'};background:${fl===l?'var(--accent)':'transparent'};color:${fl===l?'#fff':'var(--muted)'};font-family:Oswald;font-size:10px;font-weight:700;cursor:pointer;min-width:30px">${l}</button>`).join('')}
      </div>
      <div class="card" style="padding:0;overflow-x:auto;flex:1">
        <table class="tbl">
          <tr><th>Código</th><th>RUT</th><th>Nombre</th><th>Club</th><th>Debut</th><th>Comp.</th><th></th></tr>
          ${list.map(a=>{
            const esc=a.codigo.replace(/'/g,"\\'");
            const badCodigo=!/^\d{4}[A-Z]{2,3}-\d{4}$/.test(a.codigo);
            return `<tr${badCodigo?' style="background:rgba(239,68,68,.06)"':''}>
            <td><span class="editable" onclick="editAthlete('${esc}','codigo')" style="font-size:10px;font-family:Oswald;color:${badCodigo?'var(--red)':'var(--accent)'}" title="${badCodigo?'Código inválido — click para corregir':''}">${a.codigo}</span></td>
            <td><span class="editable" onclick="editAthlete('${esc}','rut')" style="font-size:10px;color:${a.rut?'var(--muted)':'var(--red)'}" title="Click para editar RUT">${a.rut||'sin RUT'}</span></td>
            <td><span class="editable" onclick="editAthlete('${esc}','nombre')">${a.nombre}</span></td>
            <td><span class="editable" onclick="editAthlete('${esc}','club')">${a.club||'—'}</span></td>
            <td><span class="editable" onclick="editAthlete('${esc}','debut')">${a.debut||'—'}</span></td>
            <td style="text-align:center"><span class="badge b-y">${a.competencias?.length||0}</span></td>
            <td style="display:flex;gap:4px;flex-wrap:wrap">
              ${badCodigo?`<button onclick="fixCodigoAuto('${esc}')" style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);color:var(--red);padding:3px 8px;border-radius:5px;font-size:10px;cursor:pointer;font-family:Oswald;font-weight:700" title="Generar código correcto desde RUT + nombre + debut">Fix</button>`:''}
              <button onclick="openAthleteProfile('${esc}')" style="background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:var(--blue);padding:3px 8px;border-radius:5px;font-size:10px;cursor:pointer;font-family:Oswald" title="Ver perfil"></button>
              <button onclick="deleteAthlete('${esc}')" style="background:transparent;border:1px solid rgba(239,68,68,.3);color:var(--red);padding:3px 8px;border-radius:5px;font-size:10px;cursor:pointer;font-family:Oswald" title="Eliminar">✕</button>
            </td>
          </tr>`;}).join('')}
        </table>
      </div>
    </div>
    ${list.length===100?'<p style="text-align:center;color:var(--muted);font-size:12px;padding:14px">Mostrando primeros 100 — refina tu búsqueda</p>':''}`;
}

function renderNominas(){
  // Events from Firebase inscriptions only (Firestore is the source of truth)
  const fbEvents=[...new Set(ST.inscripciones.map(i=>i.evento))].filter(Boolean);
  const allEvents=[...new Set([...fbEvents])];
  if(!ST.filterEv&&allEvents.length)ST.filterEv=allEvents[0];

  const inFirebase=fbEvents.includes(ST.filterEv);
  const hasEventoDoc=ST.eventos.some(e=>e.id===ST.filterEv||e.name===ST.filterEv);
  const needsMetaSync=inFirebase && !hasEventoDoc;

  let filtered;
  if(inFirebase){
    filtered=ST.inscripciones.filter(i=>i.evento===ST.filterEv&&i.status!=='rejected');
    filtered.sort((a,b)=>(a.sortOrder||999)-(b.sortOrder||999));
  }else{
    filtered=[];
  }
  
  return `
    <div class="h1">Nóminas</div>
    <p class="subtitle">Edita inscripciones · ${filtered.length} atletas en evento seleccionado</p>
    <div class="search-box">
      <select class="inp" onchange="ST.filterEv=this.value;render()">
        ${allEvents.map(e=>`<option value="${e}" ${ST.filterEv===e?'selected':''}>${e}</option>`).join('')}
      </select>
      ${inFirebase?`<button class="btn btn-b" onclick="sortNominaByEvent('${ST.filterEv}')">⇅ ORDENAR</button>`:''}
      <button class="btn btn-g" onclick="openInscribirModal()" style="padding:8px 16px;font-size:12px">Inscribir atleta</button>
      <button id="btnExportNomina" class="btn btn-b" onclick="exportNominaExcel()" style="padding:8px 16px;font-size:12px">Exportar Excel</button>
    </div>
    ${needsMetaSync?'<div class="card" style="background:rgba(212,168,67,.08);border-color:rgba(212,168,67,.3);padding:12px 16px;margin-bottom:12px"><span style="color:var(--gold);font-size:12px">Las inscripciones están en Firebase pero falta el doc de evento en <code>eventos/</code>. Sin eso no podés editar fecha/cierre/ubicación desde <b>Campeonatos</b>. Creá el evento desde el panel de Campeonatos.</span></div>':''}
    <div class="card" style="padding:0;overflow-x:auto">
      <table class="tbl">
        <tr><th>#</th><th>Nombre</th><th>Sexo</th><th>División</th><th>Cat.</th><th>Modalidad</th><th>Club</th><th title="Comuna / Región">Zona</th><th title="Documentos subidos">Docs</th><th>Estado</th><th></th></tr>
        ${filtered.map((i,idx)=>{
          const editable=!i._json;
          const click=(f)=>editable?`onclick="editInsc('${i.id}','${f}')"`:'';
          const cls=editable?'editable':'';
          const sid=encodeURIComponent(i.id||'');
          // Datos privados (carnet + WADA): solo si la inscripción es de Firebase
          const priv = editable ? (ST.inscripcionesPrivate?.[i.id]||{}) : {};
          // Detectar si tiene perfil en data.json o en atletas_pending
          const rutNormRow=s=>String(s||'').replace(/[^0-9kK]/g,'').toUpperCase();
          const tienePerfilRow=!!(ST.data||[]).find(a=>rutNormRow(a.rut)===rutNormRow(i.rut));
          const sinPerfilBtn=editable&&!tienePerfilRow?`<button onclick="crearPerfilDebutante('${sid}')" style="background:transparent;border:1px solid rgba(212,168,67,.5);color:var(--gold);padding:3px 8px;border-radius:5px;font-size:10px;cursor:pointer;font-family:Oswald;white-space:nowrap" title="Crear perfil de debutante">★ Perfil</button>`:'';
          // Contar docs subidos (mapa nuevo `docs` + URLs legacy)
          const docKeys = ['carnetURL','wadeURL','carnetPhotoURL','consentimientoURL','passportURL','ipfConsentURL','notasURL'];
          let docCount = 0;
          docKeys.forEach(k=>{if(priv[k])docCount++});
          if(priv.docs && typeof priv.docs==='object'){
            // Contar los del map que no estén ya contados via legacy
            const docsMapCount = Object.keys(priv.docs).length;
            docCount = Math.max(docCount, docsMapCount);
          }
          const docsCell = docCount>0
            ? `<button onclick="viewInsDocs('${sid}')" title="Ver todos los documentos subidos" style="display:inline-block;padding:4px 10px;background:rgba(34,197,94,.12);border:1px solid var(--green);color:var(--green);border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;font-family:Oswald">Ver (${docCount})</button>`
            : `<span style="color:var(--muted);font-size:11px;opacity:.5">—</span>`;
          return `<tr>
            <td style="color:var(--muted);font-family:Oswald">${idx+1}</td>
            <td>${esc(i.nombre)}<br><span style="font-size:9px;color:var(--muted)">${esc(i.rut||'')}</span></td>
            <td><span class="${cls}" ${click('sexo')}>${esc(i.sexo||'?')}</span></td>
            <td><span class="${cls}" ${click('division')}>${esc(i.division||'—')}</span></td>
            <td><span class="${cls}" ${click('categoria')}>${esc(i.categoria||'—')}</span></td>
            <td><span class="${cls}" ${click('modalidad')}>${esc(i.modalidad||'—')}</span></td>
            ${(()=>{
              // Si el atleta eligió "Otro" en el formulario, el nombre real del
              // club quedó en clubOtro (p.ej. "Wolf Strength"). Mostrar ese y
              // editar ese campo, no la etiqueta "Otro".
              const isOtro=i.club==='Otro';
              const eclub=isOtro?(i.clubOtro||'Otro'):(i.club||'');
              const fld=isOtro?'clubOtro':'club';
              return `<td><span class="${cls}" ${click(fld)} style="display:inline-flex;align-items:center;gap:5px">${window.clubLogoImg?window.clubLogoImg(eclub,18,'background:var(--bg);padding:1px;'):''}${esc(eclub||'—')}</span></td>`;
            })()}
            <td style="font-size:11px;color:var(--muted);max-width:160px"><span class="${cls}" ${click('comuna')} title="${esc(i.comuna||'')}">${esc(i.comuna||'—')}</span></td>
            <td style="text-align:center">${docsCell}</td>
            <td><span class="badge ${i.status==='approved'?'b-g':i.status==='pending'?'b-y':'b-r'}">${esc(i.status||'approved')}</span></td>
            <td style="white-space:nowrap">${sinPerfilBtn}${editable?`<button onclick="deleteInsc('${sid}')" style="background:transparent;border:1px solid rgba(239,68,68,.3);color:var(--red);padding:3px 8px;border-radius:5px;font-size:10px;cursor:pointer;font-family:Oswald;margin-left:4px" title="Eliminar">✕</button>`:''}</td>
          </tr>`;
        }).join('')}
      </table>

const CRONO_FLIGHTS=['A1','A2','B1','B2','C1','C2','D1','D2','E1','E2','F1','F2'];
const CRONO_TARIMAS=['1','2','3'];
window.cronoPickEvent=function(ev){
  ST.cronoEv=ev; ST.cronoRows=null;

async function cronoSaveDoc(){
  if(!ST.cronoEv)return;
  try{ await setDoc(doc(db,'cronograma',ST.cronoEv),{rows:ST.cronoRows||[],hideCoaches:!!ST.cronoHideCoaches,updatedAt:serverTimestamp()},{merge:true}); }

window.cronoSet=function(i,field,val){
  const r=(ST.cronoRows||[])[i]; if(!r)return;
  if(field==='h1n'){r.handler1={...(r.handler1||{}),nombre:val};}
  else if(field==='h1c'){r.handler1={...(r.handler1||{}),correo:val};}

  else if(field==='h2c'){r.handler2={...(r.handler2||{}),correo:val};}
  else r[field]=val;
  cronoSaveDoc();
  if(field==='tarima'||field==='flight'||field==='jornada')setTimeout(()=>{if(ST.view==='cronograma')render();},50);
};
window.cronoImport=async function(){

  if(!confirm('Importar los atletas de debutantes a este campeonato?\nReemplaza el cronograma actual de este evento.'))return;

// Reglas: cada categoría+división JUNTA en un flight · máx 14 por flight · máx 6 flights por tarima
window.cronoAutoDistribute=async function(){
  const rows=ST.cronoRows||[]; if(!rows.length){showToast('No hay atletas',null,true);return;}
  if(!confirm('Auto-distribuir '+rows.length+' atletas?\nReglas: mujeres y hombres en flights separados · cada categoría+división junta · 8 a 14 por flight · Only Bench puro va aparte y puede pasar de 14 · 6 flights por tarima.'))return;
  const MAXP=14, L3=['A','B','C'];
  // H=hombre, M=mujer (como en la nómina). Si no hay sexo, se infiere de la categoría (IPF).
  const sexOf=r=>{
    const s=String(r.sexo||'').trim().toLowerCase();
    if(s==='h'||/hom|masc|varon/.test(s))return'H';
    if(s==='m'||/muj|fem/.test(s))return'M';
    const c=parseFloat(String(r.categoria||'').replace(/[^0-9.]/g,''));
    const MUJ=[43,47,52,57,63,69,76,84], HOM=[53,59,66,74,83,93,105,120];
    if(MUJ.includes(c))return'M'; if(HOM.includes(c))return'H'; return '?';
  };
  // Only Bench puro = menciona bench/banca y NO es powerlifting. No cuenta para el 14 (va con su categoría).
  const isBench=m=>{m=(m||'').toLowerCase();return (/bench|banca/.test(m))&&!/powerlifting/.test(m);};
  const fullN=g=>g.filter(r=>!isBench(r.modalidad)).length;
  const srank={H:0,M:1,'?':2};
  const groups={};
  rows.forEach(r=>{const k=sexOf(r)+'|'+(r.division||'?')+'|'+(r.categoria||'?');(groups[k]=groups[k]||[]).push(r);});
  const keys=Object.keys(groups).sort((a,b)=>{const A=a.split('|'),B=b.split('|');return (srank[A[0]]-srank[B[0]])||((parseFloat(A[2])||999)-(parseFloat(B[2])||999))||A[1].localeCompare(B[1]);});
  const flights=[]; let cur=[], curFull=0, curSex=null;
  for(const k of keys){
    const sex=k.split('|')[0]; const g=groups[k]; const gf=fullN(g);
    if(gf>MAXP){ if(cur.length){flights.push(cur);cur=[];curFull=0;curSex=null;} for(let i=0;i<g.length;i+=MAXP)flights.push(g.slice(i,i+MAXP)); continue; }
    if(cur.length && (curSex!==sex || curFull+gf>MAXP)){ flights.push(cur); cur=[]; curFull=0; }
    if(!cur.length)curSex=sex;
    cur=cur.concat(g); curFull+=gf;
  }
  if(cur.length)flights.push(cur);
  // Asignar: por tarima 6 flights = 3 AM (A,B,C) + 3 PM (A,B,C)
  flights.forEach((fl,idx)=>{
    const tar=String(Math.floor(idx/6)+1); const pos=idx%6; const jor=pos<3?'AM':'PM'; const let_=L3[pos%3];
    fl.forEach(r=>{r.tarima=tar;r.flight=let_;r.jornada=jor;});
  });
  await cronoSaveDoc();
  const ntar=Math.ceil(flights.length/6);
  showToast(flights.length+' flights · '+ntar+' tarima(s) (3 AM / 3 PM c/u)'); render();
};

function renderCronograma(){
  // Source events from BOTH eventos/ collection and inscripciones, so that
  // events imported to Firebase but without inscripciones still appear.
  const evNames=new Set();
  (ST.eventos||[]).filter(e=>e.status!=='archived').forEach(e=>evNames.add(e.name||e.id));
  ST.inscripciones.forEach(i=>i.evento&&evNames.add(i.evento));
  const events=[...evNames];
  if(!ST.filterEv&&events.length)ST.filterEv=events[0];
  if(events.length&&!events.includes(ST.filterEv))ST.filterEv=events[0];
  const filtered=ST.inscripciones.filter(i=>i.evento===ST.filterEv&&i.status==='approved');
  const flights=['A','B','C','D','E','F'];
  // Find event ID for public cronograma.html link
  const evObj=(ST.eventos||[]).find(e=>e.name===ST.filterEv||e.id===ST.filterEv);
  const publicLinkId=encodeURIComponent(evObj?.id||ST.filterEv||'');
  return `
    <div class="h1">Cronograma — Asignación de vuelos</div>
    <p class="subtitle">Asigna atletas a vuelos · ${filtered.length} aprobados en evento</p>
    <div class="card" style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
      <label style="font-size:11px;color:var(--muted);font-family:Oswald;letter-spacing:1px">CAMPEONATO:</label>
      <select class="inp" onchange="ST.filterEv=this.value;render()" style="min-width:260px;flex:1">
        ${events.length===0?'<option>— Sin campeonatos —</option>':events.map(e=>`<option value="${esc(e)}" ${ST.filterEv===e?'selected':''}>${esc(e)}</option>`).join('')}
      </select>
      ${publicLinkId?`<a href="cronograma.html?evento=${publicLinkId}" target="_blank" class="btn btn-o" style="padding:6px 12px;font-size:11px;text-decoration:none">Abrir vista pública</a>`:''}
    </div>
    <div class="card" style="padding:0;overflow-x:auto">
      <table class="tbl">
        <tr><th>#</th><th>Nombre</th><th>Cat.</th><th>Sexo</th><th>Vuelo asignado</th></tr>
        ${filtered.map((i,idx)=>{const sid=encodeURIComponent(i.id||'');return `<tr>
          <td style="color:var(--muted)">${idx+1}</td>
          <td>${esc(i.nombre)}</td>
          <td><span class="badge b-y">${esc(i.categoria||'?')}</span></td>
          <td>${esc((i.sexo||'?').substring(0,1))}</td>
          <td>${flights.map(f=>`<button onclick="assignFlight('${sid}','${f}')" style="background:${i.flight===f?'var(--accent)':'transparent'};color:${i.flight===f?'#fff':'var(--muted)'};border:1px solid var(--border);padding:4px 9px;border-radius:5px;font-family:Oswald;font-size:11px;font-weight:700;cursor:pointer;margin-right:3px">${f}</button>`).join('')}</td>
        </tr>`;}).join('')}
      </table>
      ${filtered.length===0?'<div class="empty">Sin atletas aprobados en este campeonato</div>':''}
    </div>`;
}

function renderLivecast(){
  // Source events from BOTH eventos/ collection and inscripciones.
  const evMap=new Map();
  (ST.eventos||[]).filter(e=>e.status!=='archived').forEach(e=>{
    const label=e.name||e.id;
    evMap.set(label,{label,id:e.id,name:e.name});

  ST.inscripciones.forEach(i=>{
    if(i.evento&&!evMap.has(i.evento)){
      const m=(ST.eventos||[]).find(e=>e.id===i.evento||e.name===i.evento);
      evMap.set(i.evento,{label:i.evento,id:m?.id||i.evento,name:m?.name||i.evento});

  const events=[...evMap.values()];
  return `

// ── Exportar Nómina del evento seleccionado como Excel filtrable y con estilo ──
// Columnas: Nombre, Modalidad, División, Categoría, Club. Disponible para
// CUALQUIER rol admin (la vista Nóminas no está restringida a owner).
// Estilo (pedido por el owner): negrita + tamaño 12, bordes finos en todas las
// celdas, header azul-gris (#D6DCE4), datos gris claro (#EDEDED), header
// congelado y AutoFilter. Usamos ExcelJS porque SheetJS community NO escribe
// estilos (colores/bordes/negrita).
window.exportNominaExcel = async function(){
  const btn=document.getElementById('btnExportNomina');
  const ev=ST.filterEv;
  if(!ev){ showToast('Selecciona un campeonato primero',null,true); return; }
  if(btn){ btn.textContent='Generando...'; btn.disabled=true; }
  try{
    if(!window.ExcelJS){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js';
        s.onload=res; s.onerror=rej; document.head.appendChild(s);
      });
    }
    const ExcelJS=window.ExcelJS;
    // Mismos datos que muestra la nómina del evento seleccionado.
    let list=(ST.inscripciones||[]).filter(i=>i.evento===ev&&i.status!=='rejected');
    list.sort((a,b)=>(a.sortOrder||999)-(b.sortOrder||999));

    const wb=new ExcelJS.Workbook();
    const ws=wb.addWorksheet('Nómina',{views:[{state:'frozen',ySplit:1}]});
    ws.columns=[
      {header:'NOMBRE',    key:'nombre',    width:34.8},
      {header:'MODALIDAD', key:'modalidad', width:34.5},
      {header:'DIVISIÓN',  key:'division',  width:16.8},
      {header:'CATEGORÍA', key:'categoria', width:12.8},
      {header:'CLUB',      key:'club',      width:26.8}
    ];
    list.forEach(i=>{
      // Si eligió "Otro", el nombre real del club está en clubOtro.
      const club=i.club==='Otro'?(i.clubOtro||'Otro'):(i.club||'');
      ws.addRow({nombre:i.nombre||'',modalidad:i.modalidad||'',division:i.division||'',categoria:i.categoria||'',club});
    });

    const thin={style:'thin',color:{argb:'FF000000'}};
    const allBorders={top:thin,left:thin,bottom:thin,right:thin};
    const headerFill={type:'pattern',pattern:'solid',fgColor:{argb:'FFD6DCE4'}};
    const dataFill  ={type:'pattern',pattern:'solid',fgColor:{argb:'FFEDEDED'}};
    ws.eachRow({includeEmpty:false},(row,rn)=>{
      row.eachCell({includeEmpty:true},cell=>{
        cell.font={name:'Calibri',size:12,bold:true,color:{argb:'FF000000'}};
        cell.border=allBorders;
        cell.fill=(rn===1)?headerFill:dataFill;
        cell.alignment={vertical:'middle'};
      });
    });
    ws.autoFilter='A1:E'+ws.rowCount;   // filtros en todas las columnas

    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const safe=String(ev).replace(/[^a-zA-Z0-9 _-]/g,'').slice(0,60).trim()||'evento';
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download=`Nomina_${safe}.xlsx`;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1000);
    showToast(`Excel exportado: ${list.length} atletas`);
  }catch(e){ console.error(e); showToast('Error al exportar: '+e.message,null,true); }
  finally{ if(btn){ btn.textContent='Exportar Excel'; btn.disabled=false; } }
};

// ── Exportar data.json como Excel ─────────────────────────────────────────────
window.exportDataExcel = async function(){
  const btn = document.getElementById('btnExportExcel');
  if(btn){ btn.textContent='⏳ Generando Excel...'; btn.disabled=true; }
  try{
    // Load SheetJS dynamically
    if(!window.XLSX){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
        s.onload=res; s.onerror=rej;
        document.head.appendChild(s);
      });
    }
    const XLSX=window.XLSX;
    const data=ST.data||[];
    const wb=XLSX.utils.book_new();

    // ── Hoja 1: Base de Atletas ───────────────────────────────────────────────
    const athRows=[['CÓDIGO','RUT','NOMBRE COMPLETO','FECHA NAC.','CLUB','AÑO DEBUT',
      'MEJOR SQ','MEJOR BP','MEJOR DL','TOTAL','GLP','DOTS','Nº COMPETENCIAS']];
    [...data].sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||'')).forEach(a=>{
      const bl=a.bestLifts||{};
      athRows.push([a.codigo||'',a.rut||'',a.nombre||'',a.fechaNac||'',a.club||'',a.debut||'',
        bl.sq||'',bl.bp||'',bl.dl||'',bl.total||'',bl.glp||'',bl.dots||'',
        (a.competencias||[]).length]);
    });
    const wsAth=XLSX.utils.aoa_to_sheet(athRows);
    wsAth['!cols']=[{wch:16},{wch:13},{wch:32},{wch:12},{wch:24},{wch:11},{wch:10},{wch:10},{wch:10},{wch:8},{wch:8},{wch:8},{wch:14}];
    XLSX.utils.book_append_sheet(wb,wsAth,'Base Atletas');

    // ── Hoja 2: Histórico Competencias ────────────────────────────────────────
    const histRows=[['NOMBRE','RUT','CLUB','EVENTO','AÑO','FECHA','LUGAR','SEXO','CATEGORÍA','DIVISIÓN','MODALIDAD','BW','SQ','BP','DL','TOTAL','GLP','FUENTE']];
    data.forEach(a=>{
      (a.competencias||[]).forEach(c=>{
        const r=c.resultado||{};
        histRows.push([a.nombre||'',a.rut||'',a.club||'',
          c.evento||'',c.año||'',c.fecha||'',c.lugar||'',
          c.sexo||'',c.categoria||'',c.division||'',c.modalidad||'',
          r.bw||'',r.sq||'',r.bp||'',r.dl||'',r.total||'',r.glp||'',
          c.source||'']);
      });
    });
    const wsHist=XLSX.utils.aoa_to_sheet(histRows);
    wsHist['!cols']=[{wch:30},{wch:13},{wch:22},{wch:52},{wch:6},{wch:12},{wch:22},{wch:7},{wch:10},{wch:14},{wch:12},{wch:7},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:16}];
    XLSX.utils.book_append_sheet(wb,wsHist,'Histórico');

    // ── Hoja 3: Resumen por Evento ────────────────────────────────────────────
    const evMap={};
    data.forEach(a=>(a.competencias||[]).forEach(c=>{
      const k=c.evento||'Sin nombre';
      if(!evMap[k])evMap[k]={año:c.año,count:0};
      evMap[k].count++;
    }));
    const evRows=[['EVENTO','AÑO','N° PARTICIPACIONES']];
    Object.entries(evMap).sort((a,b)=>(a[1].año||0)-(b[1].año||0))
      .forEach(([ev,v])=>evRows.push([ev,v.año||'',v.count]));
    const wsEv=XLSX.utils.aoa_to_sheet(evRows);
    wsEv['!cols']=[{wch:55},{wch:6},{wch:18}];
    XLSX.utils.book_append_sheet(wb,wsEv,'Eventos');

    // ── Hoja 4: Records por Categoría ─────────────────────────────────────────
    const recMap={};
    data.forEach(a=>{
      (a.competencias||[]).forEach(c=>{
        const r=c.resultado||{};
        if(!r.total||r.total<=0)return;
        const key=`${c.sexo}||${c.categoria}||${c.modalidad}`;
        if(!recMap[key]||r.total>recMap[key].total)
          recMap[key]={sexo:c.sexo,cat:c.categoria,mod:c.modalidad,nombre:a.nombre,club:a.club,
            sq:r.sq||0,bp:r.bp||0,dl:r.dl||0,total:r.total,bw:r.bw||0,glp:r.glp||0,evento:c.evento,fecha:c.fecha};
      });
    });
    const recRows=[['SEXO','CATEGORÍA','MODALIDAD','ATLETA','CLUB','SQ','BP','DL','TOTAL','BW','GLP','EVENTO','FECHA']];
    Object.values(recMap).sort((a,b)=>(a.sexo||'').localeCompare(b.sexo||'')||(parseFloat(a.cat)||999)-(parseFloat(b.cat)||999))
      .forEach(r=>recRows.push([r.sexo,r.cat,r.mod,r.nombre,r.club,r.sq||'',r.bp||'',r.dl||'',r.total,r.bw||'',r.glp||'',r.evento,r.fecha||'']));
    const wsRec=XLSX.utils.aoa_to_sheet(recRows);
    wsRec['!cols']=[{wch:8},{wch:10},{wch:20},{wch:30},{wch:22},{wch:7},{wch:7},{wch:7},{wch:8},{wch:7},{wch:7},{wch:52},{wch:12}];
    XLSX.utils.book_append_sheet(wb,wsRec,'Records por Categoría');

    // ── Descargar ─────────────────────────────────────────────────────────────
    const today=new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb,`FECHIPO_base_datos_${today}.xlsx`);
  }catch(e){
    alert('Error generando Excel: '+e.message);
    console.error(e);
  }finally{
    if(btn){ btn.textContent=`Descargar data.json como Excel (${ST.data.length} atletas)`; btn.disabled=false; }
  }
};

    <p class="subtitle">${isNew?'Se publicará inmediatamente en inscripciones y nómina':'Cambios se propagan en tiempo real a todos los archivos'}</p>
    <div class="card" style="max-width:680px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <label class="field" style="grid-column:span 2">
          <span>Nombre del campeonato</span>
          <input class="inp" id="ef_name" value="${editing.name||''}" placeholder="ej: Campeonato Regional Centro 2027">
        </label>
        <label class="field">
          <span>ID (slug único, sin espacios)</span>
          <input class="inp" id="ef_id" value="${editing.id||''}" placeholder="ej: regional_centro_2027" ${!isNew?'disabled style="opacity:.5"':''}>
          ${!isNew?'<span style="font-size:10px;color:var(--muted)">El ID no se puede cambiar</span>':''}
        </label>
        <label class="field">
          <span>Estado</span>
          <select class="inp" id="ef_status">
            ${['open','closed','draft','archived'].map(s=>`<option value="${s}" ${(editing.status||'open')===s?'selected':''}>${STATUS_LABELS[s]}</option>`).join('')}
          </select>
        </label>
        <label class="field">
          <span>Fecha de competencia</span>
          <input class="inp" type="date" id="ef_date" value="${editing.date||''}">
        </label>
        <label class="field">
          <span>Cierre PRE-NÓMINA (inscripciones)</span>
          <input class="inp" type="datetime-local" id="ef_preNominaCloseAt" value="${editing.preNominaCloseAt||''}" title="Fecha y hora límite para inscribirse al evento">
          <span style="font-size:10px;color:var(--muted);margin-top:2px">Después de esta fecha NO se aceptan nuevas inscripciones</span>
        </label>
        <label class="field">
          <span>Cierre NÓMINA (cambios)</span>
          <input class="inp" type="datetime-local" id="ef_nominaCloseAt" value="${editing.nominaCloseAt||editing.closeDate||''}" title="Fecha y hora límite para cambios de categoría o bajas">
          <span style="font-size:10px;color:var(--muted);margin-top:2px">Después: no se permiten cambios de cat ni bajas</span>
        </label>
        <label class="field">
          <span>Ubicación</span>
          <input class="inp" id="ef_location" value="${editing.location||''}" placeholder="ej: Santiago, RM">
        </label>
        <label class="field" style="grid-column:span 2">
          <span>Logo del campeonato <span style="font-weight:400;color:var(--muted)">(opcional · se sube una imagen)</span></span>
          <div style="display:flex;align-items:center;gap:12px;margin-top:4px;flex-wrap:wrap">
            <div style="width:64px;height:64px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0">
              <img id="ef_logoPreview" src="${editing.logoUrl||''}" style="max-width:100%;max-height:100%;object-fit:contain;${editing.logoUrl?'':'display:none'}" onerror="this.style.display='none'">
            </div>
            <input type="hidden" id="ef_logoUrl" value="${editing.logoUrl||''}">
            <input type="file" id="ef_logoFile" accept="image/*" style="display:none" onchange="uploadEventLogo(this.files[0])">
            <button type="button" class="btn" onclick="document.getElementById('ef_logoFile').click()" style="background:rgba(59,130,246,.15);border:1px solid #3b82f6;color:#3b82f6">Subir logo</button>
            <button type="button" class="btn" onclick="document.getElementById('ef_logoUrl').value='';var p=document.getElementById('ef_logoPreview');p.src='';p.style.display='none'" style="background:transparent;border:1px solid var(--border);color:var(--muted)">Quitar</button>
            <span id="ef_logoStatus" style="font-size:11px;color:var(--muted)"></span>
          </div>
        </label>
        <label class="field" style="grid-column:span 2">
          <span>Organizadores <span style="font-weight:400;color:var(--muted)">(podés agregar más de uno · cada uno con su Instagram opcional)</span></span>
          <div id="ef_organizers" style="display:flex;flex-direction:column;gap:6px;margin-top:4px">${(()=>{
            let orgs = (Array.isArray(editing.organizers)&&editing.organizers.length)
              ? editing.organizers
              : [{name:(editing.org||editing.organizer||''), instagram:(editing.instagram||'')}];
            return orgs.map(o=>orgRowHtml(o.name,o.instagram)).join('');
          })()}</div>
          <button type="button" class="btn" onclick="addOrganizerRow()" style="background:transparent;border:1px dashed var(--border);color:var(--muted);margin-top:6px;align-self:flex-start">+ Agregar organizador</button>
        </label>
        <label class="field">
          <span>Días (texto visible)</span>
          <input class="inp" id="ef_days" value="${editing.days||''}" placeholder="ej: 09 y 10 de Mayo">
        </label>
        <label class="field">
          <span>Columna extra en nómina</span>
          <select class="inp" id="ef_extra">
            <option value="modalidad" ${!(editing.extraCols||[]).includes('universidad')?'selected':''}>Modalidad</option>
            <option value="universidad" ${(editing.extraCols||[]).includes('universidad')?'selected':''}>Universidad</option>
          </select>
        </label>
        <label class="field" style="grid-column:span 2;display:flex;flex-direction:row;align-items:center;gap:10px;padding:10px 12px;background:rgba(212,168,67,.05);border:1px solid rgba(212,168,67,.3);border-radius:8px">
          <input type="checkbox" id="ef_recordsEnabled" ${(editing.recordsEnabled!==false)?'checked':''} style="width:18px;height:18px;cursor:pointer">
          <div>
            <div style="font-weight:600;color:var(--text)">Detectar récords nacionales</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">Si está activo, en cada good lift se compara contra <code>records.json</code> y se muestra alerta + badge giratorio en OBS. <b>Desactivá para Universitario u otros torneos sin récords oficiales.</b></div>
          </div>
        </label>
        <label class="field" style="grid-column:span 2;display:flex;flex-direction:row;align-items:center;gap:10px;padding:10px 12px;background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.3);border-radius:8px">
          <input type="checkbox" id="ef_cronogramaPublic" ${(editing.cronogramaPublic!==false)?'checked':''} style="width:18px;height:18px;cursor:pointer">
          <div>
            <div style="font-weight:600;color:var(--text)">Mostrar en cronograma público</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">Si está activo, el evento aparece en <code>cronograma.html</code>. <b>Desactivá para ocultarlo (ej. mientras armás los vuelos del Debutantes).</b></div>
          </div>
        </label>
        <label class="field" style="grid-column:span 2;display:flex;flex-direction:row;align-items:center;gap:10px;padding:10px 12px;background:rgba(168,85,247,.06);border:1px solid rgba(168,85,247,.3);border-radius:8px">
          <input type="checkbox" id="ef_requiereFoto" ${(editing.requiereFoto===true)?'checked':''} style="width:18px;height:18px;cursor:pointer">
          <div>
            <div style="font-weight:600;color:var(--text)">Requerir foto tipo carnet en inscripción</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">Si está activo, el atleta debe subir una foto de rostro al inscribirse. Esa foto luego se procesa con fondo blanco IPF en <b>Fotos Atletas</b> para usarla en perfiles y transmisión.</div>
          </div>
        </label>
        <label class="field" style="grid-column:span 2;display:flex;flex-direction:row;align-items:center;gap:10px;padding:10px 12px;background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.3);border-radius:8px">
          <input type="checkbox" id="ef_livecastVisible" ${(editing.livecastVisible!==false)?'checked':''} style="width:18px;height:18px;cursor:pointer">
          <div>
            <div style="font-weight:600;color:var(--text)">Visible en LiveCast</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">Si está activo, el campeonato aparece en el selector de eventos de <b>livecast.html</b>. <b>Desactivá para ocultarlo del LiveCast</b> (ej. campeonatos ya terminados que no querés mostrar).</div>
          </div>
        </label>

        <!-- Sección NUEVA: Documentos requeridos en inscripción ──────────────────── -->
        <div class="field" style="grid-column:span 2">
          <div style="background:rgba(212,168,67,.06);border:1px solid rgba(212,168,67,.35);border-radius:10px;padding:14px 16px">
            <div style="font-weight:600;color:var(--gold);margin-bottom:6px">Documentos requeridos en inscripción</div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.5">
              Marcá qué documentos pedir al atleta cuando se inscriba. Si dejás todo desmarcado, se usa la <b>lógica vieja</b> (carnet + WADA por default, IPF World detección por nombre, consentimiento menor si fechaNac &lt; 18, foto si "requiere foto" está activo arriba).
            </div>
            <div id="ef_docs_container" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${(()=>{
              const DOC_TYPES = {
                carnetIdFront: { label:'Carnet de Identidad', icon:'', desc:'Cara frontal del carnet' },
                fotoBlanco:    { label:'Foto fondo blanco',  icon:'', desc:'Tipo carnet, sin accesorios' },
                pasaporte:     { label:'Pasaporte',          icon:'', desc:'Página de datos' },
                wadaIntl:      { label:'ADEL/WADA Internacional', icon:'', desc:'Vigente' },
                ipfConsent:    { label:'Consentimiento IPF', icon:'', desc:'Firmado · PDF descargable' },
                menorConsent:  { label:'Consentimiento Menor', icon:'', desc:'Tutor firma · PDF descargable' },
                notas:         { label:'Concentración de Notas', icon:'', desc:'Certificado académico' }
              };
              const current = Array.isArray(editing.requiredDocs) ? editing.requiredDocs : [];
              return Object.entries(DOC_TYPES).map(([k,meta])=>{
                const checked = current.includes(k);
                return `<label style="display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:${checked?'rgba(34,197,94,.08)':'transparent'};border:1px solid ${checked?'rgba(34,197,94,.4)':'var(--border)'};border-radius:6px;cursor:pointer;transition:all .15s">
                  <input type="checkbox" data-doc-key="${k}" ${checked?'checked':''} onchange="this.parentElement.style.background=this.checked?'rgba(34,197,94,.08)':'transparent';this.parentElement.style.borderColor=this.checked?'rgba(34,197,94,.4)':'var(--border)'" style="width:16px;height:16px;cursor:pointer;margin-top:2px;flex-shrink:0">
                  <div style="flex:1;min-width:0">
                    <div style="font-weight:600;font-size:13px;color:var(--text)">${meta.icon} ${meta.label}</div>
                    <div style="font-size:10px;color:var(--muted);margin-top:1px">${meta.desc}</div>
                  </div>
                </label>`;
              }).join('');
            })()}</div>
          </div>
        </div>
        <!-- ──────────────────────────────────────────────────────────────────────── -->
        <label class="field" style="grid-column:span 2">
          <span>▶ URL YouTube en vivo <span style="font-weight:400;color:var(--muted)">(opcional)</span></span>
          <input class="inp" id="ef_youtubeUrl" value="${editing.youtubeUrl||''}" placeholder="ej: https://www.youtube.com/live/abc123xyz">
          <span style="font-size:10px;color:var(--muted);margin-top:2px">Cuando hay URL, se muestra un reproductor embebido en el livecast público y en la página principal — las visitas desde YourLift se suman al contador de YouTube.</span>
        </label>
        <div style="grid-column:span 2;border-top:1px solid var(--border);padding-top:12px;margin-top:2px">
          <div style="font-family:Oswald;font-size:12px;letter-spacing:1px;color:var(--gold);margin-bottom:8px">EXTRAS DE TRANSMISIÓN <span style="font-weight:400;color:var(--muted);letter-spacing:0">(se muestran en la tarjeta de Transmisiones del sitio)</span></div>
          <div style="display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start">
            <div>
              <span style="font-size:11px;color:var(--muted)">Logo en la transmisión (productora)</span>
              <div style="display:flex;gap:8px;align-items:center;margin-top:4px">
                <div style="width:64px;height:64px;border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;background:#0a1628;overflow:hidden">
                  <img id="ef_streamLogoPreview" src="${editing.streamLogoUrl||''}" style="max-width:100%;max-height:100%;object-fit:contain;${editing.streamLogoUrl?'':'display:none'}" onerror="this.style.display='none'">
                </div>
                <input type="hidden" id="ef_streamLogoUrl" value="${editing.streamLogoUrl||''}">
                <input type="file" id="ef_streamLogoFile" accept="image/*" style="display:none" onchange="uploadStreamLogo(this.files[0])">
                <div style="display:flex;flex-direction:column;gap:4px">
                  <button type="button" class="btn" onclick="document.getElementById('ef_streamLogoFile').click()">Subir logo</button>
                  <button type="button" class="btn" onclick="document.getElementById('ef_streamLogoUrl').value='';var p=document.getElementById('ef_streamLogoPreview');p.src='';p.style.display='none'" style="background:transparent;border:1px solid var(--border);color:var(--muted)">Quitar</button>
                  <span id="ef_streamLogoStatus" style="font-size:10px;color:var(--muted)"></span>
                </div>
              </div>
            </div>
            <label class="field" style="flex:1;min-width:200px">
              <span>Instagram de la transmisión</span>
              <input class="inp" id="ef_streamIg" value="${editing.streamInstagram||''}" placeholder="@productora">
            </label>
          </div>
        </div>
      </div>
      ${!isNew?`<div style="margin-top:14px;padding:10px 14px;background:rgba(30,58,95,.3);border-radius:8px;font-size:12px;color:var(--muted)">
        <span style="color:var(--text)">Estado actual:</span>
        ${inscCount} inscripciones · ${ST.inscripciones.filter(i=>i.evento===editing.id&&i.status==='approved').length} aprobadas
      </div>`:''}
      <div style="display:flex;gap:10px;margin-top:18px;flex-wrap:wrap">
        <button class="btn btn-g" onclick="saveEvento()">${isNew?'Crear campeonato':'Guardar cambios'}</button>
        <button class="btn" style="background:transparent;border:1px solid var(--border);color:var(--muted)" onclick="ST.eventoForm=null;render()">Cancelar</button>
        ${!isNew&&editing.status!=='closed'?`<button class="btn btn-r" onclick="closeNomina('${editing.id}')" style="margin-left:auto">Cerrar nómina ahora</button>`:''}
        ${!isNew&&editing.status!=='archived'?`<button class="btn" style="background:transparent;border:1px solid var(--muted);color:var(--muted);margin-left:${editing.status==='closed'?'auto':'0'}" onclick="archiveEvento('${editing.id}')">Archivar</button>`:''}
      </div>
    </div>`;
  }

  return `
  <div class="h1">Campeonatos</div>
  <p class="subtitle">Gestiona los campeonatos — los cambios se propagan en tiempo real a inscripciones, nómina y cronograma</p>
  <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
    <button class="btn btn-g" onclick="newEvento()">+ Nuevo campeonato</button>
  </div>
  <div style="display:grid;gap:12px">
    ${!evs.length?'<div class="card" style="text-align:center;padding:40px;color:var(--muted)">No hay campeonatos. Crea el primero.</div>':''}
    ${evs.map(ev=>{
      const insc = ST.inscripciones.filter(i=>i.evento===ev.id);
      const approved = insc.filter(i=>i.status==='approved').length;
      const pending  = insc.filter(i=>i.status==='pending').length;
      const today = new Date().toISOString().slice(0,10);
      const autoClose = ev.closeDate && ev.closeDate < today && ev.status==='open';
      return `<div class="card" style="border-left:4px solid ${STATUS_COLORS[ev.status]||'var(--border)'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
          <div style="flex:1;min-width:200px">
            <div style="font-family:Oswald;font-size:16px;font-weight:700">${ev.name}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:3px">${ev.location||'—'} · ${ev.days||ev.date||'—'} · ${ev.org||'—'}</div>
            <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center">
              <span style="font-size:11px;font-weight:700;color:${STATUS_COLORS[ev.status]||'var(--muted)'}">${STATUS_LABELS[ev.status]||ev.status}</span>
              ${autoClose?'<span style="font-size:10px;background:rgba(239,68,68,.15);color:var(--red);padding:2px 8px;border-radius:4px">Nómina vencida — cierra automáticamente</span>':''}
            </div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <div style="text-align:center;min-width:44px">
              <div style="font-family:Oswald;font-size:20px;font-weight:700;color:var(--green)">${approved}</div>
              <div style="font-size:9px;color:var(--muted)">Aprobados</div>
            </div>
            <div style="text-align:center;min-width:44px">
              <div style="font-family:Oswald;font-size:20px;font-weight:700;color:var(--gold)">${pending}</div>
              <div style="font-size:9px;color:var(--muted)">Pendientes</div>
            </div>
            <div style="text-align:center;min-width:44px">
              <div style="font-family:Oswald;font-size:20px;font-weight:700">${insc.length}</div>
              <div style="font-size:9px;color:var(--muted)">Total</div>
            </div>
            <button class="btn btn-b" onclick="editEvento('${ev.id}')" style="padding:6px 14px;font-size:11px">Editar</button>
            ${ev.status==='open'?`<button class="btn btn-r" onclick="closeNomina('${ev.id}')" style="padding:6px 14px;font-size:11px">Cerrar nómina</button>`:''}
          </div>
        </div>
        <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center">
          <a href="inscripcion.html" target="_blank" style="font-size:10px;color:var(--blue);text-decoration:none;padding:3px 8px;border:1px solid rgba(59,130,246,.3);border-radius:4px">Formulario público</a>
          <a href="cronograma.html?evento=${encodeURIComponent(ev.id)}" target="_blank" style="font-size:10px;color:var(--muted);text-decoration:none;padding:3px 8px;border:1px solid var(--border);border-radius:4px">Cronograma</a>
          <a href="livecast.html?evento=${encodeURIComponent(ev.id)}" target="_blank" style="font-size:10px;color:var(--muted);text-decoration:none;padding:3px 8px;border:1px solid var(--border);border-radius:4px">LiveCast (operador)</a>
          <button onclick="copyPublicLink('${ev.id}',this)" style="font-size:10px;color:var(--gold);background:transparent;text-decoration:none;padding:3px 8px;border:1px solid rgba(212,168,67,.4);border-radius:4px;cursor:pointer;font-family:inherit">Link público en vivo</button>
          <button onclick="toggleLivecastVisible('${ev.id}',${ev.livecastVisible!==false})" style="font-size:10px;padding:3px 10px;border-radius:4px;border:1px solid ${ev.livecastVisible!==false?'rgba(34,197,94,.4)':'rgba(239,68,68,.4)'};background:${ev.livecastVisible!==false?'rgba(34,197,94,.08)':'rgba(239,68,68,.08)'};color:${ev.livecastVisible!==false?'var(--green)':'var(--red)'};cursor:pointer;font-family:inherit;font-weight:700" title="Visible en el selector de eventos del LiveCast">${ev.livecastVisible!==false?'LiveCast: ON':'LiveCast: OFF'}</button>
          <button onclick="deleteEvento('${ev.id}','${escapeHtml(ev.name).replace(/'/g,"\\'")}',this)" style="font-size:10px;padding:3px 10px;border-radius:4px;border:1px solid rgba(239,68,68,.4);background:rgba(239,68,68,.06);color:var(--red);cursor:pointer;font-family:inherit;font-weight:700;margin-left:auto" title="Eliminar campeonato">Eliminar</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ── CRUD helpers ────────────────────────────────────────────
window.newEvento = function(){
  ST.eventoForm = {id:'',name:'',date:'',closeDate:'',preNominaCloseAt:'',nominaCloseAt:'',location:'',org:'',days:'',status:'open',extraCols:['modalidad'],recordsEnabled:true,cronogramaPublic:true,requiereFoto:false,livecastVisible:true,youtubeUrl:''};
  ST.eventoFormMode = 'create';
  render();
};

window.editEvento = function(id){
  const ev = ST.eventos.find(e=>e.id===id);
  if(!ev)return;
  ST.eventoForm = {...ev};
  ST.eventoFormMode = 'edit';
  render();
};

// ─── Catálogo de tipos de documento (espejo de inscripcion.html) ───
window.DOC_TYPES_CATALOG = {
  carnetIdFront: { label: 'Carnet de Identidad', icon: '', desc: 'Cara frontal del carnet' },
  fotoBlanco:    { label: 'Foto fondo blanco',  icon: '', desc: 'Tipo carnet, sin accesorios' },
  pasaporte:     { label: 'Pasaporte',          icon: '', desc: 'Página de datos' },
  wadaIntl:      { label: 'ADEL/WADA Internacional', icon: '', desc: 'Vigente' },
  ipfConsent:    { label: 'Consentimiento IPF', icon: '', desc: 'Firmado · PDF descargable' },
  menorConsent:  { label: 'Consentimiento Menor', icon: '', desc: 'Tutor firma · PDF descargable' },
  notas:         { label: 'Concentración de Notas', icon: '', desc: 'Certificado académico' }
};

// Renderiza el container de checkboxes de docs cuando el form de evento está visible
window.renderDocsChecklist = function(){
  const cont = document.getElementById('ef_docs_container');
  if(!cont || !ST.eventoForm) return;
  const current = Array.isArray(ST.eventoForm.requiredDocs) ? ST.eventoForm.requiredDocs : [];
  let h = '';
  Object.entries(window.DOC_TYPES_CATALOG).forEach(([k, meta])=>{
    const checked = current.includes(k);
    h += `<label style="display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:${checked?'rgba(34,197,94,.08)':'transparent'};border:1px solid ${checked?'rgba(34,197,94,.4)':'var(--border)'};border-radius:6px;cursor:pointer;transition:all .15s">
      <input type="checkbox" data-doc-key="${k}" ${checked?'checked':''} onchange="this.parentElement.style.background=this.checked?'rgba(34,197,94,.08)':'transparent';this.parentElement.style.borderColor=this.checked?'rgba(34,197,94,.4)':'var(--border)'" style="width:16px;height:16px;cursor:pointer;margin-top:2px;flex-shrink:0">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13px;color:var(--text)">${meta.icon} ${meta.label}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:1px">${meta.desc}</div>
      </div>
    </label>`;
  });
  cont.innerHTML = h;
};
// Hook a render: cada vez que se renderiza el form, dibuja los checkboxes después

window.uploadEventLogo = async function(file){
  if(!file)return;
  const st=document.getElementById('ef_logoStatus'); if(st)st.textContent='⏳ Subiendo…';
  try{
    const storage=getStorage(app);
    const baseId=(document.getElementById('ef_id')?.value||ST.eventoForm?.id||'event').replace(/[^a-zA-Z0-9_]/g,'_').slice(0,50);
    const dot=file.name.lastIndexOf('.'); const ext=(dot>=0?file.name.slice(dot+1):'png').toLowerCase().replace(/[^a-z0-9]/g,'')||'png';
    const sref=storageRef(storage,`logos/event/${baseId}_${Date.now()}.${ext}`);
    await uploadBytes(sref,file,{contentType:file.type||'image/png'});
    const url=await getDownloadURL(sref);
    document.getElementById('ef_logoUrl').value=url;
    const pv=document.getElementById('ef_logoPreview'); if(pv){pv.src=url;pv.style.display='';}
    if(st)st.textContent='✓ Logo subido';
  }catch(e){ if(st)st.textContent=''+e.message; console.warn('[logo]',e); }
};

window.saveEvento = async function(){
  const isNew = ST.eventoFormMode === 'create';
  const id  = isNew ? (document.getElementById('ef_id').value||'').trim().replace(/\s+/g,'_') : ST.eventoForm.id;
  const name = (document.getElementById('ef_name').value||'').trim();
  const status = document.getElementById('ef_status').value;
  const date   = document.getElementById('ef_date').value;
  // Nuevos campos: cierre de pre-nómina (inscripciones) + cierre de nómina (cambios)
  const preNominaCloseAt = document.getElementById('ef_preNominaCloseAt')?.value || '';
  const nominaCloseAt = document.getElementById('ef_nominaCloseAt')?.value || '';
  // Compat: closeDate es la fecha (sin hora) del cierre de nómina, para mantener
  // funcionando el auto-close existente que solo lee fechas.
  const closeDate = nominaCloseAt ? nominaCloseAt.slice(0,10) : '';
  const location  = document.getElementById('ef_location').value.trim();
  // Organizadores: lista (cada uno con su IG). org = nombres unidos (compat).
  const organizers = Array.from(document.querySelectorAll('#ef_organizers .org-row')).map(r=>({
    name:(r.querySelector('.org-name')?.value||'').trim(),
    instagram:(r.querySelector('.org-ig')?.value||'').trim().replace(/^@/,'')
  })).filter(o=>o.name);
  const org       = organizers.map(o=>o.name).join(' · ');
  const days      = document.getElementById('ef_days').value.trim();
  const extra     = document.getElementById('ef_extra').value;
  const recordsEnabled = document.getElementById('ef_recordsEnabled').checked;
  const cronogramaPublic = document.getElementById('ef_cronogramaPublic')?.checked !== false;
  const requiereFoto = !!document.getElementById('ef_requiereFoto')?.checked;
  const livecastVisible = document.getElementById('ef_livecastVisible')?.checked !== false;
  const youtubeUrl = (document.getElementById('ef_youtubeUrl')?.value||'').trim();
  const logoUrl = (document.getElementById('ef_logoUrl')?.value||'').trim();
  const instagram = organizers[0]?.instagram || '';   // compat: IG del primer organizador
  const streamLogoUrl = (document.getElementById('ef_streamLogoUrl')?.value||'').trim();
  const streamInstagram = (document.getElementById('ef_streamIg')?.value||'').trim().replace(/^@/,'');
  // NUEVO: leer los checkboxes de documentos requeridos
  const requiredDocs = Array.from(document.querySelectorAll('#ef_docs_container input[type="checkbox"]:checked'))
    .map(cb => cb.getAttribute('data-doc-key'));

  if(!id || !name){ showToast('ID y nombre son obligatorios', null, true); return; }
  if(isNew && ST.eventos.find(e=>e.id===id)){ showToast('Ya existe un campeonato con ese ID', null, true); return; }

  const data = {id, name, date, closeDate, preNominaCloseAt, nominaCloseAt, location, org, days, status,
    extraCols: [extra], recordsEnabled, cronogramaPublic, requiereFoto, livecastVisible, youtubeUrl,
    organizers, logoUrl, instagram,    // organizadores (con IG) + logo del campeonato (se muestran en el home)
    streamLogoUrl, streamInstagram,    // logo de productora + IG para la tarjeta de Transmisiones
    requiredDocs,    // nuevo: array de docKeys requeridos
    updatedAt: serverTimestamp()};
  if(isNew) data.createdAt = serverTimestamp();

  try{
    await setDoc(doc(db,'eventos',id), data, {merge:true});
    await logAction(isNew?'create_evento':'update_evento', id, null, name);
    showToast(isNew?'Campeonato creado — ya visible en inscripciones y nómina':'Cambios guardados');
    ST.eventoForm = null;
    render();
  }catch(e){ showToast('Error: '+e.message, null, true); console.error(e); }
};

window.copyPublicLink = function(id, btn){
  const base = location.origin + location.pathname.replace(/[^/]+$/, '');
  const url = base + 'livecast.html?evento=' + encodeURIComponent(id);
  const ok = ()=>{
    if(btn){
      const t=btn.textContent;
      btn.textContent='✓ Copiado — pegalo en WhatsApp';
      btn.style.color='var(--green)';
      btn.style.borderColor='var(--green)';
      setTimeout(()=>{btn.textContent=t;btn.style.color='var(--gold)';btn.style.borderColor='rgba(212,168,67,.4)'},2200);
    }
  };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(ok).catch(()=>prompt('Copia este link:',url));
  } else {
    prompt('Copia este link:',url);
  }
};

window.closeNomina = async function(id){
  const ev = ST.eventos.find(e=>e.id===id);
  if(!ev) return;
  const insc = ST.inscripciones.filter(i=>i.evento===id);
  const pending = insc.filter(i=>i.status==='pending').length;
  const msg = pending > 0
    ? `Hay ${pending} inscripción${pending!==1?'es':''} pendiente${pending!==1?'s':''}. Al cerrar la nómina quedarán como rechazadas.\n\n¿Cerrar igualmente?`
    : `¿Cerrar la nómina de "${ev.name}"?\nNo se aceptarán nuevas inscripciones.`;
  if(!confirm(msg)) return;
  try{
    await setDoc(doc(db,'eventos',id),{status:'closed',closedAt:serverTimestamp()},{merge:true});
    if(pending > 0){
      await Promise.all(insc.filter(i=>i.status==='pending').map(i=>
        updateDoc(doc(db,'inscripciones',i.id),{status:'rejected'})
      ));
    }
    await logAction('close_nomina', id, 'open', 'closed');
    showToast('Nómina cerrada — '+ev.name);
    ST.eventoForm = null;
    render();
  }catch(e){ showToast('Error: '+e.message, null, true); }
};

window.archiveEvento = async function(id){
  if(!confirm('¿Archivar este campeonato? Seguirá visible en el historial pero no en inscripciones.')) return;
  try{
    await setDoc(doc(db,'eventos',id),{status:'archived',updatedAt:serverTimestamp()},{merge:true});
    await logAction('archive_evento', id, null, 'archived');
    showToast('Campeonato archivado');
    ST.eventoForm = null;

};

// Auto-close overdue nominations (runs on loadAll)
async function autoCloseOverdueEventos(){
  const today = new Date().toISOString().slice(0,10);
  const overdue = ST.eventos.filter(ev => ev.status==='open' && ev.closeDate && ev.closeDate < today);
  for(const ev of overdue){
    try{
      await setDoc(doc(db,'eventos',ev.id),{status:'closed',closedAt:serverTimestamp(),autoClosedAt:today},{merge:true});
      await logAction('auto_close_nomina', ev.id, 'open', 'closed', {reason:'closeDate passed'});
      console.log('[Admin] Auto-closed:', ev.name);
    }catch(e){ console.warn('Auto-close failed for', ev.id, e); }
  }
}
