<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Stream Deck · YourLift</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0A1628;font-family:Oswald,sans-serif;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;text-align:center;user-select:none}
    .icon{font-size:64px;line-height:1}
    .title{font-size:28px;font-weight:900;letter-spacing:4px;text-transform:uppercase}
    .sub{font-size:13px;color:rgba(255,255,255,.45);letter-spacing:3px;text-transform:uppercase;margin-top:-6px}
    .dur{font-size:72px;font-weight:900;letter-spacing:6px;line-height:1;color:#fff}
    .mov{font-size:18px;font-weight:700;letter-spacing:5px;color:rgba(255,255,255,.55)}
    .btn{padding:16px 36px;border-radius:10px;border:none;font-family:Oswald;font-size:20px;font-weight:700;letter-spacing:3px;cursor:pointer;text-transform:uppercase;transition:opacity .15s}
    .btn:active{opacity:.75}
    .btn-green{background:#22c55e;color:#fff;box-shadow:0 6px 28px rgba(34,197,94,.35)}
    .btn-red{background:#ef4444;color:#fff;box-shadow:0 6px 28px rgba(239,68,68,.35)}
    .btn-blue{background:#1e40af;color:#fff}
    .btn-gray{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.15)}
    .bar{width:80px;height:3px;background:#C41E3A;margin:0 auto}
    .noauth-hint{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:2px;max-width:280px;line-height:1.6}
  </style>
</head>
<body>
<script>
// ── Parámetros de URL ────────────────────────────────────────────
const P=new URLSearchParams(location.search);
const ACTION=P.get('action')||'break';     // break | breakStop | breakPause | breakResume
const MIN=parseInt(P.get('min')||'10',10); // minutos (default 10)
const SEC=parseInt(P.get('sec')||'0',10);  // segundos adicionales
const MOV=(P.get('mov')||P.get('movement')||'').toUpperCase();
const AUTO=P.get('auto')!=='0';            // auto-disparar al cargar (default true)
const LABEL=P.get('label')||'';

// ── Firebase ─────────────────────────────────────────────────────
const FB_CFG={
  apiKey:'AIzaSyA21IHMus2bklPLJm7ExRrVJJL9bzLhyp4',
  authDomain:'fechipo-db-13148.firebaseapp.com',
  projectId:'fechipo-db-13148',
  storageBucket:'fechipo-db-13148.firebasestorage.app',
  messagingSenderId:'551573388751',
  appId:'1:551573388751:web:5fcc377a8d595378ab26ba'
};

let fbDB=null,fb=null,authMod=null;
let appState='loading'; // loading | ready | firing | done | error | noauth

// ── Helpers DOM ───────────────────────────────────────────────────
function el(tag,style,text){const d=document.createElement(tag);if(style)d.style.cssText=style;if(text!=null)d.textContent=text;return d;}
function cls(c){const d=document.createElement('div');d.className=c;return d;}
function clsText(c,t){const d=cls(c);d.textContent=t;return d;}

function fmtDur(m,s){return m+':'+(s<10?'0':'')+s;}

function render(){
  document.body.innerHTML='';

  if(appState==='loading'||appState==='firing'){
    const spin=cls('icon');spin.textContent='⏳';document.body.appendChild(spin);
    const msg=appState==='loading'?'CARGANDO...':
      ACTION==='breakStop'?'DETENIENDO...':
      ACTION==='breakPause'?'PAUSANDO...':
      ACTION==='breakResume'?'REANUDANDO...':
      'INICIANDO DESCANSO...';
    document.body.appendChild(clsText('sub',msg));
    return;
  }

  if(appState==='noauth'){
    document.body.appendChild(clsText('icon','🔒'));
    document.body.appendChild(clsText('title','NO AUTORIZADO'));
    document.body.appendChild(clsText('noauth-hint','Iniciá sesión en admin.html en este mismo navegador y recargá esta página.'));
    const btn=document.createElement('button');
    btn.className='btn btn-gray';btn.textContent='↩ REINTENTAR';
    btn.style.marginTop='12px';btn.onclick=()=>location.reload();
    document.body.appendChild(btn);
    return;
  }

  if(appState==='error'){
    document.body.appendChild(clsText('icon','❌'));
    document.body.appendChild(clsText('title','ERROR'));
    document.body.appendChild(clsText('sub','No se pudo conectar'));
    const btn=document.createElement('button');
    btn.className='btn btn-blue';btn.textContent='↩ REINTENTAR';
    btn.style.marginTop='12px';btn.onclick=()=>{appState='ready';fireAction();};
    document.body.appendChild(btn);
    return;
  }

  if(appState==='done'){
    const icons={break:'✅',breakStop:'⏹',breakPause:'⏸',breakResume:'▶'};
    const labels={break:'DESCANSO INICIADO',breakStop:'DESCANSO DETENIDO',breakPause:'PAUSADO',breakResume:'REANUDADO'};
    const colors={break:'#22c55e',breakStop:'#ef4444',breakPause:'#f59e0b',breakResume:'#22c55e'};
    document.body.appendChild(clsText('icon',icons[ACTION]||'✅'));
    const tit=cls('title');tit.textContent=labels[ACTION]||'LISTO';tit.style.color=colors[ACTION]||'#22c55e';
    document.body.appendChild(tit);
    document.body.appendChild(cls('bar'));
    const dur=MIN*60+SEC;
    if((ACTION==='break')&&dur>0){
      document.body.appendChild(clsText('dur',fmtDur(MIN,SEC)));
    }
    if(MOV)document.body.appendChild(clsText('mov',MOV));
    // Botón repetir
    const btn=document.createElement('button');
    btn.className='btn btn-gray';btn.textContent='🔁 REPETIR';
    btn.style.marginTop='8px';btn.onclick=()=>fireAction();
    document.body.appendChild(btn);
    return;
  }

  // ready — modo manual (auto=0)
  const actionIcons={break:'▶',breakStop:'⏹',breakPause:'⏸',breakResume:'▶'};
  const actionLabels={break:'INICIAR DESCANSO',breakStop:'DETENER DESCANSO',breakPause:'PAUSAR',breakResume:'REANUDAR'};
  const actionColors={break:'btn-green',breakStop:'btn-red',breakPause:'btn-gray',breakResume:'btn-green'};
  const btn=document.createElement('button');
  btn.className='btn '+(actionColors[ACTION]||'btn-green');
  btn.textContent=(actionIcons[ACTION]||'▶')+' '+(actionLabels[ACTION]||'EJECUTAR');
  btn.style.fontSize='26px';btn.style.padding='22px 48px';
  btn.onclick=()=>fireAction();
  document.body.appendChild(btn);
  const dur=MIN*60+SEC;
  if((ACTION==='break')&&dur>0){
    document.body.appendChild(clsText('dur',fmtDur(MIN,SEC)));
  }
  if(MOV)document.body.appendChild(clsText('mov',MOV));
}

// ── Acción principal ──────────────────────────────────────────────
async function fireAction(){
  appState='firing';render();
  try{
    const docRef=fb.doc(fbDB,'livecast_director','current');
    const snap=await fb.getDoc(docRef);
    const existing=snap.exists()?snap.data():{};
    const existingBt=existing.breakTimer||{};

    if(ACTION==='break'){
      const durationSec=MIN*60+SEC;
      await fb.setDoc(docRef,{
        ...existing,
        breakTimer:{
          ...existingBt,
          active:true,
          startedAt:Date.now(),
          durationSec,
          pausedAt:0,
          label:LABEL||existingBt.label||'',
          videos:existingBt.videos||[],
          movement:MOV||existingBt.movement||'',
          style:existingBt.style||{}
        }
      });
    } else if(ACTION==='breakStop'){
      await fb.setDoc(docRef,{
        ...existing,
        breakTimer:{...existingBt,active:false,startedAt:0,durationSec:0,pausedAt:0}
      });
    } else if(ACTION==='breakPause'){
      await fb.setDoc(docRef,{
        ...existing,
        breakTimer:{...existingBt,pausedAt:existingBt.pausedAt||Date.now()}
      });
    } else if(ACTION==='breakResume'){
      const bt=existingBt;
      if(bt.pausedAt){
        const elapsed=bt.pausedAt-bt.startedAt;
        await fb.setDoc(docRef,{
          ...existing,
          breakTimer:{...existingBt,startedAt:Date.now()-elapsed,pausedAt:0}
        });
      }
    }
    appState='done';
  }catch(e){
    console.error(e);
    appState='error';
  }
  render();
}

// ── Init Firebase ─────────────────────────────────────────────────
async function init(){
  try{
    const{initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    fb=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    authMod=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
    const app=initializeApp(FB_CFG);
    fbDB=fb.getFirestore(app);
    const auth=authMod.getAuth(app);
    authMod.onAuthStateChanged(auth,async(user)=>{
      if(!user){appState='noauth';render();return;}
      // Verificar que sea admin
      try{
        const adminSnap=await fb.getDoc(fb.doc(fbDB,'admins',user.uid));
        if(!adminSnap.exists()){appState='noauth';render();return;}
      }catch(e){/* si falla la verificación igual dejamos pasar — el write va a fallar si no tiene permisos */}
      appState='ready';
      if(AUTO)fireAction();
      else render();
    });
  }catch(e){
    console.error(e);
    appState='error';
    render();
  }
}

render(); // muestra loading
init();
</script>
</body>
</html>
