let db = null;

async function init() {
  const {initializeApp} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
  const {getFirestore, doc, setDoc, getDoc} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  const app = initializeApp(FB_CFG);
  db = getFirestore(app);
  window._fsUtils = {doc, setDoc, getDoc};
  log('✓ Firebase conectado', 'ok');
}

function log(msg, cls='dim') {
  const el = document.getElementById('log');
  const span = document.createElement('span');
  span.className = cls;
  span.textContent = msg + '\n';
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

window.startSeeding = async function() {
  const btn = document.getElementById('btnStart');
  btn.disabled = true;
  btn.textContent = '⏳ Creando cuentas...';
  document.getElementById('progress').style.display = 'block';
  const logEl = document.getElementById('log');
  logEl.innerHTML = '';

  if (!db) {
    log('Conectando a Firebase...', 'info');
    await init();
  }

  const {doc, setDoc, getDoc} = window._fsUtils;
  let ok = 0, skip = 0, fail = 0;
  const total = COACHES.length;

  for (let i = 0; i < total; i++) {
    const c = COACHES[i];
    const id = c.email.replace(/[.@]/g, '_');
    try {
      // Check if already exists
      const existing = await getDoc(doc(db, 'coaches', id));
      if (existing.exists()) {
        log(`  ↩ Ya existe: ${c.email}`, 'dim');
        skip++;
      } else {
        await setDoc(doc(db, 'coaches', id), {
          email: c.email,
          password: c.password,
          nombre: c.nombre,
          rut: c.rut,
          grado: c.grado,
          role: 'coach',
          createdAt: new Date().toISOString()
        });
        log(`  ✓ ${c.nombre} (${c.grado})`, 'ok');
        ok++;
      }
    } catch(e) {
      log(`  ✗ Error ${c.email}: ${e.message}`, 'err');
      fail++;
    }
    // Update progress bar
    document.getElementById('progressFill').style.width = Math.round((i+1)/total*100) + '%';
  }

  const summary = `\n✅ Listo: ${ok} creadas, ${skip} ya existían, ${fail} errores`;
  log(summary, ok > 0 ? 'ok' : 'info');
  btn.textContent = '✅ Proceso completado';
  btn.style.background = '#22c55e';
};

// Auto-init on load
init().catch(e => log('Error Firebase: ' + e.message, 'err'));
</script>
</body>
</html>
