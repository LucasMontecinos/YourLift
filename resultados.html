<!DOCTYPE html>
<html lang="es">
<head><script async src="https://www.googletagmanager.com/gtag/js?id=G-109D5LTPQ7"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-109D5LTPQ7');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourLift — Resultados Oficiales</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A1628;--card:#0f1e35;--border:#1E3A5F;--text:#D4E1F0;--muted:#7A8FA6;--accent:#C41E3A;--gold:#D4A843;--blue:#3b82f6;--green:#22c55e}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.os{font-family:'Oswald',sans-serif}
.nav{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);background:rgba(10,22,40,.95);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.wrap{max-width:860px;margin:0 auto;padding:24px 16px 80px}
.year-label{font-family:Oswald;font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;padding:12px 0 8px;border-bottom:1px solid var(--border);margin-bottom:12px;margin-top:28px}
.year-label:first-child{margin-top:0}
.acta-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:10px;display:flex;align-items:center;gap:16px;transition:border-color .15s}
.acta-card:hover{border-color:rgba(196,30,58,.4)}
.acta-icon{font-size:28px;flex-shrink:0;width:40px;text-align:center}
.acta-info{flex:1;min-width:0}
.acta-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acta-meta{font-size:12px;color:var(--muted);margin-top:3px}
.btn-pdf{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;background:var(--accent);color:#fff;font-family:Oswald;font-size:12px;font-weight:700;letter-spacing:1px;text-decoration:none;cursor:pointer;border:none;flex-shrink:0;transition:background .15s}
.btn-pdf:hover{background:#a8182f}
.empty{text-align:center;padding:80px 20px;color:var(--muted)}
.skeleton{background:linear-gradient(90deg,var(--card) 25%,rgba(30,58,95,.3) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:12px;height:70px;margin-bottom:10px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.btn-volver{position:fixed;top:14px;left:14px;z-index:9999;padding:8px 14px;background:rgba(10,22,40,.85);border:1px solid rgba(212,168,67,.4);border-radius:8px;color:rgba(220,230,245,.85);font-family:Oswald,sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-decoration:none;cursor:pointer;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.btn-volver:hover{border-color:#D4A843;color:#D4A843;transform:translateX(-2px)}
@media(max-width:600px){.acta-name{white-space:normal}.acta-card{flex-wrap:wrap}.btn-pdf{width:100%;justify-content:center}}
</style>
<style id="embedHide">
/* Si estamos dentro de un iframe (param ?embedded=1) ocultamos el boton volver */
html.embedded .btn-volver,html.embedded a[href="index.html"].btn-volver{display:none !important}
html.embedded body{background:transparent !important}
</style>
<script>
(function(){
  try{
    var p=new URLSearchParams(location.search);
    if(p.get('embedded')==='1' || window.parent!==window){
      document.documentElement.classList.add('embedded');
    }
  }catch(e){}
})();
</script>
</head>
<body>

<a href="index.html" class="btn-volver">← Volver a YourLift</a>

<div class="nav" style="padding-left:170px">
  <span style="font-family:Oswald;font-size:18px;font-weight:700;letter-spacing:2px">YOUR<span style="color:var(--accent)">LIFT</span></span>
  <span style="font-size:12px;color:var(--muted)">Resultados Oficiales</span>
</div>

<div class="wrap">
  <div style="text-align:center;margin-bottom:32px;padding-top:8px">
    <h1 class="os" style="font-size:clamp(22px,5vw,34px);font-weight:700;letter-spacing:2px">RESULTADOS <span style="color:var(--accent)">OFICIALES</span></h1>
    <p style="color:var(--muted);font-size:13px;margin-top:6px">Actas de campeonatos organizados por FECHIPO</p>
    <div style="width:60px;height:3px;background:linear-gradient(90deg,var(--accent),var(--gold));margin:12px auto;border-radius:2px"></div>
  </div>

  <div id="content">
    <div class="skeleton"></div>
    <div class="skeleton" style="height:70px;opacity:.7"></div>
    <div class="skeleton" style="height:70px;opacity:.4"></div>
  </div>
</div>

<script type="module">
const FB_CFG={apiKey:"AIzaSyA21IHMus2bklPLJm7ExRrVJJL9bzLhyp4",authDomain:"fechipo-db-13148.firebaseapp.com",projectId:"fechipo-db-13148"};

function esc(s){if(s==null)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

(async()=>{
  try{
    const {initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const {getFirestore,collection,query,where,getDocs,orderBy}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const app=initializeApp(FB_CFG);
    const db=getFirestore(app);

    const snap=await getDocs(collection(db,'actas'));
    const actas=snap.docs
      .map(d=>({id:d.id,...d.data()}))
      .filter(a=>a.visible!==false)
      .sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));

    renderActas(actas);
  }catch(e){
    document.getElementById('content').innerHTML=`<div class="empty"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div>Error al cargar resultados. Intenta de nuevo.</div></div>`;
    console.error(e);
  }
})();

function renderActas(actas){
  const el=document.getElementById('content');
  if(!actas.length){
    el.innerHTML=`<div class="empty"><div style="font-size:48px;margin-bottom:16px">🏋️</div><div class="os" style="font-size:18px;letter-spacing:1px;margin-bottom:8px">Sin resultados publicados</div><div style="font-size:13px">Los resultados oficiales se publicarán después de cada campeonato.</div></div>`;
    return;
  }

  // Agrupar por año
  const byYear={};
  actas.forEach(a=>{
    const yr=(a.fecha||'').slice(0,4)||'—';
    if(!byYear[yr])byYear[yr]=[];
    byYear[yr].push(a);
  });
  const years=Object.keys(byYear).sort((a,b)=>b.localeCompare(a));

  el.innerHTML=years.map(yr=>`
    <div class="year-label">${yr}</div>
    ${byYear[yr].map(a=>`
    <div class="acta-card">
      <div class="acta-icon">📑</div>
      <div class="acta-info">
        <div class="acta-name">${esc(a.nombre||'Sin nombre')}</div>
        <div class="acta-meta">${esc(a.org||'FECHIPO')}${a.lugar?' · '+esc(a.lugar):''}${a.fecha?' · '+a.fecha:''}</div>
      </div>
      ${a.pdfURL?`<a href="${esc(a.pdfURL)}" target="_blank" rel="noopener" class="btn-pdf">📄 Ver Acta</a>`:'<span style="font-size:11px;color:var(--muted)">PDF no disponible</span>'}
    </div>`).join('')}
  `).join('');
}
</script>
</body>
</html>
